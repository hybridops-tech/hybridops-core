api_version: hybridops/v1
kind: BlueprintSpec

blueprint_ref: "networking/wan-hub-edge@v1"
mode: "hybrid"

metadata:
  title: "WAN Hub to Edge (GCP + Hetzner VyOS)"
  description: "Provision Hetzner VyOS edge peers, GCP hub networking, and HA VPN/BGP between the cloud hub and routed edge."
  outcome: "Deterministic BGP/IPsec control plane between GCP Cloud Router and Hetzner VyOS edge peers."
  notes:
    - "VyOS day-2 tunnel/BGP policy is handled outside the legacy Linux platform/network/wan-edge module."
    - "This blueprint excludes the legacy Linux edge role path to keep VyOS deployments deterministic."
    - "Shipped source is a scaffold. Copy it into runtime config with hyops blueprint init and replace environment values before deploy."

policy:
  fail_fast: true
  evidence_required: true
  ipam_authority: "none"

steps:
  - id: vyos_artifact_build
    module_ref: "core/shared/vyos-image-build"
    state_instance: "vyos_default_build"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    skip_if_state_ok: true
    verify_state_on_skip: true
    inputs:
      artifact_key: "vyos-1.5"
      artifact_format: "qcow2"
      artifact_version: ""
      # If this URL is set, HyOps registers/uses it directly.
      # If empty, HyOps builds + publishes via build_command/publish_command.
      artifact_url: ""
      artifact_local_path: "/tmp/vyos-1.5.qcow2"
      # Set this to your object-repo state for publish backend discovery.
      # Override in env blueprint overlay when using a non-default repo instance.
      repo_state_ref: "org/gcp/object-repo#vyos_artifacts"
      required_env:
        - "HYOPS_VYOS_GCS_SA_JSON"
      build_command: "${HYOPS_CORE_ROOT:-$HOME/.hybridops/core/app}/tools/build/vyos/build-vyos-qcow2.sh"
      smoke_verify_required: true
      publish_command: "${HYOPS_CORE_ROOT:-$HOME/.hybridops/core/app}/tools/build/vyos/publish-vyos-artifact.sh"

  - id: vyos_image
    module_ref: "core/hetzner/vyos-image-seed"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    skip_if_state_ok: true
    verify_state_on_skip: true
    requires:
      - vyos_artifact_build
    inputs:
      artifact_state_ref: "core/shared/vyos-image-build#vyos_default_build"
      artifact_key: "vyos-1.5"
      required_env:
        - "HYOPS_VYOS_GCS_SA_JSON"
      image_key: "vyos-1.5"
      image_ref: ""
      image_version: ""
      image_description: ""
      image_source_url: ""
      seed_wrapper_public_base_url: ""
      seed_if_missing: true
      seed_tool: "hcloud-upload-image"

  - id: hetzner_edge_foundation
    module_ref: "org/hetzner/vyos-edge-foundation"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    skip_if_state_ok: true
    verify_state_on_skip: true
    requires:
      - vyos_image
    contracts:
      addressing_mode: "static"
    inputs:
      network_zone: "CHANGE_ME_HETZNER_NETWORK_ZONE"
      image_state_ref: "core/hetzner/vyos-image-seed"
      image_key: "vyos-1.5"
      edge01_name: "edge-a"
      edge02_name: "edge-b"
      ssh_key_name: "CHANGE_ME_HETZNER_SSH_KEY_NAME"
      # Optional when ssh_key_name already exists in Hetzner.
      # Required only when HyOps must create the SSH key.
      ssh_public_key: ""
      firewall_name: "CHANGE_ME_EDGE_FIREWALL_NAME"
      floating_ip_name: "CHANGE_ME_EDGE_FLOATING_IP_NAME"
      private_network_name: "CHANGE_ME_HETZNER_PRIVATE_NETWORK_NAME"
      private_network_cidr: "CHANGE_ME_HETZNER_PRIVATE_NETWORK_CIDR"
      edge01_private_ip: "CHANGE_ME_EDGE01_PRIVATE_IP"
      edge02_private_ip: "CHANGE_ME_EDGE02_PRIVATE_IP"
      assign_floating_to: "edge01"

  - id: gcp_wan_hub_network
    module_ref: "org/gcp/wan-hub-network"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    skip_if_state_ok: true
    verify_state_on_skip: true
    contracts:
      addressing_mode: "static"
    inputs:
      name_prefix: ""
      context_id: "CHANGE_ME_CONTEXT_ID"
      project_id: "CHANGE_ME_GCP_PROJECT_ID"
      region: "CHANGE_ME_GCP_REGION"
      network_name: "hub"
      subnet_core_name: "hub-core"
      subnet_core_cidr: "CHANGE_ME_GCP_CORE_SUBNET_CIDR"
      subnet_workloads_name: "hub-workloads"
      subnet_workloads_cidr: "CHANGE_ME_GCP_WORKLOADS_SUBNET_CIDR"

  - id: gcp_wan_cloud_router
    module_ref: "org/gcp/wan-cloud-router"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    skip_if_state_ok: true
    verify_state_on_skip: true
    requires:
      - gcp_wan_hub_network
    contracts:
      addressing_mode: "static"
    inputs:
      name_prefix: ""
      context_id: "CHANGE_ME_CONTEXT_ID"
      router_name: "CHANGE_ME_GCP_ROUTER_NAME"
      bgp_asn: 64514

  - id: gcp_wan_vpn_to_edge
    module_ref: "org/gcp/wan-vpn-to-edge"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    # Edge rebuilds can change public peer IPs; always reconcile this step on blueprint reruns.
    skip_if_state_ok: false
    requires:
      - hetzner_edge_foundation
      - gcp_wan_hub_network
      - gcp_wan_cloud_router
    contracts:
      addressing_mode: "static"
    inputs:
      name_prefix: ""
      context_id: "CHANGE_ME_CONTEXT_ID"
      ha_vpn_gateway_name: "CHANGE_ME_GCP_HA_VPN_GATEWAY_NAME"
      external_vpn_gateway_name: "CHANGE_ME_GCP_EXTERNAL_VPN_GATEWAY_NAME"
      peer_asn: 65010
      tunnel_a_inside_cidr: "169.254.10.0/30"
      tunnel_b_inside_cidr: "169.254.10.4/30"
      advertised_prefixes:
        - "CHANGE_ME_GCP_ADVERTISED_PREFIX"
      advertised_route_priority: 100
      required_env:
        - "WAN_IPSEC_PSK"
      shared_secret_a_env: "WAN_IPSEC_PSK"
      shared_secret_b_env: "WAN_IPSEC_PSK"
