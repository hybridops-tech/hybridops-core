api_version: hybridops/v1
kind: BlueprintSpec
blueprint_ref: networking/edge-control-plane@v1
mode: hybrid
metadata:
  title: Edge Control Plane (VyOS WAN + Observability + Decisions)
  description: Provision edge WAN foundations, configure edge routing, bootstrap observability,
    and deploy decision control loop.
  outcome: Edge control plane is ready for deterministic DR/burst signaling.
  notes:
  - VyOS tunnel/BGP day-2 configuration is not driven by the legacy Linux platform/network/wan-edge module.
  - This blueprint intentionally excludes that legacy module to avoid applying strongSwan/FRR logic to VyOS appliances.
policy:
  fail_fast: true
  evidence_required: true
  ipam_authority: none
steps:
- id: vyos_artifact_build
  module_ref: core/shared/vyos-image-build
  state_instance: vyos_default_build
  action: deploy
  phase: bootstrap
  with_deps: true
  skip_if_state_ok: true
  inputs:
    artifact_key: vyos-1.5
    artifact_format: qcow2
    artifact_version: ""
    # If this URL is set, HyOps registers/uses it directly.
    # If empty, HyOps builds + publishes via build_command/publish_command.
    artifact_url: ""
    artifact_local_path: /tmp/vyos-1.5.qcow2
    # Set this to your object-repo state for publish backend discovery.
    # Override in env blueprint overlay when using a non-default repo instance.
    repo_state_ref: org/gcp/object-repo#vyos_artifacts
    build_command: ${HYOPS_CORE_ROOT:-$HOME/.hybridops/core/app}/tools/build/vyos/build-vyos-qcow2.sh
    smoke_verify_required: true
    publish_command: ${HYOPS_CORE_ROOT:-$HOME/.hybridops/core/app}/tools/build/vyos/publish-vyos-artifact.sh
- id: vyos_image
  module_ref: core/hetzner/vyos-image-seed
  action: deploy
  phase: bootstrap
  with_deps: true
  skip_if_state_ok: true
  requires:
  - vyos_artifact_build
  inputs:
    artifact_state_ref: core/shared/vyos-image-build#vyos_default_build
    artifact_key: vyos-1.5
    image_key: vyos-1.5
    image_ref: ""
    image_version: ""
    image_description: ""
    image_source_url: ""
    seed_wrapper_public_base_url: ""
    seed_if_missing: true
    seed_tool: hcloud-upload-image
- id: hetzner_edge_foundation
  module_ref: org/hetzner/vyos-edge-foundation
  action: deploy
  phase: bootstrap
  with_deps: true
  skip_if_state_ok: true
  requires:
  - vyos_image
  contracts:
    addressing_mode: static
  inputs:
    name_prefix: platform
    context_id: dev
    image_state_ref: core/hetzner/vyos-image-seed
    image_key: vyos-1.5
    network_zone: eu-central
    edge01_name: edge-a
    edge02_name: edge-b
    ssh_key_name: hyops-wan-edge
    # Optional when ssh_key_name already exists in Hetzner.
    # Required only when HyOps must create the SSH key.
    ssh_public_key: ""
    firewall_name: fw-hyops-edge
    floating_ip_name: fip-hyops-edge
    private_network_name: net-hyops-edge
    private_network_cidr: 10.80.0.0/24
    edge01_private_ip: 10.80.0.11
    edge02_private_ip: 10.80.0.12
    assign_floating_to: edge01
- id: gcp_wan_hub_network
  module_ref: org/gcp/wan-hub-network
  action: deploy
  phase: bootstrap
  with_deps: true
  skip_if_state_ok: true
  contracts:
    addressing_mode: static
  inputs:
    name_prefix: platform
    context_id: dev
    project_id: change-me-gcp-project
    region: europe-west2
    network_name: hub
    subnet_core_name: hub-core
    subnet_core_cidr: 10.70.0.0/20
    subnet_workloads_name: hub-workloads
    subnet_workloads_cidr: 10.70.16.0/20
- id: gcp_wan_cloud_router
  module_ref: org/gcp/wan-cloud-router
  action: deploy
  phase: bootstrap
  with_deps: true
  skip_if_state_ok: true
  requires:
  - gcp_wan_hub_network
  contracts:
    addressing_mode: static
  inputs:
    name_prefix: platform
    context_id: dev
    router_name: hub-router-europe-west2
    bgp_asn: 64514
- id: gcp_wan_vpn_to_edge
  module_ref: org/gcp/wan-vpn-to-edge
  action: deploy
  phase: bootstrap
  with_deps: true
  # Edge rebuilds can change public peer IPs; always reconcile this step on blueprint reruns.
  skip_if_state_ok: false
  requires:
  - hetzner_edge_foundation
  - gcp_wan_hub_network
  - gcp_wan_cloud_router
  contracts:
    addressing_mode: static
  inputs:
    name_prefix: platform
    context_id: dev
    ha_vpn_gateway_name: hub-havpn-europe-west2
    external_vpn_gateway_name: edge-extgw
    peer_asn: 65010
    tunnel_a_inside_cidr: 169.254.10.0/30
    tunnel_b_inside_cidr: 169.254.10.4/30
    advertised_prefixes:
    - 10.70.0.0/20
    advertised_route_priority: 100
    required_env:
    - WAN_IPSEC_PSK
    shared_secret_a_env: WAN_IPSEC_PSK
    shared_secret_b_env: WAN_IPSEC_PSK
- id: vyos_edge_day2
  module_ref: platform/network/vyos-edge-wan
  action: deploy
  phase: operations
  with_deps: true
  requires:
  - gcp_wan_vpn_to_edge
  - shared_control_host
  contracts:
    addressing_mode: static
  inputs:
    inventory_state_ref: org/hetzner/shared-control-host#edge_control_host
    inventory_vm_groups:
      edge_control:
      - control-01
    target_user: opsadmin
    required_env:
    - WAN_IPSEC_PSK
    - WAN_EDGE_SSH_PRIVATE_KEY
    local_asn: 65010
    peer_asn: 64514
    # Keep the WAN baseline honest: do not advertise spoke/on-prem prefixes
    # until the upstream spoke routes actually exist on the edge.
    advertise_prefixes: []
    import_allow_prefixes:
    - 10.70.0.0/20
    - 10.70.16.0/20
- id: shared_control_host
  module_ref: org/hetzner/shared-control-host
  state_instance: edge_control_host
  action: deploy
  phase: bootstrap
  with_deps: true
  skip_if_state_ok: true
  requires:
  - hetzner_edge_foundation
  contracts:
    addressing_mode: static
  inputs:
    foundation_state_ref: org/hetzner/vyos-edge-foundation
    name_prefix: platform
    context_id: dev
    location: ash
    server_type: cpx21
    image: ubuntu-24.04
    host_name: control-01
    private_ip: 10.80.0.20
    ssh_username: opsadmin
    ssh_keys_from_init: true
    public_ipv6_enabled: false
    firewall_name: fw-shared-control
    ssh_source_cidrs:
    - 0.0.0.0/0
- id: edge_observability
  module_ref: platform/network/edge-observability
  action: deploy
  phase: operations
  with_deps: true
  requires:
  - shared_control_host
  contracts:
    addressing_mode: static
  inputs:
    inventory_state_ref: org/hetzner/shared-control-host#edge_control_host
    inventory_vm_groups:
      edge:
      - control-01
    target_user: opsadmin
    required_env:
    - EDGE_OBS_GRAFANA_ADMIN_PASSWORD
    edge_obs_enable_receive: false
    edge_obs_enable_store_gateway: false
    edge_obs_enable_ruler: false
    edge_obs_hashring_endpoints:
    - control-01.internal:10907
- id: dns_routing_intent
  module_ref: platform/network/dns-routing
  action: deploy
  phase: operations
  with_deps: true
  requires:
  - shared_control_host
  contracts:
    addressing_mode: static
  inputs:
    inventory_state_ref: org/hetzner/shared-control-host#edge_control_host
    inventory_vm_groups:
      edge_control:
      - control-01
    target_user: opsadmin
    provider: manual-command
    zone: example.com
    record_fqdn: app.example.com
    record_type: A
    ttl: 60
    primary_targets:
    - 203.0.113.10
    secondary_targets:
    - 198.51.100.20
    desired: primary
    dry_run: true
    dns_apply: false
- id: decision_service
  module_ref: platform/network/decision-service
  action: deploy
  phase: operations
  with_deps: true
  requires:
  - edge_observability
  - dns_routing_intent
  contracts:
    addressing_mode: static
  inputs:
    inventory_state_ref: org/hetzner/shared-control-host#edge_control_host
    inventory_vm_groups:
      edge_control:
      - control-01
    target_user: opsadmin
    thanos_query_url: http://127.0.0.1:10902
    policy:
      version: v1
      mode: PRIMARY
      signals:
        primary_up_query: vector(1)
        error_rate_query: vector(0.0)
      thresholds:
        primary_up_min: 1
        error_rate_ratio: 0.02
    actions:
      cutover_module_ref: platform/network/dns-routing
      failback_module_ref: platform/network/dns-routing
      cutover_desired: secondary
      failback_desired: primary
      module_inputs:
        provider: manual-command
        zone: example.com
        record_fqdn: app.example.com
        record_type: A
        ttl: 60
        primary_targets:
        - 203.0.113.10
        secondary_targets:
        - 198.51.100.20
        dry_run: true
        dns_apply: false
        inventory_state_ref: org/hetzner/shared-control-host#edge_control_host
        inventory_vm_groups:
          edge_control:
          - control-01
    dry_run: true
    decision_enable_actions: false
