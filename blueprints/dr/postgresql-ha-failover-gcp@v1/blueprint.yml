api_version: hybridops/v1
kind: BlueprintSpec

blueprint_ref: "dr/postgresql-ha-failover-gcp@v1"
mode: "hybrid"

metadata:
  title: "PostgreSQL HA DR Failover to GCP (pgBackRest restore)"
  description: "Provision GCP VMs, then restore a Patroni + etcd PostgreSQL cluster from pgBackRest (S3/GCS) backups. This blueprint does not modify the on-prem primary cluster; it assumes DR conditions and requires explicit restore confirmation."
  outcome: "A new PostgreSQL primary is restored in GCP and publishes standard DB connection outputs."
  notes:
    - "Shipped source is a scaffold. Copy it into runtime config with `hyops blueprint init` and replace every `CHANGE_ME_*` value before deploy."

policy:
  fail_fast: true
  evidence_required: true
  ipam_authority: "none"

steps:
  - id: gcp_pg_egress
    module_ref: "org/gcp/wan-cloud-nat"
    state_instance: "gcp_pg_egress"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    skip_if_state_ok: true
    verify_state_on_skip: true
    inputs:
      router_state_ref: "org/gcp/wan-cloud-router"
      network_state_ref: "org/gcp/wan-hub-network"
      subnetwork_output_keys:
        - "subnet_workloads_name"
      nat_name: "dr-pg-egress"
      subnetwork_source_ip_ranges_to_nat: "ALL_IP_RANGES"
      auto_allocate_external_ips: true
      min_ports_per_vm: 128
      enable_endpoint_independent_mapping: true
      log_filter: "ERRORS_ONLY"

  - id: gcp_pg_vms
    module_ref: "platform/gcp/platform-vm"
    state_instance: "gcp_pg_vms"
    action: "deploy"
    phase: "bootstrap"
    requires:
      - gcp_pg_egress
    with_deps: true
    skip_if_state_ok: true
    verify_state_on_skip: true
    contracts:
      addressing_mode: "static"
    inputs:
      name_prefix: "platform"
      context_id: "CHANGE_ME_CONTEXT_ID"
      network_state_ref: "org/gcp/wan-hub-network"
      subnetwork_output_key: "subnet_workloads_name"
      zone: "CHANGE_ME_GCP_ZONE"
      assign_public_ip: false
      ssh_username: "opsadmin"
      ssh_keys_from_init: true
      post_apply_ssh_readiness:
        enabled: true
        required: true
        target_user: "opsadmin"
        connectivity_timeout_s: 5
        connectivity_wait_s: 180
        ssh_proxy_jump_auto: false
      vms:
        pgdr-01:
          role: "postgres"
        pgdr-02:
          role: "postgres"
        pgdr-03:
          role: "postgres"

  - id: postgresql_restore
    module_ref: "platform/postgresql-ha"
    state_instance: "postgresql_restore_gcp_dr"
    action: "deploy"
    phase: "operations"
    with_deps: false
    skip_if_state_ok: true
    verify_state_on_skip: true
    requires:
      - gcp_pg_vms
    contracts:
      addressing_mode: "static"
    inputs:
      # Inventory from the GCP VM module state
      execution_plane: "runner-local"
      inventory_state_ref: "platform/gcp/platform-vm#gcp_pg_vms"
      inventory_requires_ipam: false
      inventory_vm_groups:
        etcd_cluster: ["pgdr-01", "pgdr-02", "pgdr-03"]
        master: ["pgdr-01"]
        replica: ["pgdr-02", "pgdr-03"]
        postgres_cluster: ["pgdr-01", "pgdr-02", "pgdr-03"]

      # Restore mode (guarded)
      apply_mode: "restore"
      restore_confirm: false
      # Restore source must be explicit. Prefer backup_state_ref so HyOps resolves
      # restore selectors from backup-run state instead of manual pinning.
      backup_state_ref: ""
      backup_state_env: ""
      restore_set: ""
      restore_target_timeline: ""
      restore_target_time: ""
      restore_delta: true

      # pgBackRest repository source (state-driven, no bucket duplication)
      repo_state_ref: "org/gcp/object-repo#pgbackrest_primary"
      repo_path: "/pgbackrest"
      gcs_sa_json_env: "PG_BACKUP_GCS_SA_JSON"
      gcs_sa_dest: "/var/lib/hybridops/pgbackrest/gcs-sa.json"

      # Ensure hyops preflight validates all required secrets are present.
      required_env:
        - "PATRONI_SUPERUSER_PASSWORD"
        - "PATRONI_REPLICATION_PASSWORD"
        - "NETBOX_DB_PASSWORD"
        - "PG_BACKUP_GCS_SA_JSON"

      # Preferred client-facing DB endpoint for cutover.
      # Set this to a stable DNS name to avoid teaching applications raw leader IPs.
      endpoint_dns_name: ""

      load_vault_env: true

  - id: postgresql_backup_config
    module_ref: "platform/postgresql-ha-backup"
    state_instance: "postgresql_backup_config_gcp_dr"
    action: "deploy"
    phase: "operations"
    with_deps: false
    skip_if_state_ok: true
    verify_state_on_skip: true
    requires:
      - postgresql_restore
    contracts:
      addressing_mode: "static"
    inputs:
      execution_plane: "runner-local"
      inventory_state_ref: "platform/gcp/platform-vm#gcp_pg_vms"
      inventory_requires_ipam: false
      inventory_vm_groups:
        etcd_cluster: ["pgdr-01", "pgdr-02", "pgdr-03"]
        master: ["pgdr-01"]
        replica: ["pgdr-02", "pgdr-03"]
        postgres_cluster: ["pgdr-01", "pgdr-02", "pgdr-03"]

      # Repository backend/location resolved from module state.
      repo_state_ref: "org/gcp/object-repo#pgbackrest_primary"
      repo_path: "/pgbackrest"
      gcs_sa_json_env: "PG_BACKUP_GCS_SA_JSON"
      gcs_sa_dest: "/var/lib/hybridops/pgbackrest/gcs-sa.json"
      # Optional cross-cloud secondary backup copy (repo2).
      # Keep disabled by default; enable based on decision policy.
      secondary_enabled: false
      secondary_repo_state_ref: ""
      secondary_backend: ""
      required_env:
        - "PATRONI_SUPERUSER_PASSWORD"
        - "PATRONI_REPLICATION_PASSWORD"
        - "PG_BACKUP_GCS_SA_JSON"

      load_vault_env: true

  - id: postgresql_dns_cutover
    module_ref: "platform/network/dns-routing"
    state_instance: "postgresql_dns_cutover_gcp_dr"
    action: "deploy"
    phase: "operations"
    with_deps: false
    requires:
      - postgresql_backup_config
    inputs:
      target_user: "opsadmin"
      target_port: 22
      ssh_private_key_env: "WAN_EDGE_SSH_PRIVATE_KEY"
      load_vault_env: true
      required_env:
        - "POWERDNS_API_KEY"
        - "WAN_EDGE_SSH_PRIVATE_KEY"

      provider: "powerdns-api"
      powerdns_state_ref: "platform/network/powerdns-authority#shared_primary"
      endpoint_state_ref: "platform/postgresql-ha#postgresql_restore_gcp_dr"
      endpoint_fqdn_output_key: "endpoint_dns_name"
      endpoint_target_output_key: "endpoint_host"
      record_type: "A"
      ttl: 30
      desired: "primary"
      dry_run: false
      dns_apply: true

      powerdns_account: "hyops"
      powerdns_comment: "Managed by HybridOps DR failover"

  - id: postgresql_dns_status
    module_ref: "platform/network/dns-routing"
    state_instance: "postgresql_dns_status_ha_failover_gcp"
    action: "deploy"
    phase: "operations"
    with_deps: false
    skip_if_state_ok: false
    requires:
      - postgresql_dns_cutover
    inputs:
      apply_mode: "status"
      target_user: "opsadmin"
      target_port: 22
      ssh_private_key_env: "WAN_EDGE_SSH_PRIVATE_KEY"
      load_vault_env: true
      required_env:
        - "POWERDNS_API_KEY"
        - "WAN_EDGE_SSH_PRIVATE_KEY"
      provider: "powerdns-api"
      powerdns_state_ref: "platform/network/powerdns-authority#shared_primary"
      endpoint_state_ref: "platform/postgresql-ha#postgresql_restore_gcp_dr"
      endpoint_fqdn_output_key: "endpoint_dns_name"
      endpoint_target_output_key: "endpoint_host"
      record_type: "A"
      ttl: 30
      desired: "primary"
      powerdns_account: "hyops"
      powerdns_comment: "Managed by HybridOps DR failover"
