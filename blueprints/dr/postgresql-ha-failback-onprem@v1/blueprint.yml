api_version: hybridops/v1
kind: BlueprintSpec

blueprint_ref: "dr/postgresql-ha-failback-onprem@v1"
mode: "hybrid"

metadata:
  title: "PostgreSQL HA DR Failback to On-Prem (pgBackRest restore)"
  description: "Rebuild an on-prem Patroni + etcd PostgreSQL HA cluster on a shared SDN foundation and restore from a pgBackRest repository. This blueprint is intended for controlled failback after a cloud failover."
  outcome: "On-prem PostgreSQL HA is restored from backups and publishes standard DB connection outputs."

policy:
  fail_fast: true
  evidence_required: true
  ipam_authority: "none"

steps:
  - id: template_image_rocky9
    module_ref: "core/onprem/template-image"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    contracts:
      addressing_mode: "static"
    inputs:
      template_key: "rocky-9"

  - id: postgres_ha_vms
    module_ref: "platform/onprem/platform-vm"
    state_instance: "postgres_ha_vms_onprem_failback"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    requires:
      - template_image_rocky9
    contracts:
      addressing_mode: "static"
    inputs:
      require_ipam: false
      template_state_ref: "core/onprem/template-image"
      template_key: "rocky-9"
      ssh_username: "opsadmin"
      post_apply_ssh_readiness:
        enabled: true
        required: true
        ssh_proxy_jump_auto: false
        connectivity_wait_s: 180
      vms:
        pgha-01:
          role: "postgres"
          interfaces:
            - bridge: "vnetdata"
              ipv4:
                address: "CHANGE_ME_PG01_IP_CIDR"   # e.g. 10.12.0.31/24
                gateway: "CHANGE_ME_PG_GATEWAY"     # e.g. 10.12.0.1
        pgha-02:
          role: "postgres"
          interfaces:
            - bridge: "vnetdata"
              ipv4:
                address: "CHANGE_ME_PG02_IP_CIDR"
                gateway: "CHANGE_ME_PG_GATEWAY"
        pgha-03:
          role: "postgres"
          interfaces:
            - bridge: "vnetdata"
              ipv4:
                address: "CHANGE_ME_PG03_IP_CIDR"
                gateway: "CHANGE_ME_PG_GATEWAY"

  - id: postgresql_restore
    module_ref: "platform/postgresql-ha"
    state_instance: "postgresql_restore_onprem_failback"
    action: "deploy"
    phase: "operations"
    with_deps: false
    skip_if_state_ok: true
    verify_state_on_skip: true
    requires:
      - postgres_ha_vms
    contracts:
      addressing_mode: "static"
    inputs:
      inventory_requires_ipam: false
      inventory_state_ref: "platform/onprem/platform-vm#postgres_ha_vms_onprem_failback"
      inventory_vm_groups:
        etcd_cluster: ["pgha-01", "pgha-02", "pgha-03"]
        master: ["pgha-01"]
        replica: ["pgha-02", "pgha-03"]
        postgres_cluster: ["pgha-01", "pgha-02", "pgha-03"]
      execution_plane: "runner-local"

      # Restore mode (guarded)
      apply_mode: "restore"
      restore_confirm: false
      # Restore source must be explicit. Prefer backup_state_ref so HyOps resolves
      # restore selectors from backup-run state instead of manual pinning.
      backup_state_ref: ""
      backup_state_env: ""
      restore_set: ""
      restore_target_timeline: ""
      restore_target_time: ""
      restore_delta: true

      # pgBackRest repository source (state-driven, no bucket duplication)
      repo_state_ref: "org/gcp/object-repo#pgbackrest_primary"
      repo_path: "/pgbackrest"
      gcs_sa_json_env: "PG_BACKUP_GCS_SA_JSON"
      gcs_sa_dest: "/var/lib/hybridops/pgbackrest/gcs-sa.json"

      required_env:
        - "PATRONI_SUPERUSER_PASSWORD"
        - "PATRONI_REPLICATION_PASSWORD"
        - "NETBOX_DB_PASSWORD"
        - "PG_BACKUP_GCS_SA_JSON"
      # Preferred client-facing DB endpoint for cutover.
      # Set this to a stable DNS name to avoid teaching applications raw leader IPs.
      endpoint_dns_name: ""
      load_vault_env: true

  - id: postgresql_backup_config
    module_ref: "platform/postgresql-ha-backup"
    state_instance: "postgresql_backup_config_onprem_failback"
    action: "deploy"
    phase: "operations"
    with_deps: false
    skip_if_state_ok: true
    verify_state_on_skip: true
    requires:
      - postgresql_restore
    contracts:
      addressing_mode: "static"
    inputs:
      inventory_requires_ipam: false
      inventory_state_ref: "platform/onprem/platform-vm#postgres_ha_vms_onprem_failback"
      inventory_vm_groups:
        etcd_cluster: ["pgha-01", "pgha-02", "pgha-03"]
        master: ["pgha-01"]
        replica: ["pgha-02", "pgha-03"]
        postgres_cluster: ["pgha-01", "pgha-02", "pgha-03"]
      execution_plane: "runner-local"

      # Repository backend/location resolved from module state.
      repo_state_ref: "org/gcp/object-repo#pgbackrest_primary"
      repo_path: "/pgbackrest"
      gcs_sa_json_env: "PG_BACKUP_GCS_SA_JSON"
      gcs_sa_dest: "/var/lib/hybridops/pgbackrest/gcs-sa.json"
      required_env:
        - "PATRONI_SUPERUSER_PASSWORD"
        - "PATRONI_REPLICATION_PASSWORD"
        - "PG_BACKUP_GCS_SA_JSON"
      # Optional cross-cloud secondary backup copy (repo2).
      # Keep disabled by default; enable based on decision policy.
      secondary_enabled: false
      secondary_repo_state_ref: ""
      secondary_backend: ""
      load_vault_env: true

  - id: postgresql_dns_cutover
    module_ref: "platform/network/dns-routing"
    state_instance: "postgresql_dns_cutover_onprem_failback"
    action: "deploy"
    phase: "operations"
    with_deps: false
    requires:
      - postgresql_backup_config
    inputs:
      target_user: "opsadmin"
      target_port: 22
      ssh_private_key_env: "WAN_EDGE_SSH_PRIVATE_KEY"
      load_vault_env: true
      required_env:
        - "POWERDNS_API_KEY"
        - "WAN_EDGE_SSH_PRIVATE_KEY"

      provider: "powerdns-api"
      powerdns_state_ref: "platform/network/powerdns-authority#shared_primary"
      endpoint_state_ref: "platform/postgresql-ha#postgresql_restore_onprem_failback"
      endpoint_fqdn_output_key: "endpoint_dns_name"
      endpoint_target_output_key: "endpoint_host"
      record_type: "A"
      ttl: 30
      desired: "primary"
      dry_run: false
      dns_apply: true

      powerdns_account: "hyops"
      powerdns_comment: "Managed by HybridOps DR failback"

  - id: postgresql_dns_status
    module_ref: "platform/network/dns-routing"
    state_instance: "postgresql_dns_status_ha_failback_onprem"
    action: "deploy"
    phase: "operations"
    with_deps: false
    skip_if_state_ok: false
    requires:
      - postgresql_dns_cutover
    inputs:
      apply_mode: "status"
      target_user: "opsadmin"
      target_port: 22
      ssh_private_key_env: "WAN_EDGE_SSH_PRIVATE_KEY"
      load_vault_env: true
      required_env:
        - "POWERDNS_API_KEY"
        - "WAN_EDGE_SSH_PRIVATE_KEY"
      provider: "powerdns-api"
      powerdns_state_ref: "platform/network/powerdns-authority#shared_primary"
      endpoint_state_ref: "platform/postgresql-ha#postgresql_restore_onprem_failback"
      endpoint_fqdn_output_key: "endpoint_dns_name"
      endpoint_target_output_key: "endpoint_host"
      record_type: "A"
      ttl: 30
      desired: "primary"
      powerdns_account: "hyops"
      powerdns_comment: "Managed by HybridOps DR failback"
