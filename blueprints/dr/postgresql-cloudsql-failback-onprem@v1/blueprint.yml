api_version: hybridops/v1
kind: BlueprintSpec

blueprint_ref: "dr/postgresql-cloudsql-failback-onprem@v1"
mode: "hybrid"

metadata:
  title: "PostgreSQL Managed DR Failback to On-Prem"
  description: "Require explicit acknowledgement that the managed cloud primary has been fenced and the on-prem PostgreSQL HA lane has been rebuilt or reseeded, then cut the stable PostgreSQL service endpoint back on-prem."
  outcome: "Application traffic is redirected back to the on-prem PostgreSQL HA endpoint after a controlled managed-cloud DR event."

policy:
  fail_fast: true
  evidence_required: true
  ipam_authority: "none"

steps:
  - id: failback_gate
    module_ref: "core/shared/manual-gate"
    action: "deploy"
    phase: "operations"
    with_deps: false
    inputs:
      gate_name: "postgresql-cloudsql-failback-onprem"
      gate_message: "Confirm the managed cloud primary is fenced, the on-prem PostgreSQL HA target is rebuilt and writable, and failback is approved."
      confirm: false
      assertions:
        managed_primary_fenced: false
        onprem_target_rebuilt: false
        onprem_primary_writable: false
        failback_approved: false
      evidence_notes: []

  - id: postgresql_dns_cutback
    module_ref: "platform/network/dns-routing"
    action: "deploy"
    phase: "operations"
    with_deps: false
    requires:
      - failback_gate
    inputs:
      target_user: "opsadmin"
      target_port: 22
      ssh_private_key_env: "WAN_EDGE_SSH_PRIVATE_KEY"
      load_vault_env: true
      required_env:
        - "POWERDNS_API_KEY"
        - "WAN_EDGE_SSH_PRIVATE_KEY"

      provider: "powerdns-api"
      powerdns_state_ref: "platform/network/powerdns-authority#shared_primary"
      endpoint_state_ref: "platform/postgresql-ha"
      endpoint_fqdn_output_key: "endpoint_dns_name"
      endpoint_target_output_key: "endpoint_target"
      record_type: "A"
      ttl: 30
      desired: "primary"
      dry_run: false
      dns_apply: true

      powerdns_account: "hyops"
      powerdns_comment: "Managed by HybridOps Cloud SQL DR failback"
