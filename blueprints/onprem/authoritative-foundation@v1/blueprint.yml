api_version: hybridops/v1
kind: BlueprintSpec

blueprint_ref: "onprem/authoritative-foundation@v1"
mode: "authoritative"

metadata:
  title: "On-Prem Authoritative Foundation"
  description: "Day-1+ chain where NetBox state gates IPAM-driven platform VM expansion. Non-foundation steps are optional until inputs are finalized."
  outcome: "Subsequent platform services provision from authoritative NetBox-backed intent."

policy:
  fail_fast: true
  evidence_required: true
  ipam_authority: "netbox"

steps:
  - id: network_sdn
    module_ref: "core/onprem/network-sdn"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    skip_if_state_ok: true
    verify_state_on_skip: true
    contracts:
      addressing_mode: "static"
    inputs:
      zone_name: "hybzone"
      zone_bridge: "vmbr0"
      uplink_interface: "vmbr0"
      dns_domain: "hybridops.local"
      vnets:
        vnetmgmt:
          vlan_id: 10
          description: "Management network"
          subnets:
            submgmt:
              cidr: "10.10.0.0/24"
              gateway: "10.10.0.1"
              dhcp_range_start: "10.10.0.120"
              dhcp_range_end: "10.10.0.220"
              dhcp_dns_server: "8.8.8.8"
        vnetdata:
          vlan_id: 12
          description: "Shared services/data network"
          subnets:
            subdata:
              cidr: "10.12.0.0/24"
              gateway: "10.12.0.1"
              dhcp_range_start: "10.12.0.120"
              dhcp_range_end: "10.12.0.220"
              dhcp_dns_server: "8.8.8.8"

  - id: netbox_foundation
    module_ref: "platform/onprem/netbox"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    # NetBox is the authority gate for downstream IPAM-driven provisioning.
    # Reconcile it on deploy so service drift cannot hide behind stale state.
    skip_if_state_ok: false
    requires:
      - network_sdn
    contracts:
      addressing_mode: "static"
    inputs:
      target_state_ref: "platform/onprem/platform-vm#platform_vms"
      target_vm_key: "netbox-01"
      ssh_proxy_jump_auto: true
      connectivity_timeout_s: 5
      connectivity_wait_s: 180
      load_vault_env: true
      db_state_ref: "platform/onprem/postgresql-core"
      allow_legacy_pgcore: true
      seed_foundation_netbox_sync: true
      seed_foundation_netbox_wait_s: 120

  - id: control_plane_vm
    module_ref: "platform/onprem/platform-vm"
    state_instance: "control_plane_vm"
    action: "deploy"
    phase: "authoritative"
    with_deps: true
    optional: true
    requires:
      - netbox_foundation
    contracts:
      addressing_mode: "ipam"
      requires_authority: "netbox"
      requires_module_state_ok:
        - "platform/onprem/netbox"
    inputs:
      require_ipam: true
      template_state_ref: "core/onprem/template-image"
      template_key: "ubuntu-24.04"
      ssh_username: "opsadmin"
      vm_role: "control-plane"
      tags:
        - "platform"
        - "onprem"
        - "control-plane"
        - "critical"
      addressing:
        mode: "ipam"
        ipam:
          provider: "netbox"
          network_state_ref: "core/onprem/network-sdn"
      vms:
        ctrl-01:
          role: "control-plane"
          interfaces:
            - bridge: "vnetmgmt"

  - id: postgres_core_vm
    module_ref: "platform/onprem/postgresql-core"
    action: "deploy"
    phase: "authoritative"
    with_deps: true
    optional: true
    requires:
      - netbox_foundation
    contracts:
      addressing_mode: "ipam"
      requires_authority: "netbox"
      requires_module_state_ok:
        - "platform/onprem/netbox"

  - id: custom_platform_vm
    module_ref: "platform/onprem/platform-vm"
    state_instance: "custom_platform_vm"
    action: "deploy"
    phase: "authoritative"
    optional: true
    requires:
      - netbox_foundation
    contracts:
      addressing_mode: "ipam"
      requires_authority: "netbox"
      requires_module_state_ok:
        - "platform/onprem/netbox"
    inputs:
      require_ipam: true
