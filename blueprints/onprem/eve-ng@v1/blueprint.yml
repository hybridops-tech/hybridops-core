api_version: hybridops/v1
kind: BlueprintSpec

blueprint_ref: "onprem/eve-ng@v1"
mode: "hybrid"

metadata:
  title: "On-Prem EVE-NG Platform Stack"
  description: "Build a Jammy template image (if needed), provision a standalone EVE-NG VM on the Proxmox uplink, then configure EVE-NG."
  outcome: "EVE-NG is installed and reachable."

policy:
  fail_fast: true
  evidence_required: true
  ipam_authority: "none"

recoverable_secrets:
  - "EVENG_ROOT_PASSWORD"
  - "EVENG_ADMIN_PASSWORD"

access:
  type: "ssh-forward"
  state_ref: "platform/onprem/platform-vm#eve_ng_vm"
  remote_port: 80
  path: "/"
  ssh_user: "opsadmin"
  ssh_key_file: "~/.ssh/id_ed25519"
  native_console_mode: "eve-ng-qemu"
  guest_network_label: "Cloud9"
  guest_gateway: "172.29.129.1"
  guest_dhcp_range: "172.29.129.50-172.29.129.200"
  offer_destroy_on_close: true

archive_before_destroy:
  module_ref: "platform/linux/eve-ng-lab-archive"
  state_instance: "eve_ng_lab_archive"
  inputs:
    inventory_state_ref: "platform/onprem/platform-vm#eve_ng_vm"
    inventory_vm_groups:
      targets:
        - "eve-ng-01"
    target_user: "opsadmin"
    ssh_private_key_file: "~/.ssh/id_ed25519"
    ssh_proxy_jump_auto: true
    ssh_proxy_jump_user: "root"
    become: true
    become_user: "root"
    eveng_lab_archive_action: "export"
    eveng_lab_archive_include_node_state: true

steps:
  - id: template_image_jammy
    module_ref: "core/onprem/template-image"
    state_instance: "template_image_ubuntu_22_04"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    retain_on_destroy: true
    contracts:
      addressing_mode: "static"
    inputs:
      template_key: "ubuntu-22.04"
      post_build_smoke:
        enabled: true
        required: true

  - id: eve_ng_vm
    module_ref: "platform/onprem/platform-vm"
    state_instance: "eve_ng_vm"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    requires:
      - template_image_jammy
    contracts:
      addressing_mode: "static"
    inputs:
      require_ipam: false
      template_state_ref: "core/onprem/template-image#template_image_ubuntu_22_04"
      template_key: "ubuntu-22.04"
      cpu_cores: 8
      memory_mb: 32768
      disk_size_gb: 256
      ssh_username: "opsadmin"
      vms:
        eve-ng-01:
          role: "eve-ng"
          interfaces:
            - bridge: "vmbr0"
              ipv4:
                address: "dhcp"

  - id: eve_ng_config
    module_ref: "platform/linux/eve-ng"
    action: "deploy"
    phase: "operations"
    with_deps: false
    requires:
      - eve_ng_vm
    contracts:
      addressing_mode: "static"
    inputs:
      inventory_state_ref: "platform/onprem/platform-vm#eve_ng_vm"
      inventory_vm_groups:
        targets:
          - "eve-ng-01"
      target_user: "opsadmin"
      ssh_proxy_jump_auto: true
      ssh_proxy_jump_user: "root"
      become: true
      become_user: "root"
      eveng_resource_profile: "standard"
      eveng_guest_nat_enabled: true

  - id: eve_ng_images
    module_ref: "platform/linux/eve-ng-images"
    state_instance: "eve_ng_images"
    action: "deploy"
    phase: "operations"
    with_deps: false
    skip_if_state_ok: false
    requires:
      - eve_ng_config
    contracts:
      addressing_mode: "static"
    inputs:
      inventory_state_ref: "platform/onprem/platform-vm#eve_ng_vm"
      inventory_vm_groups:
        targets:
          - "eve-ng-01"
      target_user: "opsadmin"
      ssh_private_key_file: "~/.ssh/id_ed25519"
      ssh_proxy_jump_auto: true
      ssh_proxy_jump_user: "root"
      become: true
      become_user: "root"
      eveng_images_source: "url"
      eveng_images_logging_enabled: true
      eveng_images_generate_report: true
      eveng_images_list:
        - url: "https://mega.nz/folder/30p3TKob#42_S__9wwPVO0zHIfC4xow/file/LhBG1ZQI"
          name: "linux-alpine-3.21.3.tar.gz"
          type: "qemu"
        - url: "https://mega.nz/folder/30p3TKob#42_S__9wwPVO0zHIfC4xow/file/GopE0RJR"
          name: "linux-netem.tar.gz"
          type: "qemu"
        - url: "https://mega.nz/folder/30p3TKob#42_S__9wwPVO0zHIfC4xow/file/nkJjgBQL"
          name: "linux-tinycore-6.4.tar.gz"
          type: "qemu"
        - url: "https://mega.nz/folder/30p3TKob#42_S__9wwPVO0zHIfC4xow/file/uoIABDjA"
          name: "linux-ubuntu-24.04.01-server.tar.gz"
          type: "qemu"

  - id: eve_ng_healthcheck
    module_ref: "platform/linux/eve-ng-healthcheck"
    state_instance: "eve_ng_healthcheck"
    action: "deploy"
    phase: "operations"
    with_deps: false
    skip_if_state_ok: false
    requires:
      - eve_ng_images
    contracts:
      addressing_mode: "static"
    inputs:
      inventory_state_ref: "platform/onprem/platform-vm#eve_ng_vm"
      inventory_vm_groups:
        targets:
          - "eve-ng-01"
      target_user: "opsadmin"
      ssh_proxy_jump_auto: true
      ssh_proxy_jump_user: "root"
      become: true
      become_user: "root"
      load_vault_env: true
      required_env:
        - "EVENG_ADMIN_PASSWORD"
      health_check_level: "basic"
