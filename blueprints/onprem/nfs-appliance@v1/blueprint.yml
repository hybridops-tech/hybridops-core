api_version: hybridops/v1
kind: BlueprintSpec

blueprint_ref: "onprem/nfs-appliance@v1"
mode: "hybrid"

metadata:
  title: "On-Prem NFS Appliance"
  description: "Build or consume an Ubuntu template, provision an on-prem NFS appliance VM on Proxmox, and bootstrap its export intent through cloud-init."
  outcome: "A state-published on-prem NFS appliance exists for internal workload storage consumption."

policy:
  fail_fast: true
  evidence_required: true
  ipam_authority: "netbox"

steps:
  - id: template_image_ubuntu_24_04
    module_ref: "core/onprem/template-image"
    state_instance: "template_image_ubuntu_24_04"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    contracts:
      addressing_mode: "static"
    inputs:
      template_key: "ubuntu-24.04"
      post_build_smoke:
        enabled: true
        required: true

  - id: nfs_appliance_vm
    module_ref: "platform/onprem/nfs-appliance"
    state_instance: "nfs_appliance_vm"
    action: "deploy"
    phase: "bootstrap"
    with_deps: true
    requires:
      - template_image_ubuntu_24_04
    contracts:
      addressing_mode: "ipam"
      requires_authority: "netbox"
    inputs:
      require_ipam: true
      template_state_ref: "core/onprem/template-image#template_image_ubuntu_24_04"
      template_key: "ubuntu-24.04"
      ssh_keys_from_init: true
      ssh_keys_init_target: "proxmox"
      provider_kind: "virtual-nas"
      nfs_export_path: "/srv/nfs/hybridops/academy/moodledata"
      nfs_mount_options:
        - "nfsvers=4.1"
        - "hard"
        - "timeo=600"
        - "retrans=2"
      snapshot_profile: "local-snapshots"
      backup_profile: "cloud-object-export"
      addressing:
        mode: "ipam"
        ipam:
          provider: "netbox"
          network_state_ref: "core/onprem/network-sdn"
      vms:
        nas-01:
          role: "storage-appliance"
          interfaces:
            - bridge: "vnetmgmt"
          cloud_init_user_data: |
            #cloud-config
            package_update: true
            package_upgrade: false
            packages:
              - nfs-kernel-server
            write_files:
              - path: /etc/exports.d/hybridops-academy.exports
                permissions: '0644'
                content: |
                  /srv/nfs/hybridops/academy/moodledata 10.10.40.0/24(rw,sync,no_subtree_check,no_root_squash)
            runcmd:
              - mkdir -p /srv/nfs/hybridops/academy/moodledata
              - chown nobody:nogroup /srv/nfs/hybridops/academy/moodledata
              - chmod 0775 /srv/nfs/hybridops/academy/moodledata
              - systemctl enable --now nfs-kernel-server
              - exportfs -ra
              - touch /var/lib/cloud/instance/ansible-ready
          cloud_init_meta_data: |
            instance-id: nas-01
            local-hostname: nas-01
