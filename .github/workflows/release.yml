# purpose: Publish HybridOps.Core release bundles on version tags.
# adr: ADR-0622
# maintainer: HybridOps.Tech

name: Publish HybridOps.Core Release Bundle

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  publish-bundle:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build release bundle
        shell: bash
        run: |
          export HYOPS_RELEASE_LABEL="${GITHUB_REF_NAME#v}"
          bash pkg/build_release.sh

      - name: Verify release bundle
        shell: bash
        run: |
          TARBALL="$(ls -1 dist/releases/hybridops-core-*.tar.gz | head -n 1)"
          bash pkg/verify_release.sh "${TARBALL}"

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          assets=(dist/releases/*.tar.gz dist/releases/*.tar.gz.sha256)
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" --generate-notes --verify-tag
          fi
