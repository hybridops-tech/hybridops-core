# purpose: CI for HybridOps.Core release-bundle integrity.
# adr: ADR-0622
# maintainer: HybridOps.Tech

name: HybridOps.Core CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build-and-verify-bundle:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build release bundle
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            export HYOPS_RELEASE_LABEL="${GITHUB_REF_NAME#v}"
          else
            export HYOPS_RELEASE_LABEL="${GITHUB_SHA::12}"
          fi
          bash pkg/build_release.sh

      - name: Verify release bundle
        shell: bash
        run: |
          TARBALL="$(ls -1 dist/releases/hybridops-core-*.tar.gz | head -n 1)"
          bash pkg/verify_release.sh "${TARBALL}"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: hybridops-core-release-bundle
          path: |
            dist/releases/*.tar.gz
            dist/releases/*.tar.gz.sha256

  build-macos-package:
    needs: quality
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build macOS package
        shell: bash
        run: |
          export HYOPS_RELEASE_LABEL="${GITHUB_SHA::12}"
          bash pkg/build_release.sh
          TARBALL="$(ls -1 dist/releases/hybridops-core-*.tar.gz | head -n 1)"
          bash pkg/build_macos_pkg.sh \
            --archive "${TARBALL}" \
            --version "0.0.${GITHUB_RUN_NUMBER}" \
            --output "dist/releases/hybridops-core-${HYOPS_RELEASE_LABEL}-macos.pkg"

      - name: Inspect macOS package
        shell: bash
        run: |
          PKG="$(ls -1 dist/releases/hybridops-core-*-macos.pkg | head -n 1)"
          EXPANDED="${RUNNER_TEMP}/hybridops-core-pkg"
          pkgutil --expand "${PKG}" "${EXPANDED}"
          test -f "${EXPANDED}/Distribution"
          test -n "$(find "${EXPANDED}" -maxdepth 1 -type d -name '*.pkg' -print -quit)"

      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v7
        with:
          name: hybridops-core-macos-package
          path: dist/releases/*-macos.pkg
