# purpose: Shared quality gates for HybridOps.Core source and release workflows.
# adr: ADR-0622
# maintainer: HybridOps.Tech

name: HybridOps.Core Quality

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run Python quality checks
        shell: bash
        run: bash tools/ci/check-python.sh

  python-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Load toolchain pins
        shell: bash
        run: |
          source tools/setup/requirements/toolchain.lock
          echo "RUFF_VERSION=${RUFF_VERSION}" >> "${GITHUB_ENV}"

      - name: Install Ruff
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==${RUFF_VERSION}"

      - name: Run Ruff checks
        shell: bash
        run: bash tools/ci/check-ruff.sh

  install-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run install quality checks
        shell: bash
        run: bash tools/ci/check-install.sh

  ansible-syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Load toolchain pins
        shell: bash
        run: |
          source tools/setup/requirements/toolchain.lock
          echo "ANSIBLE_CORE_VERSION=${ANSIBLE_CORE_VERSION}" >> "${GITHUB_ENV}"
          echo "ANSIBLE_LINT_VERSION=${ANSIBLE_LINT_VERSION}" >> "${GITHUB_ENV}"

      - name: Install Ansible dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "ansible-core==${ANSIBLE_CORE_VERSION}" \
            "ansible-lint==${ANSIBLE_LINT_VERSION}" \
            "PyYAML>=6.0,<7"

      - name: Run Ansible syntax checks
        shell: bash
        run: bash tools/ci/check-ansible.sh

  shell-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Load toolchain pins
        shell: bash
        run: |
          source tools/setup/requirements/toolchain.lock
          echo "SHELLCHECK_VERSION=${SHELLCHECK_VERSION}" >> "${GITHUB_ENV}"

      - name: Install ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          install_root="${RUNNER_TEMP}/shellcheck-${SHELLCHECK_VERSION}"
          rm -rf "${install_root}"
          mkdir -p "${install_root}"
          curl -fsSLo "${install_root}/shellcheck.tar.xz" \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          tar -C "${install_root}" --strip-components=1 -xf "${install_root}/shellcheck.tar.xz"
          echo "${install_root}" >> "${GITHUB_PATH}"

      - name: Run ShellCheck
        shell: bash
        run: bash tools/ci/check-shell.sh

  ansible-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Load toolchain pins
        shell: bash
        run: |
          source tools/setup/requirements/toolchain.lock
          echo "ANSIBLE_CORE_VERSION=${ANSIBLE_CORE_VERSION}" >> "${GITHUB_ENV}"
          echo "ANSIBLE_LINT_VERSION=${ANSIBLE_LINT_VERSION}" >> "${GITHUB_ENV}"

      - name: Install Ansible lint dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "ansible-core==${ANSIBLE_CORE_VERSION}" \
            "ansible-lint==${ANSIBLE_LINT_VERSION}" \
            "PyYAML>=6.0,<7"

      - name: Run Ansible lint
        shell: bash
        run: bash tools/ci/lint-ansible.sh

  terraform-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Load toolchain pins
        shell: bash
        run: |
          source tools/setup/requirements/toolchain.lock
          echo "TERRAFORM_VERSION=${TERRAFORM_VERSION}" >> "${GITHUB_ENV}"
          echo "TFLINT_VERSION=${TFLINT_VERSION}" >> "${GITHUB_ENV}"

      - name: Install Terraform
        shell: bash
        run: |
          set -euo pipefail
          install_root="${RUNNER_TEMP}/terraform-${TERRAFORM_VERSION}"
          rm -rf "${install_root}"
          mkdir -p "${install_root}"
          curl -fsSLo "${install_root}/terraform.zip" \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          python - "${install_root}/terraform.zip" "${install_root}" <<'PY'
          import sys
          import zipfile

          archive_path = sys.argv[1]
          install_root = sys.argv[2]
          with zipfile.ZipFile(archive_path) as archive:
              archive.extractall(install_root)
          PY
          chmod +x "${install_root}/terraform"
          echo "${install_root}" >> "${GITHUB_PATH}"

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v${{ env.TFLINT_VERSION }}

      - name: Run Terraform quality checks
        shell: bash
        run: bash tools/ci/check-terraform.sh

  yaml-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Load toolchain pins
        shell: bash
        run: |
          source tools/setup/requirements/toolchain.lock
          echo "YAMLLINT_VERSION=${YAMLLINT_VERSION}" >> "${GITHUB_ENV}"

      - name: Install yamllint
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "yamllint==${YAMLLINT_VERSION}"

      - name: Run YAML quality checks
        shell: bash
        run: bash tools/ci/check-yaml.sh
