name_prefix: "corp"
context_id: "prod-a"
zone_name: "hybzone"
zone_bridge: "vmbr0"
uplink_interface: "vmbr0"
dns_domain: "corp.example"
dns_lease: "24h"
enable_snat: true
enable_host_l3: true
enable_dhcp: true
vnets:
  vnetmgmt:
    vlan_id: 10
    description: "Management network"
    subnets:
      submgmt:
        cidr: "10.10.0.0/24"
        gateway: "10.10.0.1"
        dhcp_range_start: "10.10.0.120"
        dhcp_range_end: "10.10.0.220"
        dhcp_dns_server: "10.10.0.53"
  vnetobs:
    vlan_id: 11
    description: "Observability network"
    subnets:
      subobs:
        cidr: "10.11.0.0/24"
        gateway: "10.11.0.1"
        dhcp_range_start: "10.11.0.120"
        dhcp_range_end: "10.11.0.220"
        dhcp_dns_server: "10.11.0.53"
  vnetdata:
    vlan_id: 12
    description: "Shared services network"
    subnets:
      subdata:
        cidr: "10.12.0.0/24"
        gateway: "10.12.0.1"
        dhcp_range_start: "10.12.0.120"
        dhcp_range_end: "10.12.0.220"
        dhcp_dns_server: "10.12.0.53"
  vnetlab:
    vlan_id: 50
    description: "Lab network"
    subnets:
      sublab:
        cidr: "10.50.0.0/24"
        gateway: "10.50.0.1"
        dhcp_range_start: "10.50.0.120"
        dhcp_range_end: "10.50.0.220"
        dhcp_dns_server: "10.50.0.53"
