image_key: "vyos-1.5"
image_ref: ""
artifact_state_ref: "core/shared/vyos-image-build#vyos_default_build"
artifact_key: "vyos-1.5"
# Required when the shared artifact contract resolves to a private GCS-backed qcow2.
required_env:
  - "HYOPS_VYOS_GCS_SA_JSON"
# Leave these empty when consuming a shared artifact contract so HybridOps can
# version the Hetzner snapshot identity from the upstream artifact state.
image_version: ""
image_description: ""
# Set image_source_url only when intentionally bypassing the shared artifact contract.
image_source_url: ""
# Required for the built-in qcow2 wrapper path. The base URL must reach the
# execution host from the internet, for example a shared control host.
seed_wrapper_public_base_url: "http://203.0.113.10:18080"
image_architecture: "x86"
image_compression: "xz"
# Optional: pin the temporary import server location if your Hetzner project
# does not allow the seed tool default location.
# seed_location: "nbg1"
# Optional: pin a larger temporary server type when your image virtual size is
# larger than the default import server disk.
# seed_server_type: "cpx21"
seed_if_missing: true
seed_tool: "hcloud-upload-image"
# seed_command: "your-own-wrapper ..."
