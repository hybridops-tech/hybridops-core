# Minimal inputs for Argo CD root-app bootstrap.
# Public/default usage points to the exported HybridOps workloads repository.
# Private canonical deployments can switch to `repo_access_mode: ssh`,
# set an SSH repo URL, and use `.internal/clusters/<target>` for
# workloads_target_path while keeping the deploy key in vault-backed env.

kubeconfig_path: "~/.hybridops/envs/dev/state/kubeconfigs/rke2.yaml"
workloads_repo_url: "https://github.com/hybridops-tech/hybridops-workloads.git"
workloads_revision: "d19d389c769bc4ebbbc38bc791f808285dbf9e10"
workloads_target_path: "clusters/onprem"
