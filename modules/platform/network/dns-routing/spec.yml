api_version: hybridops/v1
kind: ModuleSpec

module_ref: "platform/network/dns-routing"

metadata:
  title: "DNS Routing Control"
  description: "Publishes and optionally applies DNS routing intent for primary/secondary cutover control."

requirements:
  credentials: []

inputs:
  defaults:
    apply_mode: "bootstrap" # bootstrap|status
    # Inventory. Prefer state-driven inventory from edge foundation.
    inventory_groups: {}
    inventory_state_ref: ""
    inventory_vm_groups: {}

    # SSH defaults applied to every host in inventory.
    target_user: "root"
    target_port: 22
    ssh_private_key_file: ""
    ssh_private_key_env: ""
    ssh_proxy_jump_auto: false
    ssh_proxy_jump_host: ""
    ssh_proxy_jump_user: "root"
    ssh_proxy_jump_port: 22
    become: true
    become_user: "root"

    # Preflight/apply: ensure SSH is reachable before running Ansible.
    connectivity_check: true
    connectivity_timeout_s: 5
    connectivity_wait_s: 0

    # Vault/env wiring
    required_env: []
    required_env_destroy: []
    load_vault_env: false

    # Role wiring
    dns_role_fqcn: "hybridops.common.dns_routing"
    dns_state: "present"
    dns_state_dir: "/opt/hybridops/dns-routing/state"
    dns_intent_file: "latest.json"

    # Routing contract
    provider: "manual-command" # manual-command|powerdns-api
    zone: ""
    record_fqdn: ""
    endpoint_state_ref: ""
    endpoint_state_env: ""
    allow_cross_env_state: false
    endpoint_fqdn_output_key: "endpoint_dns_name"
    endpoint_target_output_key: "endpoint_target"
    record_type: "A"
    ttl: 60
    primary_targets: []
    secondary_targets: []
    desired: "primary" # primary|secondary

    # PowerDNS API provider settings.
    powerdns_state_ref: ""
    powerdns_state_env: ""
    powerdns_api_url: ""
    powerdns_server_id: "localhost"
    powerdns_zone_id: ""
    powerdns_api_key_env: "POWERDNS_API_KEY"
    powerdns_validate_tls: true
    powerdns_account: "hyops"
    powerdns_comment: ""

    # Execution policy
    dry_run: true
    dns_apply: false

    # Optional manual provider command (used only when dns_apply=true).
    # It is executed via shell on the target control host.
    # Available env vars: HYOPS_DNS_ZONE, HYOPS_DNS_RECORD_FQDN, HYOPS_DNS_RECORD_TYPE,
    # HYOPS_DNS_TTL, HYOPS_DNS_DESIRED, HYOPS_DNS_TARGETS_JSON.
    provider_command: ""

execution:
  driver: "config/ansible"
  profile: "onprem-linux@v1.0"
  pack_ref:
    id: "linux/common/network/40-dns-routing@v1.0"

outputs:
  publish:
    - dns.status
    - dns.provider
    - dns.zone
    - dns.record_fqdn
    - dns.record_type
    - dns.desired
    - dns.targets
    - dns.expected_targets
    - dns.observed_targets
    - dns.observed_ttl
    - dns.record_exists
    - dns.matches_desired
    - cap.network.dns_routing

probes: []
constraints: []
