# Minimal standalone example (explicit inventory + explicit edge/gateway IPs)
# Required secret:
#   export WAN_IPSEC_PSK='change-me'

inventory_groups:
  wan_edge:
    - name: edge01
      host: 198.51.100.10
    - name: edge02
      host: 198.51.100.11
connectivity_check: false

required_env:
  - WAN_IPSEC_PSK

edge01_vm_key: edge01
edge02_vm_key: edge02

edge01_public_local_ip: 198.51.100.10
edge02_public_local_ip: 198.51.100.11

edge01_public_peer_ip: 203.0.113.10
edge02_public_peer_ip: 203.0.113.11

edge01_inside_local_ip: 169.254.10.1
edge01_inside_peer_ip: 169.254.10.2
edge02_inside_local_ip: 169.254.10.5
edge02_inside_peer_ip: 169.254.10.6

edge01_router_id: 10.80.0.11
edge02_router_id: 10.80.0.12

wan_bgp_local_as: 65010
wan_bgp_peer_as: 64514

advertise_prefixes:
  - 10.80.0.0/24
import_allow_prefixes:
  - 10.70.0.0/20
export_allow_prefixes:
  - 10.80.0.0/24
