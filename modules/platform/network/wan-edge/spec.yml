api_version: hybridops/v1
kind: ModuleSpec

module_ref: "platform/network/wan-edge"

metadata:
  title: "WAN Edge Configuration"
  description: "Configure Linux WAN edge nodes (IPsec + BGP) via Ansible role consumption."

requirements:
  credentials: []

dependencies:
  - module_ref: "org/hetzner/wan-edge-foundation"
    required: false
    imports:
      edge01_public_ip: "edge01_public_local_ip"
      edge02_public_ip: "edge02_public_local_ip"
      edge01_private_ip: "edge01_router_id"
      edge02_private_ip: "edge02_router_id"

  - module_ref: "org/gcp/wan-vpn-to-edge"
    required: false
    imports:
      ha_vpn_gateway_ip_a: "edge01_public_peer_ip"
      ha_vpn_gateway_ip_b: "edge02_public_peer_ip"
      bgp_a_peer_ip: "edge01_inside_local_ip"
      bgp_a_gcp_ip: "edge01_inside_peer_ip"
      bgp_b_peer_ip: "edge02_inside_local_ip"
      bgp_b_gcp_ip: "edge02_inside_peer_ip"

inputs:
  defaults:
    # Inventory. Prefer state-driven inventory from edge foundation module.
    inventory_groups: {}
    inventory_state_ref: "org/hetzner/wan-edge-foundation"
    inventory_vm_groups:
      wan_edge:
        - "edge01"
        - "edge02"

    # SSH defaults applied to every host in the inventory.
    target_user: "root"
    target_port: 22
    ssh_private_key_file: ""
    ssh_proxy_jump_auto: false
    ssh_proxy_jump_host: ""
    ssh_proxy_jump_user: "root"
    ssh_proxy_jump_port: 22
    become: true
    become_user: "root"

    # Preflight/apply: ensure SSH is reachable before running Ansible.
    connectivity_check: true
    connectivity_timeout_s: 5
    connectivity_wait_s: 0

    # Vault/env wiring
    required_env:
      - "WAN_IPSEC_PSK"
    required_env_destroy: []
    load_vault_env: false

    # Role wiring
    wan_role_fqcn: "hybridops.network.wan_edge"
    wan_ipsec_psk_env: "WAN_IPSEC_PSK"

    # Canonical host keys expected in inventory group wan_edge.
    edge01_vm_key: "edge01"
    edge02_vm_key: "edge02"

    # Optional common interface override.
    wan_pub_if: ""

    # Public endpoint IPs (auto-imported when dependency states are available).
    edge01_public_local_ip: ""
    edge02_public_local_ip: ""
    edge01_public_peer_ip: ""
    edge02_public_peer_ip: ""

    # Tunnel inside addresses (auto-imported from gcp/wan-vpn-to-edge when available).
    edge01_inside_local_ip: "169.254.10.1"
    edge01_inside_peer_ip: "169.254.10.2"
    edge02_inside_local_ip: "169.254.10.5"
    edge02_inside_peer_ip: "169.254.10.6"
    inside_prefix_len: 30

    # Per-edge tunnel identity.
    edge01_tunnel_name: "gcp-a"
    edge02_tunnel_name: "gcp-b"
    edge01_tunnel_ifname: "vti10"
    edge02_tunnel_ifname: "vti11"
    edge01_tunnel_key: 10
    edge02_tunnel_key: 11

    # Router IDs (auto-imported from edge private IPs when available).
    edge01_router_id: "10.80.0.11"
    edge02_router_id: "10.80.0.12"

    # Optional loopbacks per edge node.
    edge01_loopbacks: []
    edge02_loopbacks: []

    # Shared BGP policy.
    wan_bgp_local_as: 65010
    wan_bgp_peer_as: 64514
    advertise_prefixes:
      - "10.80.0.0/24"
    import_allow_prefixes:
      - "10.70.0.0/20"
    export_allow_prefixes:
      - "10.80.0.0/24"

    # Optional role-level overrides by host key.
    # Example:
    # wan_host_overrides:
    #   edge01:
    #     wan_bgp:
    #       export_allow: ["10.80.0.0/24", "10.81.0.0/24"]
    wan_host_overrides: {}

    # Optional extra wan_ipsec fields merged into each host profile.
    # The PSK is always sourced from env/vault via wan_ipsec_psk_env.
    wan_ipsec:
      psk: ""
      proposals: "aes256-sha256-modp2048"
      esp_proposals: "aes256-sha256"
      dpd_delay: "30s"
      dpd_timeout: "120s"
      start_action: "start"
      close_action: "restart"
      dpd_action: "restart"

execution:
  driver: "config/ansible"
  profile: "onprem-linux@v1.0"
  pack_ref:
    id: "linux/common/network/10-wan-edge@v1.0"

outputs:
  publish:
    - edge01_vm_key
    - edge02_vm_key
    - edge01_public_local_ip
    - edge02_public_local_ip
    - edge01_public_peer_ip
    - edge02_public_peer_ip
    - edge01_inside_peer_ip
    - edge02_inside_peer_ip
    - cap.network.wan_edge

probes: []
constraints: []
