# State-driven example (recommended)
# Assumes upstream module states exist in this env:
#   - org/hetzner/shared-control-host#edge_control_host
#   - org/hetzner/vyos-edge-foundation
#   - org/gcp/wan-vpn-to-edge

inventory_state_ref: org/hetzner/shared-control-host#edge_control_host
inventory_vm_groups:
  edge_control:
    - control-01

target_user: opsadmin

required_env:
  - WAN_IPSEC_PSK
  - WAN_EDGE_SSH_PRIVATE_KEY

local_asn: 65010
peer_asn: 64514

# Leave this empty for the baseline GCP<->Hetzner underlay.
# Add spoke or on prem prefixes only after those routes actually exist on the edge.
advertise_prefixes: []

import_allow_prefixes: []
auto_include_cloud_core_cidr: true
auto_include_cloud_workloads_cidr: true
auto_include_cloud_workloads_pods_cidr: true
