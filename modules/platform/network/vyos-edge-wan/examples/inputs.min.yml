# Minimal explicit example (standalone)
# Required secret:
#   export WAN_IPSEC_PSK='change-me'

inventory_groups:
  edge_control:
    - name: control-01
      host: 10.80.0.20

target_user: opsadmin
connectivity_check: false

required_env:
  - WAN_IPSEC_PSK
  - WAN_EDGE_SSH_PRIVATE_KEY

edge01_ssh_host: 10.80.0.11
edge02_ssh_host: 10.80.0.12

edge01_public_ip: 203.0.113.11
edge02_public_ip: 203.0.113.12
edge01_peer_public_ip: 198.51.100.11
edge02_peer_public_ip: 198.51.100.12

edge01_inside_local_ip: 169.254.10.1
edge01_inside_peer_ip: 169.254.10.2
edge02_inside_local_ip: 169.254.10.5
edge02_inside_peer_ip: 169.254.10.6

edge01_router_id: 10.80.0.11
edge02_router_id: 10.80.0.12

local_asn: 65010
peer_asn: 64514

# Leave this empty until the edge has real spoke routes to originate.
advertise_prefixes: []

import_allow_prefixes:
  - 10.70.0.0/20
  - 10.70.16.0/20
