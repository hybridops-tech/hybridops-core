api_version: hybridops/v1
kind: ModuleSpec

module_ref: "platform/network/vyos-edge-wan"

metadata:
  title: "VyOS Edge WAN Day-2"
  description: "Configure IPsec + BGP day-2 policy on Hetzner VyOS edge peers from a shared control host."

requirements:
  credentials: []

dependencies:
  - module_ref: "org/hetzner/vyos-edge-foundation"
    required: false
    imports:
      edge01_public_ip: "edge01_public_ip"
      edge02_public_ip: "edge02_public_ip"
      edge01_private_ip: "edge01_ssh_host"
      edge02_private_ip: "edge02_ssh_host"

  - module_ref: "org/gcp/wan-vpn-to-edge"
    required: false
    imports:
      ha_vpn_gateway_ip_a: "edge01_peer_public_ip"
      ha_vpn_gateway_ip_b: "edge02_peer_public_ip"
      bgp_a_peer_ip: "edge01_inside_local_ip"
      bgp_a_gcp_ip: "edge01_inside_peer_ip"
      bgp_b_peer_ip: "edge02_inside_local_ip"
      bgp_b_gcp_ip: "edge02_inside_peer_ip"

inputs:
  defaults:
    # Inventory. Prefer state-driven inventory from shared control host.
    inventory_groups: {}
    inventory_state_ref: ""
    inventory_vm_groups: {}

    # SSH defaults applied to control host inventory.
    target_user: "opsadmin"
    target_port: 22
    ssh_private_key_file: ""
    ssh_proxy_jump_auto: false
    ssh_proxy_jump_host: ""
    ssh_proxy_jump_user: "root"
    ssh_proxy_jump_port: 22
    become: false
    become_user: "root"

    # Preflight/apply: ensure control host SSH is reachable.
    connectivity_check: true
    connectivity_timeout_s: 5
    connectivity_wait_s: 0

    # Vault/env wiring
    required_env:
      - "WAN_IPSEC_PSK"
      - "WAN_EDGE_SSH_PRIVATE_KEY"
    required_env_destroy: []
    load_vault_env: false

    # Role wiring
    vyos_wan_role_fqcn: "hybridops.common.vyos_edge_wan"
    vyos_wan_state: "present"
    wan_ipsec_psk_env: "WAN_IPSEC_PSK"

    # SSH from control host -> VyOS peers
    vyos_ssh_user: "vyos"
    vyos_ssh_port: 22
    vyos_ssh_key_file: "/home/opsadmin/.ssh/id_ed25519"
    vyos_ssh_private_key_env: "WAN_EDGE_SSH_PRIVATE_KEY"
    edge_ssh_connectivity_timeout_s: 8
    edge_ssh_connectivity_wait_s: 180
    vyos_ssh_opts:
      - "-o StrictHostKeyChecking=no"
      - "-o UserKnownHostsFile=/dev/null"
      - "-o ConnectTimeout=10"

    # Edge endpoints
    edge01_name: "edge01"
    edge02_name: "edge02"
    edge01_ssh_host: ""
    edge02_ssh_host: ""
    edge01_public_ip: ""
    edge02_public_ip: ""
    edge01_peer_public_ip: ""
    edge02_peer_public_ip: ""

    # Inside tunnel addresses from GCP HA VPN outputs
    edge01_inside_local_ip: "169.254.10.1"
    edge01_inside_peer_ip: "169.254.10.2"
    edge02_inside_local_ip: "169.254.10.5"
    edge02_inside_peer_ip: "169.254.10.6"
    inside_prefix_len: 30

    # Tunnel/BGP profile
    edge01_tunnel_ifname: "vti10"
    edge02_tunnel_ifname: "vti11"
    edge01_tunnel_name: "gcp-a"
    edge02_tunnel_name: "gcp-b"
    edge01_router_id: "10.80.0.11"
    edge02_router_id: "10.80.0.12"

    local_asn: 65010
    peer_asn: 64514

    advertise_prefixes: []
    import_allow_prefixes:
      - "10.70.0.0/20"
      - "10.70.16.0/20"

    ipsec_ike_group: "HYOPS-GCP-IKE"
    ipsec_esp_group: "HYOPS-GCP-ESP"
    bgp_export_prefix_list: "HYOPS-GCP-EXPORT"
    bgp_import_prefix_list: "HYOPS-GCP-IMPORT"
    bgp_export_route_map: "HYOPS-GCP-EXPORT"
    bgp_import_route_map: "HYOPS-GCP-IMPORT"

    validate_post_apply: true
    status_convergence_retries: 24
    status_convergence_delay_s: 10

    # Keep sensitive command output redacted by default.
    vyos_wan_no_log_sensitive: true

execution:
  driver: "config/ansible"
  profile: "onprem-linux@v1.0"
  pack_ref:
    id: "linux/common/network/15-vyos-edge-wan@v1.0"

outputs:
  publish:
    - vyos.edge01.peer_ip
    - vyos.edge02.peer_ip
    - vyos.edge01.bgp_neighbor
    - vyos.edge02.bgp_neighbor
    - cap.network.vyos_edge_wan

probes: []
constraints: []
