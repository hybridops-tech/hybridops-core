# State-driven inventory from Hetzner shared control host module.

inventory_state_ref: org/hetzner/shared-control-host
inventory_vm_groups:
  edge:
    - control-01

required_env:
  - EDGE_OBS_GRAFANA_ADMIN_PASSWORD
edge_obs_grafana_admin_password_env: EDGE_OBS_GRAFANA_ADMIN_PASSWORD

edge_obs_enable_receive: false
edge_obs_enable_store_gateway: false
edge_obs_enable_ruler: false
edge_obs_enable_prometheus: true
edge_obs_enable_blackbox_exporter: true
edge_obs_enable_thanos_sidecar: true
edge_obs_prometheus_external_labels:
  hyops_env: demo
  edge_node: control-01
edge_obs_probe_targets:
  - name: primary
    url: https://example.com/showcase/burst/
  - name: burst
    url: https://burst.example.com/showcase/burst/
