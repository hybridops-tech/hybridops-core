inventory_state_ref: org/hetzner/shared-control-host
inventory_vm_groups:
  edge_control:
  - control-01
thanos_query_url: http://127.0.0.1:10902
policy:
  version: v1
  mode: PRIMARY
  signals:
    primary_up_query: vector(0)
    error_rate_query: vector(1.0)
  thresholds:
    primary_up_min: 1
    error_rate_ratio: 0.02
actions:
  cutover_module_ref: platform/network/dns-routing
  failback_module_ref: platform/network/dns-routing
  cutover_desired: secondary
  failback_desired: primary
  module_inputs:
    provider: manual-command
    zone: example.com
    record_fqdn: learn-lms.example.com
    record_type: A
    ttl: 60
    primary_targets:
    - 203.0.113.10
    secondary_targets:
    - 198.51.100.20
    dry_run: true
    dns_apply: false
    inventory_state_ref: org/hetzner/shared-control-host
    inventory_vm_groups:
      edge_control:
      - control-01
  module_state_guards:
    cutover:
    - state_ref: platform/postgresql-ha#postgresql_restore_gcp_dr
      require_status: ok
      outputs_non_empty:
      - endpoint_host
    - state_ref: platform/k8s/longhorn-dr-volume#moodle_restore_gcp_dr
      require_status: ok
      outputs_equal:
        restore_volume_ready: true
    failback:
    - state_ref: platform/postgresql-ha#postgresql_restore_onprem_failback
      require_status: ok
      outputs_non_empty:
      - endpoint_host
dry_run: true
decision_enable_actions: false
decision_require_signal_readiness: true
decision_require_fresh_signals: true
decision_max_signal_age_s: 180
decision_min_ready_checks: 2
decision_require_action_state_guards: true
