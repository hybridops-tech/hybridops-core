inventory_groups:
  edge_control:
    - name: control-01
      host: 198.51.100.10
load_vault_env: true
required_env:
  - CLOUDFLARE_API_TOKEN
thanos_query_url: http://127.0.0.1:10902
decision_runtime_root: /opt/hybridops/decision-service/runtime/dev
decision_action_env_names:
  - CLOUDFLARE_API_TOKEN
policy:
  version: v1
  mode: PRIMARY
  signals:
    primary_up_query: min_over_time(probe_success{job="edge_blackbox_http",probe_target="primary"}[1m])
    edge_reachability_query: min_over_time(probe_success{job="edge_blackbox_http",probe_target="burst"}[1m])
    error_rate_query: 1 - avg_over_time(probe_success{job="edge_blackbox_http",probe_target="primary"}[2m])
    primary_latency_p95_query: max_over_time(probe_duration_seconds{job="edge_blackbox_http",probe_target="primary"}[2m]) * 1000
  thresholds:
    primary_up_min: 1
    edge_reachability_min: 1
    error_rate_ratio: 0.05
    primary_latency_p95_ms: 1200
actions:
  cutover_module_ref: platform/network/cloudflare-traffic-steering
  failback_module_ref: platform/network/cloudflare-traffic-steering
  cutover_desired: balanced
  failback_desired: primary
  module_inputs:
    required_env:
      - CLOUDFLARE_API_TOKEN
    load_vault_env: false
    zone_name: hybridops.tech
    hostname: burst.hybridops.tech
    route_pattern: burst.hybridops.tech/*
    worker_name: hyops-burst-web-proxy
    ensure_dns_record: true
    dns_record_type: CNAME
    dns_record_name: burst.hybridops.tech
    dns_record_target: hyops-burst-web-proxy.omoyemi4reel.workers.dev
    dns_record_proxied: true
    primary_origin_url: https://hybridops-tech-site.pages.dev
    burst_origin_url: http://34.149.69.218.nip.io
    desired: primary
    balanced_burst_weight_pct: 50
    cookie_name: __hyops_burst_lane
    cookie_ttl_s: 900
    root_redirect_path: /showcase/burst/
    forward_prefixes:
      - /showcase/burst
      - /privacy
      - /terms
      - /favicon.svg
      - /hybridops-logo.svg
      - /hybridops-wordmark.svg
      - /_astro
    status_timeout_s: 10
    status_retries: 12
    status_retry_delay_s: 5
dry_run: false
decision_enable_actions: true
decision_execution_mode: local-hyops
decision_require_signal_readiness: true
decision_require_fresh_signals: true
decision_max_signal_age_s: 120
decision_min_ready_checks: 4
confirm_for_seconds: 15
stable_for_seconds: 30
cooldown_seconds: 60
