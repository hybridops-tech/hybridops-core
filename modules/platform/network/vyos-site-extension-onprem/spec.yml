api_version: hybridops/v1
kind: ModuleSpec

module_ref: "platform/network/vyos-site-extension-onprem"

metadata:
  title: "VyOS Site Extension (On-Prem Side)"
  description: "Configure the on-prem VyOS edge as the initiator side of the Hetzner-backed site-extension tunnel."

requirements:
  credentials: []

dependencies:
  - module_ref: "org/hetzner/vyos-edge-foundation"
    required: false
    imports:
      edge01_public_ip: "edge01_public_ip"
      edge02_public_ip: "edge02_public_ip"

inputs:
  defaults:
    target_host: ""
    target_user: "vyos"
    target_port: 22
    ssh_private_key_file: "~/.ssh/id_ed25519"
    target_state_ref: "platform/onprem/vyos-edge#vyos_edge_vm"
    target_vm_key: "edge-01"

    required_env:
      - "SITE_EXTENSION_IPSEC_PSK"
      - "ONPREM_EDGE_SSH_PRIVATE_KEY"
    required_env_destroy: []
    load_vault_env: false

    vyos_site_extension_onprem_role_fqcn: "hybridops.common.vyos_site_extension_onprem"
    vyos_site_extension_state: "present"
    site_extension_psk_env: "SITE_EXTENSION_IPSEC_PSK"

    onprem_ssh_user: "vyos"
    onprem_ssh_port: 22
    onprem_ssh_key_file: "~/.ssh/id_ed25519"
    onprem_ssh_private_key_env: "ONPREM_EDGE_SSH_PRIVATE_KEY"
    onprem_ssh_connectivity_timeout_s: 8
    onprem_ssh_connectivity_wait_s: 180
    onprem_ssh_opts:
      - "-o StrictHostKeyChecking=no"
      - "-o UserKnownHostsFile=/dev/null"
      - "-o ConnectTimeout=10"
      - "-o BatchMode=yes"

    onprem_local_id: ""
    onprem_local_address: "any"
    onprem_bind_interface: "eth1"
    public_peer_route_next_hop: ""
    internal_route_next_hop: ""
    static_route_prefixes: []
    consumer_snat_enabled: false
    consumer_snat_rule_base: 4300
    consumer_snat_rule_slots: 16
    consumer_snat_source_cidrs: []
    consumer_snat_destination_cidrs: []
    consumer_snat_translation_address: ""
    consumer_snat_outbound_interface: ""

    edge01_name: "edge-a"
    edge02_name: "edge-b"
    edge01_public_ip: ""
    edge02_public_ip: ""
    edge01_remote_id: ""
    edge02_remote_id: ""

    edge01_inside_local_ip: "169.254.30.1"
    edge01_inside_peer_ip: "169.254.30.2"
    edge02_inside_local_ip: "169.254.30.5"
    edge02_inside_peer_ip: "169.254.30.6"
    inside_prefix_len: 30

    edge01_tunnel_ifname: "vti30"
    edge02_tunnel_ifname: "vti31"
    edge01_tunnel_name: "siteext-a"
    edge02_tunnel_name: "siteext-b"
    onprem_router_id: "10.10.0.20"

    local_asn: 65010
    peer_asn: 65010
    advertise_prefixes: []
    import_allow_prefixes:
      - "10.70.0.0/20"
      - "10.70.16.0/20"

    ipsec_ike_group: "HYOPS-SITEEXT-IKE"
    ipsec_esp_group: "HYOPS-SITEEXT-ESP"
    bgp_export_prefix_list: "HYOPS-SITEEXT-EXPORT"
    bgp_import_prefix_list: "HYOPS-SITEEXT-IMPORT"
    bgp_export_route_map: "HYOPS-SITEEXT-EXPORT"
    bgp_import_route_map: "HYOPS-SITEEXT-IMPORT"

    validate_post_apply: true
    status_convergence_retries: 12
    status_convergence_delay_s: 10
    vyos_site_extension_no_log_sensitive: true

execution:
  driver: "config/ansible"
  profile: "onprem-linux@v1.0"
  pack_ref:
    id: "onprem/common/network/16-vyos-site-extension-onprem@v1.0"

outputs:
  publish:
    - onprem.target_host
    - vyos.edge01.bgp_neighbor
    - vyos.edge02.bgp_neighbor
    - cap.network.vyos_site_extension_onprem

probes: []
constraints: []
