# MIN: 3 nodes, etcd co-located on the Postgres nodes.
# "replica" here means on-prem standby nodes in the same HA cluster (not a cloud DR replica).
# Prereq: platform/onprem/platform-vm provisioned pgha-01..pgha-03 and published state.

inventory_state_ref: platform/onprem/platform-vm
inventory_vm_groups:
  etcd_cluster:
    - pgha-01
    - pgha-02
    - pgha-03
  master:
    - pgha-01
  replica:
    - pgha-02
    - pgha-03
  postgres_cluster:
    - pgha-01
    - pgha-02
    - pgha-03

# Stable endpoint (recommended)
cluster_vip: 10.12.0.15

# Allowlist platform clients (example: NetBox VM)
allowed_clients:
  - database: netbox
    user: netbox
    cidr: 10.12.0.11/32

# SSH
ssh_private_key_file: "~/.ssh/id_ed25519"
# Auto-proxy via proxmox init metadata when direct L3 access is unavailable.
ssh_proxy_jump_auto: true
load_vault_env: true
