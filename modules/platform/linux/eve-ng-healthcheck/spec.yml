api_version: hybridops/v1
kind: ModuleSpec

module_ref: "platform/linux/eve-ng-healthcheck"

metadata:
  title: "Linux EVE-NG Healthcheck"
  description: "Run structured health checks against an existing EVE-NG host and publish a concise HyOps status result."

requirements:
  credentials: []

inputs:
  defaults:
    target_host: ""
    target_state_ref: ""
    target_vm_key: ""
    inventory_groups: {}
    inventory_state_ref: ""
    inventory_vm_groups: {}

    target_user: "opsadmin"
    target_port: 22
    ssh_private_key_file: ""
    ssh_access_mode: "direct"
    ssh_proxy_jump_auto: false
    ssh_proxy_jump_host: ""
    ssh_proxy_jump_user: "opsadmin"
    ssh_proxy_jump_port: 22
    gcp_iap_instance: ""
    gcp_iap_project_id: ""
    gcp_iap_zone: ""
    become: true
    become_user: "root"

    connectivity_check: true
    connectivity_timeout_s: 5
    connectivity_wait_s: 0

    required_env:
      - "EVENG_ADMIN_PASSWORD"
    required_env_destroy: []
    load_vault_env: true

    eveng_healthcheck_role_fqcn: "hybridops.helper.eveng_healthcheck"
    eveng_admin_password_env: "EVENG_ADMIN_PASSWORD"
    health_check_level: "basic"
    health_check_fail_on_warning: false
    health_check_report_format: "summary"
    health_check_save_output: false
    health_check_output_dir: "{{ playbook_dir | default('.', true) }}/var/lib/hybridops/reports/eveng-healthcheck"
    health_check_reports_dir: "{{ playbook_dir | default('.', true) }}/var/log/hybridops/eveng-healthcheck"
    health_check_services: true
    health_check_database: true
    health_check_api: true
    health_check_kvm: true
    health_check_images: false
    health_check_labs: false

execution:
  driver: "config/ansible"
  profile: "onprem-linux@v1.0"
  pack_ref:
    id: "linux/common/platform/43-eve-ng-healthcheck@v1.0"

outputs:
  publish:
    - cap.lab.eveng.health
    - eveng_health_status
    - eveng_health_level

probes: []
constraints: []
