# Configure pgBackRest to push backups + WAL archives to a GCS bucket
# using explicit inventory_groups (no inventory_state_ref dependency).
#
# Use this mode when platform/onprem/platform-vm state is unavailable or intentionally not used.

inventory_groups:
  etcd_cluster:
    - name: pgha-01
      host: 10.21.0.2
    - name: pgha-02
      host: 10.21.0.3
    - name: pgha-03
      host: 10.21.0.4
  master:
    - name: pgha-01
      host: 10.21.0.2
  replica:
    - name: pgha-02
      host: 10.21.0.3
    - name: pgha-03
      host: 10.21.0.4
  postgres_cluster:
    - name: pgha-01
      host: 10.21.0.2
    - name: pgha-02
      host: 10.21.0.3
    - name: pgha-03
      host: 10.21.0.4

patroni_cluster_name: postgres-ha
repo_mismatch_action: fail

backend: gcs
# Optional state-driven repository source:
# repo_state_ref: org/gcp/object-repo
gcs_bucket: "hyops-pgbackrest-dev"
gcs_sa_json_env: "PG_BACKUP_GCS_SA_JSON"
gcs_sa_dest: "/var/lib/hybridops/pgbackrest/gcs-sa.json"

required_env:
  - PATRONI_SUPERUSER_PASSWORD
  - PATRONI_REPLICATION_PASSWORD
  - PG_BACKUP_GCS_SA_JSON

# SSH
target_user: "opsadmin"
ssh_private_key_file: "~/.ssh/id_ed25519"
ssh_proxy_jump_host: "192.168.0.27"
ssh_proxy_jump_user: "root"
ssh_proxy_jump_port: 22
ssh_proxy_jump_auto: false
load_vault_env: true
