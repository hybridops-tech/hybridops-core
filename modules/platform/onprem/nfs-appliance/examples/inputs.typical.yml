template_state_ref: "core/onprem/template-image"
template_key: "ubuntu-24.04"
require_ipam: true
ssh_keys_from_init: true
ssh_keys_init_target: "proxmox"
addressing:
  mode: "ipam"
  ipam:
    provider: "netbox"
cpu_cores: 4
memory_mb: 8192
disk_size_gb: 200
dns_domain: "hybzone.local"
dns_servers:
  - "1.1.1.1"
  - "8.8.8.8"
tags:
  - "platform"
  - "onprem"
  - "storage"
  - "nfs-appliance"
  - "academy"
post_apply_ssh_readiness:
  enabled: true
  required: true
  target_user: "opsadmin"
  connectivity_timeout_s: 5
  connectivity_wait_s: 600
vms:
  nas-01:
    role: "storage-appliance"
    interfaces:
      - bridge: "vnetmgmt"
    cloud_init_user_data: |
      #cloud-config
      package_update: true
      package_upgrade: false
      packages:
        - nfs-kernel-server
      write_files:
        - path: /etc/exports.d/hybridops-academy.exports
          permissions: '0644'
          content: |
            /srv/nfs/hybridops/academy/moodledata 10.10.40.0/24(rw,sync,no_subtree_check,no_root_squash)
      runcmd:
        - mkdir -p /srv/nfs/hybridops/academy/moodledata
        - chown nobody:nogroup /srv/nfs/hybridops/academy/moodledata
        - chmod 0775 /srv/nfs/hybridops/academy/moodledata
        - systemctl enable --now nfs-kernel-server
        - exportfs -ra
        - touch /var/lib/cloud/instance/ansible-ready
    cloud_init_meta_data: |
      instance-id: nas-01
      local-hostname: nas-01
