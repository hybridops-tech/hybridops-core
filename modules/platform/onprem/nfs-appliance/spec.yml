api_version: hybridops/v1
kind: ModuleSpec

module_ref: "platform/onprem/nfs-appliance"

metadata:
  title: "On-Prem NFS Appliance"
  description: "Provision Linux NFS appliance VMs on Proxmox by specializing the generic Proxmox platform-vm lifecycle and requiring explicit first-boot NFS export intent."

requirements:
  credentials: ["proxmox"]

inputs:
  defaults:
    name_prefix: ""
    context_id: ""
    vm_role: "storage-appliance"
    template_state_ref: "core/onprem/template-image"
    template_key: "ubuntu-24.04"
    build_image: false
    cpu_cores: 2
    memory_mb: 4096
    disk_size_gb: 80
    guest_agent_enabled: true
    cpu_type: "host"
    os_type: "l26"
    on_boot: true
    dns_domain: "hybzone.local"
    dns_servers: ["1.1.1.1", "8.8.8.8"]
    tags: ["platform", "onprem", "storage", "nfs-appliance"]
    require_ipam: true
    allow_vm_set_replace: false
    ssh_username: "opsadmin"
    ssh_keys_from_init: true
    ssh_keys_init_target: "proxmox"
    ssh_keys: []
    provider_kind: "virtual-nas"
    nfs_export_path: ""
    nfs_mount_options: ["nfsvers=4.1", "hard", "timeo=600", "retrans=2"]
    snapshot_profile: "local-snapshots"
    backup_profile: "cloud-object-export"
    post_apply_ssh_readiness:
      enabled: true
      required: true
      target_user: "opsadmin"
      connectivity_timeout_s: 5
      connectivity_wait_s: 300

execution:
  driver: "iac/terragrunt"
  profile: "onprem-proxmox@v1.0"
  pack_ref:
    id: "onprem/proxmox/core/10-platform/00-platform-vm@v1.0"
  hooks:
    export_infra:
      enabled: true
      strict: false
      push_to_netbox: true

outputs:
  publish:
    - vms
    - vm_ids
    - vm_keys
    - vm_names
    - node_name
    - ipv4_addresses
    - ipv4_addresses_all
    - mac_addresses_primary
    - mac_addresses_all
    - tags

probes: []
constraints: []
