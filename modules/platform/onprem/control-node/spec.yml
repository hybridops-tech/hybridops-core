api_version: hybridops/v1
kind: ModuleSpec

module_ref: "platform/onprem/control-node"

metadata:
  title: "Proxmox Control Node"
  description: "Creates or converges the control-node VM on Proxmox."

requirements:
  credentials: ["proxmox"]

inputs:
  defaults:
    name_prefix: ""
    context_id: ""
    template_state_ref: ""
    template_key: ""
    build_image: false
    cpu_cores: 2
    cpu_type: "host"
    memory_mb: 4096
    disk_size_gb: 32
    dns_domain: "hybzone.local"
    dns_servers: ["8.8.8.8"]
    tags: ["platform", "onprem", "control-plane", "critical"]

execution:
  driver: "iac/terragrunt"
  profile: "onprem-proxmox@v1.0"
  pack_ref:
    id: "onprem/proxmox/core/10-platform/10-ctrl-01@v1.0"
  hooks:
    export_infra:
      enabled: true
      strict: false
      push_to_netbox: false

outputs:
  publish:
    - vm_id
    - vm_name
    - node_name
    - ipv4_address
    - mac_address_primary
    - tags

probes: []
constraints: []
