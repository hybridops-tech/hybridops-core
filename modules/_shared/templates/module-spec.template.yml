# Purpose: Timeless ModuleSpec template for HybridOps.Core modules.
# Architecture Decision: ADR-0622
# Maintainer: HybridOps.Tech

api_version: hybridops/v1
kind: ModuleSpec

module_ref: "<namespace>/<provider>/<capability>"

metadata:
  title: "<human title>"
  description: "<concise capability description>"

requirements:
  credentials: []
# Example:
# requirements:
#   credentials: ["azure"]

inputs:
  defaults: {}
  # Optional preset catalog for controlled input bundles.
  # Recommended usage: capability modules own the presets; operators usually set only preset_ref.
  # defaults:
  #   preset_ref: "small-vm"
  # presets:
  #   small-vm:
  #     cpu_cores: 2
  #     memory_mb: 4096
  #     disk_size_gb: 32
  # Optional for modules that support host addressing policy:
  # defaults:
  #   addressing:
  #     mode: "static"   # static | ipam
  #     ipam:
  #       provider: "netbox"  # required when mode=ipam

execution:
  driver: "iac/terragrunt"
  profile: "local@v1.0"
  pack_ref:
    id: "<provider>/<stack>@v1.0"
  hooks:
    export_infra:
      enabled: false
      # target: "cloud-azure"
      strict: false
      push_to_netbox: false

dependencies: []
# Example:
# dependencies:
#   - module_ref: "core/azure/resource-group"
#     required: true
#     imports:
#       resource_group_name: "resource_group_name"
#       location: "location"

outputs:
  publish: []
# Example:
# outputs:
#   publish: ["resource_group_name", "location"]

probes: []
constraints: []
