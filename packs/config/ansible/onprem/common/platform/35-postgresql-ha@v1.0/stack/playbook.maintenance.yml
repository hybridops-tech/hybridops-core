---

# Maintenance (day-2) entrypoint for vitabaks.autobase.
# This playbook reconciles configuration on an already-running Patroni cluster.
# It requires a healthy Patroni leader (REST API reachable); if you have not yet
# bootstrapped the cluster, run with inputs.apply_mode=bootstrap.

# Thin wrapper around vitabaks.autobase playbooks.
# We keep HyOps-level inputs stable and translate only the minimal pieces we own
# (apps -> postgresql_users/databases/privs; allowed_clients -> pg_hba entries).

- name: platform/postgresql-ha (seed patroni passwords)
  hosts: postgres_cluster
  gather_facts: true
  become: false
  tasks:
    - name: Seed Patroni passwords from environment
      ansible.builtin.set_fact:
        patroni_superuser_password: "{{ lookup('env', patroni_superuser_password_env | default('PATRONI_SUPERUSER_PASSWORD')) }}"
        patroni_replication_password: "{{ lookup('env', patroni_replication_password_env | default('PATRONI_REPLICATION_PASSWORD')) }}"
      no_log: true

    - name: "Preflight: ensure patroni passwords are present in environment"
      ansible.builtin.assert:
        that:
          - (patroni_superuser_password | default('') | length) > 0
          - (patroni_replication_password | default('') | length) > 0
        fail_msg: >-
          Missing required Patroni secrets. Ensure vault/env provides:
          PATRONI_SUPERUSER_PASSWORD and PATRONI_REPLICATION_PASSWORD.
          Hint: hyops secrets ensure --env <env> PATRONI_SUPERUSER_PASSWORD PATRONI_REPLICATION_PASSWORD
      no_log: true

    # Autobase expects several complex vars (users/dbs/privs/pg_hba) as lists of
    # dicts. Ansible/Jinja does not support Python list comprehensions inside
    # `{{ ... }}`, so we build these lists explicitly with set_fact loops.
    - name: Normalize app contract (inputs.apps or fallback netbox contract)
      ansible.builtin.set_fact:
        _hyops_pg_apps: >-
          {{
            (apps
              if (apps is mapping and (apps | length) > 0)
              else {
                'netbox': {
                  'db_name': (db_name | default('netbox')),
                  'db_user': (db_user | default('netbox')),
                  'db_password_env': (db_password_env | default('NETBOX_DB_PASSWORD'))
                }
              }
            )
          }}

    - name: "Preflight: ensure required app passwords are present in environment"
      ansible.builtin.assert:
        that:
          - (lookup('env', item.value.db_password_env | string) | length) > 0
        fail_msg: >-
          Missing required secret for app={{ item.key }}. Set env var
          {{ item.value.db_password_env }} (hint: hyops secrets ensure --env <env> {{ item.value.db_password_env }}).
      loop: "{{ _hyops_pg_apps | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true

    - name: Init derived PostgreSQL vars for Autobase
      ansible.builtin.set_fact:
        postgresql_databases: []
        postgresql_users: []
        postgresql_privs: []
        postgresql_extensions: []
        postgresql_pg_hba:
          - type: local
            database: all
            user: "{{ patroni_superuser_username | default('postgres') }}"
            address: ""
            method: trust
          - type: local
            database: all
            user: all
            address: ""
            method: scram-sha-256
          - type: host
            database: all
            user: all
            address: 127.0.0.1/32
            method: scram-sha-256
          - type: host
            database: all
            user: all
            address: ::1/128
            method: scram-sha-256

    - name: Derive postgresql_* vars from apps contract
      ansible.builtin.set_fact:
        postgresql_databases: >-
          {{
            postgresql_databases
              + [
                {
                  'db': (item.value.db_name | string),
                  'owner': (item.value.db_user | string),
                  'encoding': (postgresql_encoding | default('UTF8') | string),
                  'lc_collate': (postgresql_locale | default('en_US.UTF-8') | string),
                  'lc_ctype': (postgresql_locale | default('en_US.UTF-8') | string)
                }
              ]
            }}
        postgresql_users: >-
          {{
            postgresql_users
            + [
              {
                'name': (item.value.db_user | string),
                'password': lookup('env', item.value.db_password_env | string),
                'flags': 'LOGIN'
              }
            ]
          }}
        postgresql_privs: >-
          {{
            postgresql_privs
            + [
              {
                'role': (item.value.db_user | string),
                'db': (item.value.db_name | string),
                'type': 'database',
                'objs': (item.value.db_name | string),
                'privs': 'ALL'
              },
              {
                'role': (item.value.db_user | string),
                'db': (item.value.db_name | string),
                'type': 'schema',
                'objs': 'public',
                'privs': 'USAGE,CREATE'
              }
            ]
          }}
      loop: "{{ _hyops_pg_apps | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true

    - name: Normalize managed Cloud SQL pglogical target databases
      ansible.builtin.set_fact:
        _hyops_pglogical_databases: >-
          {{
            (pglogical_databases | default([]) | list)
            if ((pglogical_databases | default([]) | length) > 0)
            else (
              _hyops_pg_apps
              | dict2items
              | map(attribute='value.db_name')
              | map('string')
              | unique
              | list
            )
          }}
      when: pglogical_enable | default(false) | bool

    - name: Determine pglogical package name for this OS family
      ansible.builtin.set_fact:
        _hyops_pglogical_package_name: >-
          {{
            ('postgresql-' ~ (postgresql_version | default(16) | int | string) ~ '-pglogical')
            if ansible_os_family == 'Debian'
            else ('pglogical_' ~ (postgresql_version | default(16) | int | string))
          }}
      when: pglogical_enable | default(false) | bool

    - name: Install pglogical package on PostgreSQL nodes
      become: true
      ansible.builtin.package:
        name: "{{ _hyops_pglogical_package_name }}"
        state: present
      when: pglogical_enable | default(false) | bool

    - name: Ensure pglogical extension entries are present for requested databases
      ansible.builtin.set_fact:
        postgresql_extensions: >-
          {{
            postgresql_extensions
            + [
              {
                'ext': 'pglogical',
                'db': (item | string),
                'schema': 'public'
              }
            ]
          }}
      loop: "{{ _hyops_pglogical_databases | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when: pglogical_enable | default(false) | bool

    - name: Ensure replication user can use pglogical schema in requested databases
      ansible.builtin.set_fact:
        postgresql_privs: >-
          {{
            postgresql_privs
            + [
              {
                'role': (patroni_replication_username | default('replicator') | string),
                'db': (item | string),
                'type': 'schema',
                'objs': 'pglogical',
                'privs': 'USAGE'
              }
            ]
          }}
      loop: "{{ _hyops_pglogical_databases | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when: pglogical_enable | default(false) | bool

    - name: "Preflight: validate allowed_clients entries"
      ansible.builtin.assert:
        that:
          - item.cidr is defined
          - (item.cidr | string | length) > 0
        fail_msg: "allowed_clients entries must include cidr"
      loop: "{{ allowed_clients | default([]) }}"
      loop_control:
        label: "{{ item.cidr | default('') }}"

    - name: Check Patroni service state on maintenance target
      become: true
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - patroni
      register: _hyops_patroni_service_state
      changed_when: false
      failed_when: false

    - name: Record whether this node currently has active Patroni
      ansible.builtin.set_fact:
        _hyops_patroni_service_active: "{{ (_hyops_patroni_service_state.stdout | default('') | trim) == 'active' }}"

    - name: "Preflight: ensure maintenance target already has an active Patroni member"
      ansible.builtin.assert:
        that:
          - >-
            (
              groups['postgres_cluster']
              | map('extract', hostvars, '_hyops_patroni_service_active')
              | select('equalto', true)
              | list
              | length
            ) > 0
        fail_msg: >-
          inputs.apply_mode=maintenance expects an already-running Patroni cluster,
          but Patroni is inactive on every postgres_cluster host. Start the cluster
          first or rerun with bootstrap/restore as appropriate.
      run_once: true
      delegate_to: localhost

    - name: Add allowed_clients to postgresql_pg_hba
      ansible.builtin.set_fact:
        postgresql_pg_hba: >-
          {{
            postgresql_pg_hba
            + [
              {
                'type': 'host',
                'database': (item.database | default('all') | string),
                'user': (item.user | default('all') | string),
                'address': (item.cidr | string),
                'method': 'scram-sha-256'
              }
            ]
          }}
      loop: "{{ allowed_clients | default([]) }}"
      loop_control:
        label: "{{ item.cidr | default('') }}"

- name: platform/postgresql-ha (maintenance reconcile)
  ansible.builtin.import_playbook: vitabaks.autobase.config_pgcluster
  vars:
    # This module is intentionally on-prem only.
    # Autobase conditionally runs cloud provisioning logic (cloud_resources) when
    # `cloud_provider` is non-empty; ensure we never enable that implicitly.
    cloud_provider: ""
    provision: ""

    patroni_cluster_name: "{{ patroni_cluster_name | default('postgres-ha') }}"
    postgresql_version: "{{ postgresql_version | default(16) | int }}"
    postgresql_port: "{{ postgresql_port | default(5432) | int }}"

    dcs_type: "{{ dcs_type | default('etcd') }}"
    dcs_exists: "{{ dcs_exists | default(false) | bool }}"

    cluster_vip: "{{ cluster_vip | default('') }}"
    with_haproxy_load_balancing: "{{ with_haproxy_load_balancing | default(false) | bool }}"

    # Keep v1 simple: no pooler by default.
    pgbouncer_install: "{{ pgbouncer_install | default(false) | bool }}"
    netdata_install: "{{ netdata_install | default(false) | bool }}"
    pending_restart: "{{ pending_restart | default(false) | bool }}"

    # Secure-by-default host access (cluster nodes are always added separately by Autobase).
    postgresql_password_encryption_algorithm: "scram-sha-256"

- name: platform/postgresql-ha (reconcile pglogical Patroni config)
  hosts: master
  gather_facts: false
  become: true
  vars:
    _hyops_patronictl_cmd:
      - sudo
      - patronictl
      - -c
      - /etc/patroni/patroni.yml
  tasks:
    - name: Read current shared_preload_libraries from source primary
      become_user: postgres
      ansible.builtin.command:
        argv:
          - psql
          - -tAX
          - -d
          - postgres
          - -c
          - SHOW shared_preload_libraries;
      register: _hyops_pglogical_shared_preload_query
      changed_when: false
      when: pglogical_enable | default(false) | bool

    - name: Normalize desired shared_preload_libraries for pglogical
      ansible.builtin.set_fact:
        _hyops_current_shared_preload_libraries: >-
          {{
            (_hyops_pglogical_shared_preload_query.stdout | default('') | string)
            .split(',')
            | map('trim')
            | reject('equalto', '')
            | list
          }}
        _hyops_desired_shared_preload_libraries: >-
          {{
            (
              (
                (_hyops_pglogical_shared_preload_query.stdout | default('') | string)
                .split(',')
                | map('trim')
                | reject('equalto', '')
                | list
              )
              + ['pglogical']
            )
            | unique
            | join(',')
          }}
      when: pglogical_enable | default(false) | bool

    - name: Mark whether pglogical restart reconcile is required
      ansible.builtin.set_fact:
        _hyops_pglogical_restart_required: "{{ 'pglogical' not in (_hyops_current_shared_preload_libraries | default([])) }}"
      when: pglogical_enable | default(false) | bool

    - name: Update Patroni DCS config with pglogical in shared_preload_libraries
      ansible.builtin.command:
        argv: >-
          {{
            _hyops_patronictl_cmd
            + [
              'edit-config',
              (patroni_cluster_name | default('postgres-ha') | string),
              '--force',
              '--pg',
              'shared_preload_libraries=' ~ (_hyops_desired_shared_preload_libraries | string)
            ]
          }}
      when:
        - pglogical_enable | default(false) | bool
        - _hyops_pglogical_restart_required | default(false) | bool

- name: platform/postgresql-ha (restart replicas for pglogical)
  hosts: replica
  serial: 1
  gather_facts: false
  become: true
  tasks:
    - name: Restart Patroni on replica to load pglogical
      ansible.builtin.systemd:
        name: patroni
        state: restarted
      when:
        - pglogical_enable | default(false) | bool
        - hostvars[groups['master'][0]]._hyops_pglogical_restart_required | default(false) | bool

    - name: Wait for PostgreSQL port on restarted replica
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: "{{ postgresql_port | default(5432) | int }}"
        timeout: 120
        delay: 5
      when:
        - pglogical_enable | default(false) | bool
        - hostvars[groups['master'][0]]._hyops_pglogical_restart_required | default(false) | bool

- name: platform/postgresql-ha (restart leader for pglogical)
  hosts: master
  gather_facts: false
  become: true
  tasks:
    - name: Restart Patroni on leader to load pglogical
      ansible.builtin.systemd:
        name: patroni
        state: restarted
      when:
        - pglogical_enable | default(false) | bool
        - _hyops_pglogical_restart_required | default(false) | bool

    - name: Wait for PostgreSQL port on restarted leader
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: "{{ postgresql_port | default(5432) | int }}"
        timeout: 120
        delay: 5
      when:
        - pglogical_enable | default(false) | bool
        - _hyops_pglogical_restart_required | default(false) | bool

- name: platform/postgresql-ha (ensure pglogical extension exists on writable primary)
  hosts: postgres_cluster
  gather_facts: false
  become: true
  tasks:
    - name: Detect whether this node is the writable primary
      become_user: postgres
      ansible.builtin.command:
        argv:
          - psql
          - -tAX
          - -d
          - postgres
          - -c
          - SELECT pg_is_in_recovery();
      register: _hyops_pglogical_recovery_state
      changed_when: false
      when: pglogical_enable | default(false) | bool

    - name: Ensure pglogical extension exists in requested databases
      become_user: postgres
      ansible.builtin.command:
        argv:
          - psql
          - -d
          - "{{ item | string }}"
          - -c
          - CREATE EXTENSION IF NOT EXISTS pglogical;
      loop: "{{ _hyops_pglogical_databases | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when:
        - pglogical_enable | default(false) | bool
        - (_hyops_pglogical_recovery_state.stdout | default('t') | string | trim | lower) in ['false', 'f', '0']

    - name: Ensure replication user can read pglogical catalog tables in requested databases
      become_user: postgres
      ansible.builtin.command:
        argv:
          - psql
          - -v
          - ON_ERROR_STOP=1
          - -d
          - "{{ item | string }}"
          - -c
          - >-
            GRANT USAGE ON SCHEMA pglogical TO "{{ patroni_replication_username | default('replicator') | string }}";
            GRANT SELECT ON ALL TABLES IN SCHEMA pglogical TO "{{ patroni_replication_username | default('replicator') | string }}";
      loop: "{{ _hyops_pglogical_databases | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when:
        - pglogical_enable | default(false) | bool
        - (_hyops_pglogical_recovery_state.stdout | default('t') | string | trim | lower) in ['false', 'f', '0']

- name: platform/postgresql-ha (ensure VIP is configured)
  hosts: postgres_cluster
  become: true
  gather_facts: true

  vars:
    _hyops_use_vip: >-
      {{
        (cluster_vip | default('') | string | length) > 0
        and not (with_haproxy_load_balancing | default(false) | bool)
      }}
    _hyops_vip_manager_arch_map:
      amd64: x86_64
      x86_64: x86_64
      aarch64: arm64
      arm64: arm64
      32-bit: i386
      64-bit: x86_64
    _hyops_vip_manager_pkg_type: "{{ pkg_type | default('deb' if ansible_os_family == 'Debian' else 'rpm') }}"
    _hyops_vip_manager_version: "{{ vip_manager_version | default('3.0.0') }}"
    _hyops_vip_manager_package_repo: >-
      {{
        vip_manager_package_repo
        | default(
            'https://github.com/cybertec-postgresql/vip-manager/releases/download/v'
            ~ (_hyops_vip_manager_version | string)
            ~ '/vip-manager_'
            ~ (_hyops_vip_manager_version | string)
            ~ '_Linux_'
            ~ (_hyops_vip_manager_arch_map.get(ansible_architecture, ansible_architecture | string))
            ~ '.'
            ~ (_hyops_vip_manager_pkg_type | string),
            true
          )
      }}

  tasks:
    - name: Check whether vip-manager binary is present
      ansible.builtin.stat:
        path: /usr/bin/vip-manager
      register: _hyops_vip_manager_binary
      when: _hyops_use_vip | bool

    - name: Download vip-manager package when missing
      ansible.builtin.get_url:
        url: "{{ _hyops_vip_manager_package_repo }}"
        dest: "/tmp/{{ _hyops_vip_manager_package_repo | basename }}"
        timeout: 60
        validate_certs: false
      when:
        - _hyops_use_vip | bool
        - installation_method | default('packages') == 'packages'
        - (_hyops_vip_manager_package_repo | default('') | string | length) > 0
        - not (_hyops_vip_manager_binary.stat.exists | default(false))

    - name: Install vip-manager package on Debian when missing
      ansible.builtin.apt:
        force_apt_get: true
        deb: "/tmp/{{ _hyops_vip_manager_package_repo | basename }}"
        state: present
      register: _hyops_vip_manager_apt
      until: _hyops_vip_manager_apt is success
      delay: 5
      retries: 3
      when:
        - _hyops_use_vip | bool
        - installation_method | default('packages') == 'packages'
        - ansible_os_family == 'Debian'
        - (_hyops_vip_manager_package_repo | default('') | string | length) > 0
        - not (_hyops_vip_manager_binary.stat.exists | default(false))

    - name: Install vip-manager package on RedHat when missing
      ansible.builtin.package:
        name: "/tmp/{{ _hyops_vip_manager_package_repo | basename }}"
        state: present
        disable_gpg_check: true
      register: _hyops_vip_manager_pkg
      until: _hyops_vip_manager_pkg is success
      delay: 5
      retries: 3
      when:
        - _hyops_use_vip | bool
        - installation_method | default('packages') == 'packages'
        - ansible_os_family == 'RedHat'
        - (_hyops_vip_manager_package_repo | default('') | string | length) > 0
        - not (_hyops_vip_manager_binary.stat.exists | default(false))

    - name: Restart vip-manager (ensure DCS watch is fresh)
      ansible.builtin.systemd:
        daemon_reload: true
        name: vip-manager
        state: restarted
        enabled: true
      when: _hyops_use_vip | bool

    - name: Discover current Patroni leader
      ansible.builtin.command: patronictl list -f json
      register: _hyops_patroni_members
      changed_when: false
      run_once: true

    - name: Record current Patroni leader member
      ansible.builtin.set_fact:
        _hyops_patroni_leader_member: >-
          {{
            (
              (_hyops_patroni_members.stdout | from_json)
              | selectattr('Role', 'equalto', 'Leader')
              | map(attribute='Member')
              | first
            ) | default('')
          }}
      run_once: true

    - name: Assert Patroni leader was discovered
      ansible.builtin.assert:
        that:
          - (_hyops_patroni_leader_member | default('') | string | length) > 0
        fail_msg: >-
          No live Patroni leader could be discovered from `patronictl list -f json`.
      run_once: true

    - name: Publish current Patroni leader member to localhost facts
      ansible.builtin.set_fact:
        _hyops_patroni_leader_member: "{{ _hyops_patroni_leader_member | string }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

    - name: Resolve Patroni leader inventory host
      ansible.builtin.set_fact:
        _hyops_patroni_leader_inventory_host: >-
          {%- set leader = (_hyops_patroni_leader_member | default('') | string) -%}
          {%- set ns = namespace(match='') -%}
          {%- for node in (groups.get('postgres_cluster', []) | default([])) -%}
          {%- set nodevars = hostvars[node] -%}
          {%- if (ns.match | length) == 0 and leader in [
                (node | string),
                (nodevars.inventory_hostname | default('') | string),
                (nodevars.ansible_host | default('') | string),
                (nodevars.gcp_iap_instance | default('') | string),
                (nodevars.hyops_resolved_host | default('') | string),
                (nodevars.hyops_private_host | default('') | string),
                (nodevars.ansible_hostname | default('') | string)
              ] -%}
          {%- set ns.match = (node | string) -%}
          {%- endif -%}
          {%- endfor -%}
          {{ (ns.match if (ns.match | length) > 0 else leader) | string }}
      delegate_to: localhost
      delegate_facts: true
      run_once: true

    - name: Assert Patroni leader inventory host was resolved
      ansible.builtin.assert:
        that:
          - (hostvars['localhost']._hyops_patroni_leader_inventory_host | default('') | string) in (groups.get('postgres_cluster', []) | map('string') | list)
        fail_msg: >-
          Unable to map Patroni leader member {{ _hyops_patroni_leader_member }} to an inventory host in postgres_cluster.
      run_once: true

    - name: Wait for VIP to be present on the leader node
      ansible.builtin.command: "ip -br addr"
      register: _hyops_vip_ip_addr
      changed_when: false
      until: (cluster_vip | string) in (_hyops_vip_ip_addr.stdout | default(''))
      retries: 15
      delay: 2
      delegate_to: "{{ hostvars['localhost']._hyops_patroni_leader_inventory_host | default(_hyops_patroni_leader_member) }}"
      run_once: true
      when: _hyops_use_vip | bool

    - name: "Preflight: assert VIP is configured"
      ansible.builtin.assert:
        that:
          - (cluster_vip | string) in (_hyops_vip_ip_addr.stdout | default(''))
        fail_msg: >-
          cluster_vip={{ cluster_vip }} is set, but vip-manager did not configure it.
          Inspect logs: journalctl -u vip-manager (on the leader node: {{ _hyops_patroni_leader_member }}).
      run_once: true
      when: _hyops_use_vip | bool

- name: platform/postgresql-ha (publish outputs)
  hosts: localhost
  become: false
  gather_facts: false

  vars:
    pg_port: "{{ postgresql_port | default(5432) | int }}"
    _hyops_inventory_publish_group_names:
      - master
      - replica
      - postgres_cluster
      - etcd_cluster
    _hyops_live_leader_inventory_host: "{{ hostvars['localhost']._hyops_patroni_leader_inventory_host | default(hostvars['localhost']._hyops_patroni_leader_member | default('')) | string }}"
    _hyops_pg_apps: >-
      {{
        (apps
          if (apps is mapping and (apps | length) > 0)
          else {
            'netbox': {
              'db_name': (db_name | default('netbox')),
              'db_user': (db_user | default('netbox')),
              'db_password_env': (db_password_env | default('NETBOX_DB_PASSWORD'))
            }
          }
        )
      }}
    endpoint_host: >-
      {{
        (cluster_vip | string)
        if (cluster_vip is string and (cluster_vip | length) > 0)
        else (
          (
            hostvars[_hyops_live_leader_inventory_host].hyops_resolved_host
            | default(hostvars[_hyops_live_leader_inventory_host].hyops_private_host | default(hostvars[_hyops_live_leader_inventory_host].ansible_host | default(hostvars[_hyops_live_leader_inventory_host].inventory_hostname | default(_hyops_live_leader_inventory_host), true), true), true)
            | string
          )
          if (_hyops_live_leader_inventory_host | length) > 0
          else (
            hostvars[groups['master'][0]].hyops_resolved_host
            | default(hostvars[groups['master'][0]].hyops_private_host | default(hostvars[groups['master'][0]].ansible_host, true), true)
            if (groups.get('master', []) | length) > 0
            else ''
          )
        )
      }}
    endpoint_target: >-
      {{
        (endpoint_dns_name | string)
        if (endpoint_dns_name is string and (endpoint_dns_name | length) > 0)
        else (
          (cluster_vip | string)
          if (cluster_vip is string and (cluster_vip | length) > 0)
          else (endpoint_host | default('') | string)
        )
      }}
    endpoint_target_type: >-
      {{
        'dns'
        if (endpoint_dns_name is string and (endpoint_dns_name | length) > 0)
        else (
          'vip'
          if (cluster_vip is string and (cluster_vip | length) > 0)
          else 'host'
        )
      }}
    endpoint_cutover_required: >-
      {{
        (
          (endpoint_dns_name is string and (endpoint_dns_name | length) > 0)
          or not (cluster_vip is string and (cluster_vip | length) > 0)
        ) | bool
      }}

  tasks:
    - name: Write HyOps outputs
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {% set host = (endpoint_host | default('')) %}
          {% set port = (pg_port | int) %}
          {% set live_leader = (_hyops_live_leader_inventory_host | default('') | string) %}
          {% set ns = namespace(out={
            'pg_host': host,
            'pg_port': port,
            'cluster_vip': (cluster_vip | default('') | string),
            'endpoint_target': (endpoint_target | default('') | string),
            'endpoint_target_type': (endpoint_target_type | default('host') | string),
            'endpoint_dns_name': (endpoint_dns_name | default('') | string),
            'endpoint_host': host,
            'endpoint_port': port,
            'endpoint_cutover_required': (endpoint_cutover_required | bool),
            'cap.db.postgresql_ha': 'ready'
          }, apps={}, inventory={}) %}
          {% for group_name in _hyops_inventory_publish_group_names %}
          {% if (group_name | string) == 'master' and (live_leader | length) > 0 %}
          {% set ns.inventory = ns.inventory | combine({
            'master': [
              {
                'name': live_leader,
                'host': (
                  hostvars[live_leader].hyops_resolved_host
                  | default(hostvars[live_leader].hyops_private_host | default(hostvars[live_leader].ansible_host | default(hostvars[live_leader].inventory_hostname | default(live_leader), true), true), true)
                  | string
                )
              }
            ]
          }) %}
          {% elif (group_name | string) == 'replica' and (live_leader | length) > 0 and (groups.get('postgres_cluster', []) | length) > 0 %}
          {% set hosts = [] %}
          {% for node in groups['postgres_cluster'] %}
          {% if (node | string) != live_leader %}
          {% set _ = hosts.append({
            'name': (node | string),
            'host': (
              hostvars[node].hyops_resolved_host
              | default(hostvars[node].hyops_private_host | default(hostvars[node].ansible_host | default(hostvars[node].inventory_hostname | default(node), true), true), true)
              | string
            )
          }) %}
          {% endif %}
          {% endfor %}
          {% set ns.inventory = ns.inventory | combine({'replica': hosts}) %}
          {% elif (groups.get(group_name, []) | length) > 0 %}
          {% set hosts = [] %}
          {% for node in groups[group_name] %}
          {% set _ = hosts.append({
            'name': (node | string),
            'host': (
              hostvars[node].hyops_resolved_host
              | default(hostvars[node].hyops_private_host | default(hostvars[node].ansible_host | default(hostvars[node].inventory_hostname | default(node), true), true), true)
              | string
            )
          }) %}
          {% endfor %}
          {% set ns.inventory = ns.inventory | combine({ (group_name | string): hosts }) %}
          {% endif %}
          {% endfor %}
          {% for item in (_hyops_pg_apps | dict2items) %}
          {% set key = (item.key | string) %}
          {% set ns.apps = ns.apps | combine({
            key: {
              'db_host': host,
              'db_port': port,
              'db_name': (item.value.db_name | string),
              'db_user': (item.value.db_user | string),
              'db_password_env': (item.value.db_password_env | string)
            }
          }) %}
          {% endfor %}
          {% set ns.out = ns.out | combine({'apps': ns.apps}) %}
          {% set ns.out = ns.out | combine({'inventory_groups': ns.inventory}) %}
          {# Backward-compat for NetBox consumption: publish db_* keys from apps.netbox if present #}
          {% if (_hyops_pg_apps is mapping) and ('netbox' in _hyops_pg_apps) %}
          {% set nb = _hyops_pg_apps['netbox'] %}
          {% set ns.out = ns.out | combine({
            'db_host': host,
            'db_port': port,
            'db_name': (nb.db_name | string),
            'db_user': (nb.db_user | string),
            'db_password_env': (nb.db_password_env | string)
          }) %}
          {% endif %}
          {{ ns.out | to_json }}
