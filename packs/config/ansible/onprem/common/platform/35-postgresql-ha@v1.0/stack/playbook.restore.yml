---

# Restore (DR / failback) entrypoint for vitabaks.autobase.
#
# This runs a Patroni + etcd cluster bootstrap using pgBackRest as Patroni's
# custom bootstrap method. It is intentionally guarded behind
# `inputs.restore_confirm=true` because it can overwrite the target data
# directory if `inputs.restore_delta=true`.

- name: platform/postgresql-ha (restore preflight + seed secrets)
  hosts: postgres_cluster
  gather_facts: false
  become: false
  tasks:
    - name: "Preflight: require explicit restore confirmation"
      ansible.builtin.assert:
        that:
          - (restore_confirm | default(false) | bool)
        fail_msg: >-
          Refusing to restore without explicit confirmation.
          Set inputs.restore_confirm=true and re-run with HYOPS_INPUT_apply_mode=restore.

    - name: Seed Patroni passwords from environment
      ansible.builtin.set_fact:
        patroni_superuser_password: "{{ lookup('env', patroni_superuser_password_env | default('PATRONI_SUPERUSER_PASSWORD')) }}"
        patroni_replication_password: "{{ lookup('env', patroni_replication_password_env | default('PATRONI_REPLICATION_PASSWORD')) }}"
      no_log: true

    - name: "Preflight: ensure patroni passwords are present in environment"
      ansible.builtin.assert:
        that:
          - (patroni_superuser_password | default('') | length) > 0
          - (patroni_replication_password | default('') | length) > 0
        fail_msg: >-
          Missing required Patroni secrets. Ensure vault/env provides:
          PATRONI_SUPERUSER_PASSWORD and PATRONI_REPLICATION_PASSWORD.
          Hint: hyops secrets ensure --env <env> PATRONI_SUPERUSER_PASSWORD PATRONI_REPLICATION_PASSWORD
      no_log: true

    - name: Normalize app contract (inputs.apps or fallback netbox contract)
      ansible.builtin.set_fact:
        _hyops_pg_apps: >-
          {{
            (apps
              if (apps is mapping and (apps | length) > 0)
              else {
                'netbox': {
                  'db_name': (db_name | default('netbox')),
                  'db_user': (db_user | default('netbox')),
                  'db_password_env': (db_password_env | default('NETBOX_DB_PASSWORD'))
                }
              }
            )
          }}

    - name: "Preflight: ensure required app passwords are present in environment"
      ansible.builtin.assert:
        that:
          - (lookup('env', item.value.db_password_env | string) | length) > 0
        fail_msg: >-
          Missing required secret for app={{ item.key }}. Set env var
          {{ item.value.db_password_env }} (hint: hyops secrets ensure --env <env> {{ item.value.db_password_env }}).
      loop: "{{ _hyops_pg_apps | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true

    - name: Init derived PostgreSQL vars for Autobase
      ansible.builtin.set_fact:
        postgresql_databases: []
        postgresql_users: []
        postgresql_privs: []
        postgresql_pg_hba:
          - type: local
            database: all
            user: "{{ patroni_superuser_username | default('postgres') }}"
            address: ""
            method: trust
          - type: local
            database: all
            user: all
            address: ""
            method: scram-sha-256
          - type: host
            database: all
            user: all
            address: 127.0.0.1/32
            method: scram-sha-256
          - type: host
            database: all
            user: all
            address: ::1/128
            method: scram-sha-256

    - name: Derive postgresql_* vars from apps contract
      ansible.builtin.set_fact:
        postgresql_databases: >-
          {{
            postgresql_databases
              + [
                {
                  'db': (item.value.db_name | string),
                  'owner': (item.value.db_user | string),
                  'encoding': (postgresql_encoding | default('UTF8') | string),
                  'lc_collate': (postgresql_locale | default('en_US.UTF-8') | string),
                  'lc_ctype': (postgresql_locale | default('en_US.UTF-8') | string)
                }
              ]
            }}
        postgresql_users: >-
          {{
            postgresql_users
            + [
              {
                'name': (item.value.db_user | string),
                'password': lookup('env', item.value.db_password_env | string),
                'flags': 'LOGIN'
              }
            ]
          }}
        postgresql_privs: >-
          {{
            postgresql_privs
            + [
              {
                'role': (item.value.db_user | string),
                'db': (item.value.db_name | string),
                'type': 'database',
                'objs': (item.value.db_name | string),
                'privs': 'ALL'
              },
              {
                'role': (item.value.db_user | string),
                'db': (item.value.db_name | string),
                'type': 'schema',
                'objs': 'public',
                'privs': 'USAGE,CREATE'
              }
            ]
          }}
      loop: "{{ _hyops_pg_apps | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true

    - name: "Preflight: validate allowed_clients entries"
      ansible.builtin.assert:
        that:
          - item.cidr is defined
          - (item.cidr | string | length) > 0
        fail_msg: "allowed_clients entries must include cidr"
      loop: "{{ allowed_clients | default([]) }}"
      loop_control:
        label: "{{ item.cidr | default('') }}"

    - name: Add allowed_clients to postgresql_pg_hba
      ansible.builtin.set_fact:
        postgresql_pg_hba: >-
          {{
            postgresql_pg_hba
            + [
              {
                'type': 'host',
                'database': (item.database | default('all') | string),
                'user': (item.user | default('all') | string),
                'address': (item.cidr | string),
                'method': 'scram-sha-256'
              }
            ]
          }}
      loop: "{{ allowed_clients | default([]) }}"
      loop_control:
        label: "{{ item.cidr | default('') }}"

    - name: Derive pgBackRest repository settings
      ansible.builtin.import_role:
        name: hybridops.app.pgbackrest_repo

    - name: Build pgBackRest restore command for Patroni
      ansible.builtin.set_fact:
        patroni_cluster_bootstrap_method: "pgbackrest"
        patroni_create_replica_methods:
          - pgbackrest
          - basebackup
        disable_archive_command: false
        pgbackrest_patroni_cluster_restore_command: >-
          /usr/bin/pgbackrest --stanza={{ pgbackrest_stanza }}
          {% if (restore_set | default('') | string | length) > 0 %}
          --set={{ restore_set | string }}
          {% endif %}
          {% if (restore_target_timeline | default('') | string | length) > 0 %}
          --target-timeline={{ restore_target_timeline | string }}
          {% endif %}
          {% if (restore_target_time | default('') | string | length) > 0 %}
          --type=time --target='{{ restore_target_time | string }}'
          {% endif %}
          {% if (restore_delta | default(false) | bool) %}
          --delta
          {% endif %}
          restore
      no_log: true

- name: platform/postgresql-ha (restore)
  ansible.builtin.import_playbook: vitabaks.autobase.deploy_pgcluster
  vars:
    # This module is intentionally on-prem only.
    cloud_provider: ""
    provision: ""

    patroni_cluster_name: "{{ patroni_cluster_name | default('postgres-ha') }}"
    postgresql_version: "{{ postgresql_version | default(16) | int }}"
    postgresql_port: "{{ postgresql_port | default(5432) | int }}"

    dcs_type: "{{ dcs_type | default('etcd') }}"
    dcs_exists: "{{ dcs_exists | default(false) | bool }}"

    cluster_vip: "{{ cluster_vip | default('') }}"
    with_haproxy_load_balancing: "{{ with_haproxy_load_balancing | default(false) | bool }}"
    pgbouncer_install: "{{ pgbouncer_install | default(false) | bool }}"

    postgresql_password_encryption_algorithm: "scram-sha-256"

- name: platform/postgresql-ha (ensure VIP is configured)
  hosts: postgres_cluster
  become: true
  gather_facts: true

  vars:
    _hyops_use_vip: >-
      {{
        (cluster_vip | default('') | string | length) > 0
        and not (with_haproxy_load_balancing | default(false) | bool)
      }}
    _hyops_vip_manager_arch_map:
      amd64: x86_64
      x86_64: x86_64
      aarch64: arm64
      arm64: arm64
      32-bit: i386
      64-bit: x86_64
    _hyops_vip_manager_pkg_type: "{{ pkg_type | default('deb' if ansible_os_family == 'Debian' else 'rpm') }}"
    _hyops_vip_manager_version: "{{ vip_manager_version | default('3.0.0') }}"
    _hyops_vip_manager_package_repo: >-
      {{
        vip_manager_package_repo
        | default(
            'https://github.com/cybertec-postgresql/vip-manager/releases/download/v'
            ~ (_hyops_vip_manager_version | string)
            ~ '/vip-manager_'
            ~ (_hyops_vip_manager_version | string)
            ~ '_Linux_'
            ~ (_hyops_vip_manager_arch_map.get(ansible_architecture, ansible_architecture | string))
            ~ '.'
            ~ (_hyops_vip_manager_pkg_type | string),
            true
          )
      }}

  tasks:
    - name: Check whether vip-manager binary is present
      ansible.builtin.stat:
        path: /usr/bin/vip-manager
      register: _hyops_vip_manager_binary
      when: _hyops_use_vip | bool

    - name: Download vip-manager package when missing
      ansible.builtin.get_url:
        url: "{{ _hyops_vip_manager_package_repo }}"
        dest: "/tmp/{{ _hyops_vip_manager_package_repo | basename }}"
        timeout: 60
        validate_certs: false
      when:
        - _hyops_use_vip | bool
        - installation_method | default('packages') == 'packages'
        - (_hyops_vip_manager_package_repo | default('') | string | length) > 0
        - not (_hyops_vip_manager_binary.stat.exists | default(false))

    - name: Install vip-manager package on Debian when missing
      ansible.builtin.apt:
        force_apt_get: true
        deb: "/tmp/{{ _hyops_vip_manager_package_repo | basename }}"
        state: present
      register: _hyops_vip_manager_apt
      until: _hyops_vip_manager_apt is success
      delay: 5
      retries: 3
      when:
        - _hyops_use_vip | bool
        - installation_method | default('packages') == 'packages'
        - ansible_os_family == 'Debian'
        - (_hyops_vip_manager_package_repo | default('') | string | length) > 0
        - not (_hyops_vip_manager_binary.stat.exists | default(false))

    - name: Install vip-manager package on RedHat when missing
      ansible.builtin.package:
        name: "/tmp/{{ _hyops_vip_manager_package_repo | basename }}"
        state: present
        disable_gpg_check: true
      register: _hyops_vip_manager_pkg
      until: _hyops_vip_manager_pkg is success
      delay: 5
      retries: 3
      when:
        - _hyops_use_vip | bool
        - installation_method | default('packages') == 'packages'
        - ansible_os_family == 'RedHat'
        - (_hyops_vip_manager_package_repo | default('') | string | length) > 0
        - not (_hyops_vip_manager_binary.stat.exists | default(false))

    - name: Restart vip-manager (ensure DCS watch is fresh)
      ansible.builtin.systemd:
        daemon_reload: true
        name: vip-manager
        state: restarted
        enabled: true
      when: _hyops_use_vip | bool

    - name: Discover current Patroni leader
      ansible.builtin.command: patronictl list -f json
      register: _hyops_patroni_members
      changed_when: false
      run_once: true
      when: _hyops_use_vip | bool

    - name: Record current Patroni leader member
      ansible.builtin.set_fact:
        _hyops_patroni_leader_member: >-
          {{
            (
              (_hyops_patroni_members.stdout | from_json)
              | selectattr('Role', 'equalto', 'Leader')
              | map(attribute='Member')
              | first
            ) | default('')
          }}
      run_once: true
      when: _hyops_use_vip | bool

    - name: Assert Patroni leader was discovered
      ansible.builtin.assert:
        that:
          - (_hyops_patroni_leader_member | default('') | string | length) > 0
        fail_msg: >-
          cluster_vip={{ cluster_vip }} is set, but no live Patroni leader could
          be discovered from `patronictl list -f json`.
      run_once: true
      when: _hyops_use_vip | bool

    - name: Wait for VIP to be present on the leader node
      ansible.builtin.command: "ip -br addr"
      register: _hyops_vip_ip_addr
      changed_when: false
      until: (cluster_vip | string) in (_hyops_vip_ip_addr.stdout | default(''))
      retries: 15
      delay: 2
      delegate_to: "{{ _hyops_patroni_leader_member }}"
      run_once: true
      when: _hyops_use_vip | bool

    - name: "Preflight: assert VIP is configured"
      ansible.builtin.assert:
        that:
          - (cluster_vip | string) in (_hyops_vip_ip_addr.stdout | default(''))
        fail_msg: >-
          cluster_vip={{ cluster_vip }} is set, but vip-manager did not configure it.
          Inspect logs: journalctl -u vip-manager (on the leader node: {{ _hyops_patroni_leader_member }}).
      run_once: true
      when: _hyops_use_vip | bool

- name: platform/postgresql-ha (publish outputs)
  hosts: localhost
  become: false
  gather_facts: false

  vars:
    pg_port: "{{ postgresql_port | default(5432) | int }}"
    _hyops_pg_apps: >-
      {{
        (apps
          if (apps is mapping and (apps | length) > 0)
          else {
            'netbox': {
              'db_name': (db_name | default('netbox')),
              'db_user': (db_user | default('netbox')),
              'db_password_env': (db_password_env | default('NETBOX_DB_PASSWORD'))
            }
          }
        )
      }}
    endpoint_host: >-
      {{
        (cluster_vip | string)
        if (cluster_vip is string and (cluster_vip | length) > 0)
        else (
          hostvars[groups['master'][0]].ansible_host
          if (groups.get('master', []) | length) > 0
          else ''
        )
      }}
    endpoint_target: >-
      {{
        (endpoint_dns_name | string)
        if (endpoint_dns_name is string and (endpoint_dns_name | length) > 0)
        else (
          (cluster_vip | string)
          if (cluster_vip is string and (cluster_vip | length) > 0)
          else (endpoint_host | default('') | string)
        )
      }}
    endpoint_target_type: >-
      {{
        'dns'
        if (endpoint_dns_name is string and (endpoint_dns_name | length) > 0)
        else (
          'vip'
          if (cluster_vip is string and (cluster_vip | length) > 0)
          else 'host'
        )
      }}
    endpoint_cutover_required: >-
      {{
        (
          (endpoint_dns_name is string and (endpoint_dns_name | length) > 0)
          or not (cluster_vip is string and (cluster_vip | length) > 0)
        ) | bool
      }}

  tasks:
    - name: Write HyOps outputs
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {% set host = (endpoint_host | default('')) %}
          {% set port = (pg_port | int) %}
          {% set ns = namespace(out={
            'pg_host': host,
            'pg_port': port,
            'cluster_vip': (cluster_vip | default('') | string),
            'endpoint_target': (endpoint_target | default('') | string),
            'endpoint_target_type': (endpoint_target_type | default('host') | string),
            'endpoint_dns_name': (endpoint_dns_name | default('') | string),
            'endpoint_host': host,
            'endpoint_port': port,
            'endpoint_cutover_required': (endpoint_cutover_required | bool),
            'cap.db.postgresql_ha': 'ready'
          }, apps={}) %}
          {% for item in (_hyops_pg_apps | dict2items) %}
          {% set key = (item.key | string) %}
          {% set ns.apps = ns.apps | combine({
            key: {
              'db_host': host,
              'db_port': port,
              'db_name': (item.value.db_name | string),
              'db_user': (item.value.db_user | string),
              'db_password_env': (item.value.db_password_env | string)
            }
          }) %}
          {% endfor %}
          {% set ns.out = ns.out | combine({'apps': ns.apps}) %}
          {# Backward-compat for NetBox consumption: publish db_* keys from apps.netbox if present #}
          {% if (_hyops_pg_apps is mapping) and ('netbox' in _hyops_pg_apps) %}
          {% set nb = _hyops_pg_apps['netbox'] %}
          {% set ns.out = ns.out | combine({
            'db_host': host,
            'db_port': port,
            'db_name': (nb.db_name | string),
            'db_user': (nb.db_user | string),
            'db_password_env': (nb.db_password_env | string)
          }) %}
          {% endif %}
          {{ ns.out | to_json }}
