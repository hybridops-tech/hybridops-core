---
- name: Platform/k8s/argocd-bootstrap (bootstrap)
  hosts: localhost
  connection: local
  become: false
  gather_facts: false

  vars:
    _hyops_input_kubeconfig_path: "{{ vars.get('kubeconfig_path', '') | default('', true) | string }}"

    _hyops_input_install_argocd: "{{ vars.get('install_argocd', true) | bool }}"
    _hyops_input_argocd_namespace: "{{ vars.get('argocd_namespace', 'argocd') | string }}"
    _hyops_input_argocd_install_manifest_url: "{{ vars.get('argocd_install_manifest_url', 'https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml') | string }}"
    _hyops_input_argocd_install_force_conflicts: "{{ vars.get('argocd_install_force_conflicts', true) | bool }}"
    _hyops_input_argocd_wait_ready: "{{ vars.get('argocd_wait_ready', true) | bool }}"
    _hyops_input_argocd_wait_timeout_s: "{{ vars.get('argocd_wait_timeout_s', 300) | int }}"

    _hyops_input_root_app_name: "{{ vars.get('root_app_name', 'hyops-workloads-root') | string }}"
    _hyops_input_root_app_namespace: "{{ vars.get('root_app_namespace', 'argocd') | string }}"
    _hyops_input_root_app_project: "{{ vars.get('root_app_project', 'default') | string }}"
    _hyops_input_root_destination_namespace: "{{ vars.get('root_destination_namespace', 'argocd') | string }}"
    _hyops_input_destination_server: "{{ vars.get('destination_server', 'https://kubernetes.default.svc') | string }}"

    _hyops_input_workloads_repo_url: "{{ vars.get('workloads_repo_url', '') | default('', true) | string }}"
    _hyops_input_workloads_revision: "{{ vars.get('workloads_revision', 'main') | string }}"
    _hyops_input_workloads_target_path: "{{ vars.get('workloads_target_path', 'clusters/onprem') | string }}"
    _hyops_input_repo_access_mode: "{{ vars.get('repo_access_mode', 'public') | string }}"
    _hyops_input_repo_secret_name: "{{ vars.get('repo_secret_name', 'hyops-workloads-repo') | string }}"
    _hyops_input_repo_ssh_private_key_env: "{{ vars.get('repo_ssh_private_key_env', 'ARGOCD_REPO_SSH_PRIVATE_KEY') | string }}"
    _hyops_input_repo_ssh_known_hosts: "{{ vars.get('repo_ssh_known_hosts', '') | default('', true) | string }}"
    _hyops_input_repo_insecure_ignore_host_key: "{{ vars.get('repo_insecure_ignore_host_key', false) | bool }}"

    _hyops_input_sync_automated_prune: "{{ vars.get('sync_automated_prune', true) | bool }}"
    _hyops_input_sync_automated_self_heal: "{{ vars.get('sync_automated_self_heal', true) | bool }}"
    _hyops_input_create_namespace: "{{ vars.get('create_namespace', true) | bool }}"

  tasks:
    - name: Normalize Argo CD bootstrap inputs
      ansible.builtin.set_fact:
        kubeconfig_path: "{{ _hyops_input_kubeconfig_path }}"
        install_argocd: "{{ _hyops_input_install_argocd }}"
        argocd_namespace: "{{ _hyops_input_argocd_namespace }}"
        argocd_install_manifest_url: "{{ _hyops_input_argocd_install_manifest_url }}"
        argocd_install_force_conflicts: "{{ _hyops_input_argocd_install_force_conflicts }}"
        argocd_wait_ready: "{{ _hyops_input_argocd_wait_ready }}"
        argocd_wait_timeout_s: "{{ _hyops_input_argocd_wait_timeout_s }}"
        root_app_name: "{{ _hyops_input_root_app_name }}"
        root_app_namespace: "{{ _hyops_input_root_app_namespace }}"
        root_app_project: "{{ _hyops_input_root_app_project }}"
        root_destination_namespace: "{{ _hyops_input_root_destination_namespace }}"
        destination_server: "{{ _hyops_input_destination_server }}"
        workloads_repo_url: "{{ _hyops_input_workloads_repo_url }}"
        workloads_revision: "{{ _hyops_input_workloads_revision }}"
        workloads_target_path: "{{ _hyops_input_workloads_target_path }}"
        repo_access_mode: "{{ _hyops_input_repo_access_mode }}"
        repo_secret_name: "{{ _hyops_input_repo_secret_name }}"
        repo_ssh_private_key_env: "{{ _hyops_input_repo_ssh_private_key_env }}"
        repo_ssh_known_hosts: "{{ _hyops_input_repo_ssh_known_hosts }}"
        repo_insecure_ignore_host_key: "{{ _hyops_input_repo_insecure_ignore_host_key }}"
        sync_automated_prune: "{{ _hyops_input_sync_automated_prune }}"
        sync_automated_self_heal: "{{ _hyops_input_sync_automated_self_heal }}"
        create_namespace: "{{ _hyops_input_create_namespace }}"
      changed_when: false

    - name: Assert supported repo access mode
      ansible.builtin.assert:
        that:
          - repo_access_mode in ['public', 'ssh']
        fail_msg: "repo_access_mode must be one of: public, ssh"

    - name: Assert repository URL matches repo access mode
      ansible.builtin.assert:
        that:
          - >-
            (repo_access_mode == 'public' and
             (workloads_repo_url is match('^https?://.+')))
            or
            (repo_access_mode == 'ssh' and
             (workloads_repo_url is match('^(git@|ssh://).+')))
        fail_msg: >-
          public repo mode requires an HTTPS repository URL.
          ssh repo mode requires an SSH repository URL (git@... or ssh://...).

    - name: Resolve kubeconfig path
      ansible.builtin.set_fact:
        _hyops_kubeconfig_path: "{{ kubeconfig_path | default('', true) | string }}"
      changed_when: false

    - name: Assert required fields
      ansible.builtin.assert:
        that:
          - _hyops_kubeconfig_path | length > 0
          - workloads_repo_url | length > 0
          - workloads_target_path | length > 0
          - root_app_name | length > 0
        fail_msg: "required inputs are missing for argocd bootstrap"

    - name: Resolve repository SSH private key from environment
      when: repo_access_mode == 'ssh'
      ansible.builtin.set_fact:
        _hyops_repo_ssh_private_key: >-
          {{
            (
              lookup('env', repo_ssh_private_key_env) | default('', true) | string
            )
            .replace('\r', '')
            .replace('\\n', '\n')
            .strip()
          }}
      changed_when: false

    - name: Assert SSH repo credentials are present
      when: repo_access_mode == 'ssh'
      ansible.builtin.assert:
        that:
          - _hyops_repo_ssh_private_key | default('') | length > 0
          - repo_secret_name | length > 0
          - repo_ssh_private_key_env | length > 0
        fail_msg: >-
          repo_access_mode=ssh requires a deploy key in env
          {{ repo_ssh_private_key_env }} (vault-backed env is supported).

    - name: Check kubeconfig exists
      ansible.builtin.stat:
        path: "{{ _hyops_kubeconfig_path }}"
      register: _hyops_kubeconfig_stat

    - name: Fail when kubeconfig is missing
      ansible.builtin.fail:
        msg: "kubeconfig not found: {{ _hyops_kubeconfig_path }}"
      when: not _hyops_kubeconfig_stat.stat.exists

    - name: Verify kubectl client is available
      ansible.builtin.command:
        cmd: kubectl version --client=true --output=yaml
      changed_when: false

    - name: Verify cluster access
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ _hyops_kubeconfig_path }} cluster-info
      changed_when: false

    - name: Check Argo CD namespace exists
      when: install_argocd | bool
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ _hyops_kubeconfig_path }} get namespace {{ argocd_namespace }}
      register: _hyops_argocd_ns
      changed_when: false
      failed_when: false

    - name: Create Argo CD namespace
      when:
        - install_argocd | bool
        - _hyops_argocd_ns.rc != 0
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ _hyops_kubeconfig_path }} create namespace {{ argocd_namespace }}
      register: _hyops_argocd_ns_create
      changed_when: _hyops_argocd_ns_create.rc == 0

    - name: Apply Argo CD install manifest
      when: install_argocd | bool
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig {{ _hyops_kubeconfig_path }}
          apply --server-side=true
          {% if argocd_install_force_conflicts | bool %}--force-conflicts=true{% endif %}
          -n {{ argocd_namespace }}
          -f {{ argocd_install_manifest_url }}
      register: _hyops_argocd_install
      changed_when: >-
        (_hyops_argocd_install.stdout is defined and (
          'created' in _hyops_argocd_install.stdout or
          'configured' in _hyops_argocd_install.stdout or
          'serverside-applied' in _hyops_argocd_install.stdout
        ))
        or
        (_hyops_argocd_install.stderr is defined and (
          'created' in _hyops_argocd_install.stderr or
          'configured' in _hyops_argocd_install.stderr or
          'serverside-applied' in _hyops_argocd_install.stderr
        ))

    - name: Wait for Argo CD server rollout
      when:
        - install_argocd | bool
        - argocd_wait_ready | bool
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ _hyops_kubeconfig_path }} -n {{ argocd_namespace }} rollout status deploy/argocd-server --timeout={{ argocd_wait_timeout_s | int }}s
      changed_when: false

    - name: Render Argo CD repository secret
      when: repo_access_mode == 'ssh'
      ansible.builtin.copy:
        dest: "{{ (hyops_outputs_file | dirname) ~ '/argocd-repository-secret.yaml' }}"
        mode: "0600"
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ repo_secret_name }}
            namespace: {{ argocd_namespace }}
            labels:
              argocd.argoproj.io/secret-type: repository
              hyops.module: platform-k8s-argocd-bootstrap
            annotations:
              hyops.root-app-name: {{ root_app_name }}
          type: Opaque
          stringData:
            type: git
            url: {{ workloads_repo_url }}
            sshPrivateKey: |
              {{ (_hyops_repo_ssh_private_key | default('')) | indent(14, true) }}
            insecureIgnoreHostKey: {{ (repo_insecure_ignore_host_key | bool) | ternary('true', 'false') }}
          {% if (repo_ssh_known_hosts | string | length) > 0 %}
            sshKnownHosts: |
              {{ (repo_ssh_known_hosts | string) | indent(14, true) }}
          {% endif %}

    - name: Apply Argo CD repository secret
      when: repo_access_mode == 'ssh'
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ _hyops_kubeconfig_path }} apply -f {{ (hyops_outputs_file | dirname) ~ '/argocd-repository-secret.yaml' }}
      register: _hyops_repo_secret_apply
      changed_when: >-
        (_hyops_repo_secret_apply.stdout is defined and (
          'created' in _hyops_repo_secret_apply.stdout or
          'configured' in _hyops_repo_secret_apply.stdout
        ))
        or
        (_hyops_repo_secret_apply.stderr is defined and (
          'created' in _hyops_repo_secret_apply.stderr or
          'configured' in _hyops_repo_secret_apply.stderr
        ))

    - name: Check whether the managed repository secret belongs to this instance
      when:
        - repo_access_mode == 'public'
        - repo_secret_name | length > 0
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ _hyops_kubeconfig_path }}"
          - -n
          - "{{ argocd_namespace }}"
          - get
          - secret
          - "{{ repo_secret_name }}"
          - -o
          - jsonpath={.metadata.annotations.hyops\.root-app-name}
      register: _hyops_repo_secret_owner
      changed_when: false
      failed_when: false

    - name: Remove managed repository secret when repo mode is public
      when:
        - repo_access_mode == 'public'
        - repo_secret_name | length > 0
        - _hyops_repo_secret_owner.rc == 0
        - _hyops_repo_secret_owner.stdout == root_app_name
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ _hyops_kubeconfig_path }} -n {{ argocd_namespace }} delete secret {{ repo_secret_name }} --ignore-not-found=true
      register: _hyops_repo_secret_delete
      changed_when: >-
        (_hyops_repo_secret_delete.stdout is defined and (
          'deleted' in _hyops_repo_secret_delete.stdout
        ))
      failed_when: false

    - name: Render root Application manifest
      ansible.builtin.copy:
        dest: "{{ (hyops_outputs_file | dirname) ~ '/argocd-root-application.yaml' }}"
        mode: "0600"
        content: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: {{ root_app_name }}
            namespace: {{ root_app_namespace }}
            labels:
              hyops.module: platform-k8s-argocd-bootstrap
          spec:
            project: {{ root_app_project }}
            source:
              repoURL: {{ workloads_repo_url }}
              targetRevision: {{ workloads_revision }}
              path: {{ workloads_target_path }}
            destination:
              server: {{ destination_server }}
              namespace: {{ root_destination_namespace }}
            syncPolicy:
              automated:
                prune: {{ (sync_automated_prune | bool) | ternary('true', 'false') }}
                selfHeal: {{ (sync_automated_self_heal | bool) | ternary('true', 'false') }}
              syncOptions:
                - CreateNamespace={{ (create_namespace | bool) | ternary('true', 'false') }}

    - name: Apply root Application
      ansible.builtin.command:
        cmd: kubectl --kubeconfig {{ _hyops_kubeconfig_path }} apply -f {{ (hyops_outputs_file | dirname) ~ '/argocd-root-application.yaml' }}
      register: _hyops_root_apply
      changed_when: >-
        (_hyops_root_apply.stdout is defined and ('created' in _hyops_root_apply.stdout or 'configured' in _hyops_root_apply.stdout))
        or
        (_hyops_root_apply.stderr is defined and ('created' in _hyops_root_apply.stderr or 'configured' in _hyops_root_apply.stderr))

    - name: Write HyOps outputs
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'kubeconfig_path': (_hyops_kubeconfig_path | string),
            'argocd_namespace': (argocd_namespace | string),
            'root_app_name': (root_app_name | string),
            'root_app_namespace': (root_app_namespace | string),
            'root_app_project': (root_app_project | string),
            'workloads_repo_url': (workloads_repo_url | string),
            'workloads_revision': (workloads_revision | string),
            'workloads_target_path': (workloads_target_path | string),
            'repo_access_mode': (repo_access_mode | string),
            'repo_secret_name': ((repo_secret_name | string) if (repo_access_mode | string) == 'ssh' else ''),
            'cap.gitops.argocd': 'ready'
          } | to_json }}
