---
- name: Platform/onprem/rke2-cluster (validate inventory)
  hosts: localhost
  become: false
  gather_facts: false
  tasks:
    - name: Assert control-plane group exists
      ansible.builtin.assert:
        that:
          - groups.get('rke2_servers', []) | length > 0
        fail_msg: "inventory must define group 'rke2_servers' with at least one host"

- name: Platform/onprem/rke2-cluster (server play)
  hosts: rke2_servers
  any_errors_fatal: true
  become: true
  gather_facts: true
  # A control-plane config change can restart rke2-server. Keep quorum by
  # reconciling one member at a time rather than restarting every server in
  # the inventory concurrently.
  serial: 1

  vars:
    rke2_server_role_fqcn: "{{ rke2_server_role_fqcn | default(rke2_role_fqcn | default('rancherfederal.rke2_ansible.rke2_server')) }}"
    rke2_role_vars: "{{ rke2_role_vars | default({}) }}"
    rke2_token_env: "{{ rke2_token_env | default('RKE2_TOKEN') }}"
    enable_longhorn_prereqs: "{{ enable_longhorn_prereqs | default(false) }}"
    rke2_auto_image_tarballs: "{{ rke2_auto_image_tarballs | default(false) }}"
    rke2_image_tarball_urls: "{{ rke2_image_tarball_urls | default([]) }}"
    rke2_reconcile_agent_server: "{{ rke2_reconcile_agent_server | default(false) }}"
    rke2_reconcile_server_config: "{{ rke2_reconcile_server_config | default(false) }}"
    rke2_reverse_path_filter_mode: "{{ rke2_reverse_path_filter_mode | default('preserve') }}"

  pre_tasks:
    - name: Validate reverse-path filter mode on servers
      ansible.builtin.assert:
        that:
          - rke2_reverse_path_filter_mode | lower in ['preserve', 'loose']
        fail_msg: "rke2_reverse_path_filter_mode must be preserve or loose"

    # Loose reverse-path filtering supports valid asymmetric replies on
    # multi-homed Kubernetes nodes. This changes kernel networking only; it
    # does not restart RKE2 or alter the cluster's advertised node addresses.
    - name: Persist loose reverse-path filtering on servers
      when: rke2_reverse_path_filter_mode | lower == 'loose'
      ansible.builtin.copy:
        dest: /etc/sysctl.d/60-hybridops-rke2-networking.conf
        mode: "0644"
        content: |
          # Managed by HybridOps platform/onprem/rke2-cluster.
          # Loose mode is required when a multi-homed node has asymmetric routes.
          net.ipv4.conf.all.rp_filter = 2
          net.ipv4.conf.default.rp_filter = 2

    - name: Apply loose reverse-path filtering on servers
      when: rke2_reverse_path_filter_mode | lower == 'loose'
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/60-hybridops-rke2-networking.conf
      changed_when: false

    - name: Ensure Longhorn prerequisite packages on Red Hat servers
      when:
        - (enable_longhorn_prereqs | bool)
        - ansible_os_family == 'RedHat'
      ansible.builtin.package:
        name:
          - iscsi-initiator-utils
          - nfs-utils
        state: present

    - name: Ensure Longhorn prerequisite packages on Debian servers
      when:
        - (enable_longhorn_prereqs | bool)
        - ansible_os_family == 'Debian'
      ansible.builtin.package:
        name:
          - open-iscsi
          - nfs-common
        state: present

    - name: Enable iSCSI service for Longhorn on servers
      when: enable_longhorn_prereqs | bool
      ansible.builtin.service:
        name: iscsid
        enabled: true
        state: started

    - name: Build role vars
      no_log: true
      vars:
        _base_role_vars: "{{ (rke2_role_vars if (rke2_role_vars is mapping) else {}) }}"
        _install_rke2_version_raw: "{{ (_base_role_vars.get('install_rke2_version', '') | string) }}"
        _install_rke2_version_enc: "{{ _install_rke2_version_raw | regex_replace('\\+', '%2B') }}"
        _base_rke2_images_urls: "{{ (_base_role_vars.get('rke2_images_urls', []) if (_base_role_vars.get('rke2_images_urls', []) is sequence and (_base_role_vars.get('rke2_images_urls', []) is not string)) else []) }}"
        _custom_rke2_images_urls: "{{ (rke2_image_tarball_urls if (rke2_image_tarball_urls is sequence and (rke2_image_tarball_urls is not string)) else []) }}"
        _auto_rke2_images_urls: >-
          {{
            [
              'https://github.com/rancher/rke2/releases/download/' ~ _install_rke2_version_enc ~ '/rke2-images-core.linux-amd64.tar.zst',
              'https://github.com/rancher/rke2/releases/download/' ~ _install_rke2_version_enc ~ '/rke2-images-canal.linux-amd64.tar.zst'
            ]
            if ((rke2_auto_image_tarballs | bool) and (_install_rke2_version_raw | length > 0))
            else []
          }}
        _effective_rke2_images_urls: >-
          {{
            _custom_rke2_images_urls
            if (_custom_rke2_images_urls | length > 0)
            else (
              _base_rke2_images_urls
              if (_base_rke2_images_urls | length > 0)
              else _auto_rke2_images_urls
            )
          }}
      ansible.builtin.set_fact:
        _hyops_rke2_role_vars: >-
          {{
            ({
              'rke2_token': lookup('env', rke2_token_env),
              'kubernetes_api_server_host': (
                hostvars[(groups.get('rke2_servers', []) | first)].ansible_host
                | default((groups.get('rke2_servers', []) | first))
              )
            }
              | combine(_base_role_vars, recursive=True)
              | combine(({'rke2_images_urls': _effective_rke2_images_urls} if (_effective_rke2_images_urls | length > 0) else {}), recursive=True))
          }}
      changed_when: false

    # Opt-in recovery operation for a server left in an in-flight systemd
    # start after a failed configuration attempt. The server play is serial,
    # so this preserves etcd quorum while its configuration is reconciled.
    - name: Stop server before configuration reconciliation
      when: rke2_reconcile_server_config | bool
      ansible.builtin.systemd:
        name: rke2-server
        state: stopped

    # The upstream role only adds a server declaration when one is missing.
    # During recovery, stale declarations can point at a removed control-plane
    # member and leave future restarts hanging. Remove every server declaration
    # first, then add one back only for non-initial servers.
    - name: Remove existing server registration endpoint declarations
      when: rke2_reconcile_server_config | bool
      ansible.builtin.replace:
        path: /etc/rancher/rke2/config.yaml
        regexp: '^server:\s*.*\n?'
        replace: ''

    - name: Declare a single reconciled server registration endpoint
      when:
        - rke2_reconcile_server_config | bool
        - inventory_hostname != (groups.get('rke2_servers', []) | first)
      vars:
        _hyops_registration_host: >-
          {{
            hostvars[(groups.get('rke2_servers', []) | first)].ansible_host
            | default((groups.get('rke2_servers', []) | first))
          }}
      ansible.builtin.lineinfile:
        path: /etc/rancher/rke2/config.yaml
        line: "server: https://{{ _hyops_registration_host }}:9345"
        insertbefore: BOF
        create: true
        mode: "0640"

    - name: Ensure target image directory exists with executable perms
      when:
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.file:
        path: /var/lib/rancher/rke2/agent/images
        state: directory
        mode: "0755"

    - name: Ensure local RKE2 image cache directory exists
      run_once: true
      delegate_to: localhost
      become: false
      when:
        - (rke2_stage_images_from_controller | default(false)) | bool
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.file:
        path: "{{ (hyops_outputs_file | dirname) ~ '/rke2-images' }}"
        state: directory
        mode: "0755"

    - name: Download RKE2 image tarballs on control node
      run_once: true
      delegate_to: localhost
      become: false
      when:
        - (rke2_stage_images_from_controller | default(false)) | bool
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.get_url:
        url: "{{ item }}"
        dest: "{{ (hyops_outputs_file | dirname) ~ '/rke2-images/' ~ (item | regex_replace('^.*/', '')) }}"
        mode: "0644"
        force: false
        timeout: "{{ (rke2_image_download_timeout_s | default(120)) | int }}"
      loop: "{{ _hyops_rke2_role_vars.get('rke2_images_urls', []) }}"

    - name: Copy staged RKE2 image tarballs to target hosts
      when:
        - (rke2_stage_images_from_controller | default(false)) | bool
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.copy:
        src: "{{ (hyops_outputs_file | dirname) ~ '/rke2-images/' ~ (item | regex_replace('^.*/', '')) }}"
        dest: "/var/lib/rancher/rke2/agent/images/{{ item | regex_replace('^.*/', '') }}"
        mode: "0644"
      loop: "{{ _hyops_rke2_role_vars.get('rke2_images_urls', []) }}"

    - name: Disable role-side URL image downloads when staged from control node
      when:
        - (rke2_stage_images_from_controller | default(false)) | bool
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.set_fact:
        _hyops_rke2_role_vars: "{{ _hyops_rke2_role_vars | combine({'rke2_images_urls': []}, recursive=True) }}"
      changed_when: false

    - name: Promote merged RKE2 vars into host vars
      no_log: true
      ansible.builtin.set_fact:
        "{{ item.key }}": "{{ item.value }}"
      loop: "{{ (_hyops_rke2_role_vars if (_hyops_rke2_role_vars is mapping) else {}) | dict2items }}"
      changed_when: false

  tasks:
    - name: Run RKE2 server role
      ansible.builtin.include_role:
        name: "{{ rke2_server_role_fqcn }}"

- name: Platform/onprem/rke2-cluster (agent play)
  hosts: rke2_agents
  any_errors_fatal: true
  become: true
  gather_facts: true
  serial: 10

  vars:
    rke2_agent_role_fqcn: "{{ rke2_agent_role_fqcn | default('rancherfederal.rke2_ansible.rke2_agent') }}"
    rke2_role_vars: "{{ rke2_role_vars | default({}) }}"
    rke2_token_env: "{{ rke2_token_env | default('RKE2_TOKEN') }}"
    enable_longhorn_prereqs: "{{ enable_longhorn_prereqs | default(false) }}"
    rke2_auto_image_tarballs: "{{ rke2_auto_image_tarballs | default(false) }}"
    rke2_image_tarball_urls: "{{ rke2_image_tarball_urls | default([]) }}"
    rke2_reverse_path_filter_mode: "{{ rke2_reverse_path_filter_mode | default('preserve') }}"

  pre_tasks:
    - name: Validate reverse-path filter mode on agents
      ansible.builtin.assert:
        that:
          - rke2_reverse_path_filter_mode | lower in ['preserve', 'loose']
        fail_msg: "rke2_reverse_path_filter_mode must be preserve or loose"

    - name: Persist loose reverse-path filtering on agents
      when: rke2_reverse_path_filter_mode | lower == 'loose'
      ansible.builtin.copy:
        dest: /etc/sysctl.d/60-hybridops-rke2-networking.conf
        mode: "0644"
        content: |
          # Managed by HybridOps platform/onprem/rke2-cluster.
          # Loose mode is required when a multi-homed node has asymmetric routes.
          net.ipv4.conf.all.rp_filter = 2
          net.ipv4.conf.default.rp_filter = 2

    - name: Apply loose reverse-path filtering on agents
      when: rke2_reverse_path_filter_mode | lower == 'loose'
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/60-hybridops-rke2-networking.conf
      changed_when: false

    - name: Ensure Longhorn prerequisite packages on Red Hat agents
      when:
        - (enable_longhorn_prereqs | bool)
        - ansible_os_family == 'RedHat'
      ansible.builtin.package:
        name:
          - iscsi-initiator-utils
          - nfs-utils
        state: present

    - name: Ensure Longhorn prerequisite packages on Debian agents
      when:
        - (enable_longhorn_prereqs | bool)
        - ansible_os_family == 'Debian'
      ansible.builtin.package:
        name:
          - open-iscsi
          - nfs-common
        state: present

    - name: Enable iSCSI service for Longhorn on agents
      when: enable_longhorn_prereqs | bool
      ansible.builtin.service:
        name: iscsid
        enabled: true
        state: started

    - name: Build role vars
      no_log: true
      vars:
        _base_role_vars: "{{ (rke2_role_vars if (rke2_role_vars is mapping) else {}) }}"
        _install_rke2_version_raw: "{{ (_base_role_vars.get('install_rke2_version', '') | string) }}"
        _install_rke2_version_enc: "{{ _install_rke2_version_raw | regex_replace('\\+', '%2B') }}"
        _base_rke2_images_urls: "{{ (_base_role_vars.get('rke2_images_urls', []) if (_base_role_vars.get('rke2_images_urls', []) is sequence and (_base_role_vars.get('rke2_images_urls', []) is not string)) else []) }}"
        _custom_rke2_images_urls: "{{ (rke2_image_tarball_urls if (rke2_image_tarball_urls is sequence and (rke2_image_tarball_urls is not string)) else []) }}"
        _auto_rke2_images_urls: >-
          {{
            [
              'https://github.com/rancher/rke2/releases/download/' ~ _install_rke2_version_enc ~ '/rke2-images-core.linux-amd64.tar.zst',
              'https://github.com/rancher/rke2/releases/download/' ~ _install_rke2_version_enc ~ '/rke2-images-canal.linux-amd64.tar.zst'
            ]
            if ((rke2_auto_image_tarballs | bool) and (_install_rke2_version_raw | length > 0))
            else []
          }}
        _effective_rke2_images_urls: >-
          {{
            _custom_rke2_images_urls
            if (_custom_rke2_images_urls | length > 0)
            else (
              _base_rke2_images_urls
              if (_base_rke2_images_urls | length > 0)
              else _auto_rke2_images_urls
            )
          }}
      ansible.builtin.set_fact:
        _hyops_rke2_role_vars: >-
          {{
            ({
              'rke2_token': lookup('env', rke2_token_env),
              'kubernetes_api_server_host': (
                hostvars[(groups.get('rke2_servers', []) | first)].ansible_host
                | default((groups.get('rke2_servers', []) | first))
              )
            }
              | combine(_base_role_vars, recursive=True)
              | combine(({'rke2_images_urls': _effective_rke2_images_urls} if (_effective_rke2_images_urls | length > 0) else {}), recursive=True))
          }}
      changed_when: false

    # This is intentionally opt-in: it is a recovery operation for agents
    # whose original registration server has been replaced. Stop the agent
    # before touching config so an in-flight connection to the old server
    # cannot hold a systemd start job open.
    - name: Stop agent before registration endpoint reconciliation
      when: rke2_reconcile_agent_server | default(false) | bool
      ansible.builtin.systemd:
        name: rke2-agent
        state: stopped

    # `lineinfile` replaces only one matching line. Remove every existing
    # server declaration first, because duplicated YAML keys make RKE2 use
    # the last (potentially stale) address.
    - name: Remove existing agent registration endpoint declarations
      when: rke2_reconcile_agent_server | default(false) | bool
      ansible.builtin.replace:
        path: /etc/rancher/rke2/config.yaml
        regexp: '^server:\\s*.*\\n?'
        replace: ''

    - name: Declare a single reconciled agent registration endpoint
      when: rke2_reconcile_agent_server | default(false) | bool
      vars:
        _hyops_registration_host: >-
          {{
            hostvars[(groups.get('rke2_servers', []) | first)].ansible_host
            | default((groups.get('rke2_servers', []) | first))
          }}
      ansible.builtin.lineinfile:
        path: /etc/rancher/rke2/config.yaml
        line: "server: https://{{ _hyops_registration_host }}:9345"
        insertbefore: BOF
        create: true
        mode: "0640"

    - name: Ensure target image directory exists with executable perms
      when:
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.file:
        path: /var/lib/rancher/rke2/agent/images
        state: directory
        mode: "0755"

    - name: Ensure local RKE2 image cache directory exists
      run_once: true
      delegate_to: localhost
      become: false
      when:
        - (rke2_stage_images_from_controller | default(false)) | bool
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.file:
        path: "{{ (hyops_outputs_file | dirname) ~ '/rke2-images' }}"
        state: directory
        mode: "0755"

    - name: Download RKE2 image tarballs on control node
      run_once: true
      delegate_to: localhost
      become: false
      when:
        - (rke2_stage_images_from_controller | default(false)) | bool
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.get_url:
        url: "{{ item }}"
        dest: "{{ (hyops_outputs_file | dirname) ~ '/rke2-images/' ~ (item | regex_replace('^.*/', '')) }}"
        mode: "0644"
        force: false
        timeout: "{{ (rke2_image_download_timeout_s | default(120)) | int }}"
      loop: "{{ _hyops_rke2_role_vars.get('rke2_images_urls', []) }}"

    - name: Copy staged RKE2 image tarballs to target hosts
      when:
        - (rke2_stage_images_from_controller | default(false)) | bool
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.copy:
        src: "{{ (hyops_outputs_file | dirname) ~ '/rke2-images/' ~ (item | regex_replace('^.*/', '')) }}"
        dest: "/var/lib/rancher/rke2/agent/images/{{ item | regex_replace('^.*/', '') }}"
        mode: "0644"
      loop: "{{ _hyops_rke2_role_vars.get('rke2_images_urls', []) }}"

    - name: Disable role-side URL image downloads when staged from control node
      when:
        - (rke2_stage_images_from_controller | default(false)) | bool
        - (_hyops_rke2_role_vars.get('rke2_images_urls', []) | length) > 0
      ansible.builtin.set_fact:
        _hyops_rke2_role_vars: "{{ _hyops_rke2_role_vars | combine({'rke2_images_urls': []}, recursive=True) }}"
      changed_when: false

    - name: Promote merged RKE2 vars into host vars
      no_log: true
      ansible.builtin.set_fact:
        "{{ item.key }}": "{{ item.value }}"
      loop: "{{ (_hyops_rke2_role_vars if (_hyops_rke2_role_vars is mapping) else {}) | dict2items }}"
      changed_when: false

  tasks:
    - name: Run RKE2 agent role
      ansible.builtin.include_role:
        name: "{{ rke2_agent_role_fqcn }}"

- name: Platform/onprem/rke2-cluster (manifest play)
  hosts: rke2_servers
  any_errors_fatal: true
  become: true
  gather_facts: false
  serial: 5

  vars:
    rke2_manifest_role_fqcn: "{{ rke2_manifest_role_fqcn | default('rancherfederal.rke2_ansible.cluster_manifest') }}"
    rke2_role_vars: "{{ rke2_role_vars | default({}) }}"

  pre_tasks:
    - name: Promote merged RKE2 vars into host vars
      no_log: true
      ansible.builtin.set_fact:
        "{{ item.key }}": "{{ item.value }}"
      loop: "{{ ((rke2_role_vars if (rke2_role_vars is mapping) else {})) | dict2items }}"
      changed_when: false

  tasks:
    - name: Run RKE2 cluster manifest role
      ansible.builtin.include_role:
        name: "{{ rke2_manifest_role_fqcn }}"

- name: Platform/onprem/rke2-cluster (publish outputs)
  hosts: localhost
  become: false
  gather_facts: false

  vars:
    rke2_kubeconfig_out: "{{ rke2_kubeconfig_out | default('') }}"

  tasks:
    - name: Decide kubeconfig output path
      ansible.builtin.set_fact:
        _hyops_kubeconfig_out: >-
          {{
            (rke2_kubeconfig_out | string)
            if (rke2_kubeconfig_out is string and (rke2_kubeconfig_out | length) > 0)
            else (hyops_runtime_root ~ '/state/kubeconfigs/rke2.yaml')
          }}
      changed_when: false

    - name: Fetch kubeconfig from primary server
      delegate_to: "{{ (groups['rke2_servers'] | first) }}"
      become: true
      ansible.builtin.slurp:
        src: /etc/rancher/rke2/rke2.yaml
      register: _hyops_kubeconfig_raw
      failed_when: false
      changed_when: false

    - name: Ensure kubeconfig output directory exists
      ansible.builtin.file:
        path: "{{ _hyops_kubeconfig_out | dirname }}"
        state: directory
        mode: "0700"

    - name: Write kubeconfig locally
      when: _hyops_kubeconfig_raw is defined and (_hyops_kubeconfig_raw.content | default('')) | length > 0
      vars:
        _primary: "{{ (groups['rke2_servers'] | first) }}"
        _primary_ip: "{{ hostvars[_primary].ansible_host | default(_primary) }}"
        _raw: "{{ (_hyops_kubeconfig_raw.content | b64decode) }}"
      ansible.builtin.copy:
        dest: "{{ _hyops_kubeconfig_out }}"
        mode: "0600"
        content: "{{ _raw | regex_replace('127\\.0\\.0\\.1', _primary_ip) }}"

    - name: Write HyOps outputs
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {% set servers = groups.get('rke2_servers', []) %}
          {% set agents = groups.get('rke2_agents', []) %}
          {% set kube = (_hyops_kubeconfig_out | default(hyops_runtime_root ~ '/state/kubeconfigs/rke2.yaml')) %}
          {{ {
            'kubeconfig_path': (kube | string),
            'rke2_servers': (servers | list),
            'rke2_agents': (agents | list),
            'cap.k8s.rke2': 'ready'
          } | to_json }}
