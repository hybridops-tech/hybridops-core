---
- name: Platform/onprem/rke2-cluster (destroy)
  hosts: targets
  become: true
  gather_facts: true

  tasks:
    - name: Stop RKE2 services (best effort)
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - rke2-server
        - rke2-agent
      failed_when: false

    - name: Check RKE2 server uninstall script
      ansible.builtin.stat:
        path: /usr/local/bin/rke2-uninstall.sh
      register: _hyops_rke2_server_uninstall
      changed_when: false

    - name: Check RKE2 agent uninstall script
      ansible.builtin.stat:
        path: /usr/local/bin/rke2-agent-uninstall.sh
      register: _hyops_rke2_agent_uninstall
      changed_when: false

    - name: Run RKE2 server uninstall script when present
      ansible.builtin.command:
        argv:
          - /usr/local/bin/rke2-uninstall.sh
      register: _hyops_rke2_server_uninstall_run
      changed_when: (_hyops_rke2_server_uninstall_run.rc | int) == 0
      failed_when: false
      when: _hyops_rke2_server_uninstall.stat.exists

    - name: Run RKE2 agent uninstall script when present
      ansible.builtin.command:
        argv:
          - /usr/local/bin/rke2-agent-uninstall.sh
      register: _hyops_rke2_agent_uninstall_run
      changed_when: (_hyops_rke2_agent_uninstall_run.rc | int) == 0
      failed_when: false
      when: _hyops_rke2_agent_uninstall.stat.exists

    - name: Kill lingering RKE2 processes (best effort)
      ansible.builtin.shell: |
        set -o pipefail
        changed=0
        if pgrep -f '/usr/local/bin/rke2|/usr/bin/rke2|/var/lib/rancher/rke2|/run/k3s' >/dev/null 2>&1; then
          pkill -9 -f '/usr/local/bin/rke2|/usr/bin/rke2|/var/lib/rancher/rke2|/run/k3s' || true
          changed=1
        fi
        if pgrep -f 'kubelet.*rke2|kube-apiserver|kube-controller-manager|kube-scheduler|etcd' >/dev/null 2>&1; then
          pkill -9 -f 'kubelet.*rke2|kube-apiserver|kube-controller-manager|kube-scheduler|etcd' || true
          changed=1
        fi
        printf '%s' "${changed}"
      args:
        executable: /bin/bash
      register: _hyops_rke2_kill
      changed_when: (_hyops_rke2_kill.stdout | default('0') | trim) == '1'
      failed_when: false

    - name: Remove RKE2 directories (best effort)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/rancher/rke2
        - /var/lib/rancher/rke2
        - /run/k3s
        - /var/lib/kubelet
        - /var/lib/cni
        - /etc/cni/net.d

    - name: Remove RKE2 RPM packages (best effort)
      ansible.builtin.package:
        name:
          - rke2-server
          - rke2-agent
        state: absent
      failed_when: false

    - name: Reload systemd daemon (best effort)
      ansible.builtin.systemd:
        daemon_reload: true
      changed_when: false
      failed_when: false

- name: Platform/onprem/rke2-cluster (cleanup local)
  hosts: localhost
  become: false
  gather_facts: false

  vars:
    rke2_kubeconfig_out: "{{ rke2_kubeconfig_out | default('') }}"

  tasks:
    - name: Remove kubeconfig file (best effort)
      ansible.builtin.file:
        path: "{{ (rke2_kubeconfig_out | length > 0) | ternary(rke2_kubeconfig_out, hyops_runtime_root ~ '/state/kubeconfigs/rke2.yaml') }}"
        state: absent

    - name: Write HyOps outputs
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {'cap.k8s.rke2': 'absent'} | to_json }}
