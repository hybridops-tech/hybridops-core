---
- name: platform/onprem/netbox (configure)
  hosts: targets
  become: true
  gather_facts: true

  vars:
    _hyops_input_netbox_version: "{{ netbox_version | default('v4.1.7') }}"
    _hyops_input_netbox_http_host_port: "{{ netbox_http_host_port | default(8000) | int }}"
    _hyops_input_netbox_hostname: "{{ netbox_hostname | default('netbox') }}"
    _hyops_input_netbox_domain: "{{ netbox_domain | default('hybzone.local') }}"
    _hyops_input_db_host: "{{ db_host | default('') }}"
    _hyops_input_db_port: "{{ db_port | default(5432) | int }}"
    _hyops_input_db_name: "{{ db_name | default('netbox') }}"
    _hyops_input_db_user: "{{ db_user | default('netbox') }}"
    _hyops_input_db_password_env: "{{ db_password_env | default('NETBOX_DB_PASSWORD') }}"
    _hyops_input_secret_key_env: "{{ secret_key_env | default('NETBOX_SECRET_KEY') }}"
    _hyops_input_superuser_password_env: "{{ superuser_password_env | default('NETBOX_SUPERUSER_PASSWORD') }}"
    _hyops_input_api_token_env: "{{ api_token_env | default('NETBOX_API_TOKEN') }}"
    _hyops_input_seed_foundation_netbox_sync: "{{ seed_foundation_netbox_sync | default(false) | bool }}"
    _hyops_input_seed_foundation_netbox_wait_s: "{{ seed_foundation_netbox_wait_s | default(60) | int }}"
    _hyops_input_install_docker_engine: "{{ install_docker_engine | default(true) | bool }}"

  tasks:
    - name: Run NetBox service role
      ansible.builtin.include_role:
        name: hybridops.app.netbox_service
      vars:
        netbox_version: "{{ _hyops_input_netbox_version }}"
        netbox_hostname: "{{ _hyops_input_netbox_hostname }}"
        netbox_domain: "{{ _hyops_input_netbox_domain }}"
        netbox_http_host_port: "{{ _hyops_input_netbox_http_host_port }}"
        netbox_install_docker_engine: "{{ _hyops_input_install_docker_engine }}"
        netbox_smoke_only: false
        netbox_db_host: "{{ _hyops_input_db_host }}"
        netbox_db_port: "{{ _hyops_input_db_port }}"
        netbox_db_name: "{{ _hyops_input_db_name }}"
        netbox_db_user: "{{ _hyops_input_db_user }}"
        netbox_db_password: "{{ lookup('env', _hyops_input_db_password_env) }}"
        netbox_secret_key: "{{ lookup('env', _hyops_input_secret_key_env) }}"
        netbox_superuser_password: "{{ lookup('env', _hyops_input_superuser_password_env) | default('', true) }}"
        netbox_api_token_key: "{{ lookup('env', _hyops_input_api_token_env) | default('', true) }}"

  post_tasks:
    - name: Seed NetBox with foundation IPAM + VM datasets (sync-only)
      when: _hyops_input_seed_foundation_netbox_sync
      delegate_to: localhost
      become: false
      block:
        - name: Resolve local HyOps/NetBox seed paths
          ansible.builtin.set_fact:
            hyops_seed_hyops_executable: "{{ lookup('env', 'HYOPS_EXECUTABLE') | default('hyops', true) }}"
            hyops_seed_runtime_root: "{{ lookup('env', 'HYOPS_RUNTIME_ROOT') | default('', true) }}"
            hyops_seed_netbox_target_host: "{{ hostvars[inventory_hostname].ansible_host | default('') }}"
            hyops_seed_netbox_target_user: "{{ hostvars[inventory_hostname].ansible_user | default('root') }}"
            hyops_seed_netbox_target_port: "{{ hostvars[inventory_hostname].ansible_port | default(22) }}"
            hyops_seed_netbox_ssh_common_args: "{{ hostvars[inventory_hostname].ansible_ssh_common_args | default('') }}"
            hyops_seed_ipam_dataset: "{{ (lookup('env', 'HYOPS_RUNTIME_ROOT') | default('', true)) ~ '/state/netbox/network/ipam-prefixes.auto.json' }}"
            hyops_seed_vm_dataset: "{{ (lookup('env', 'HYOPS_RUNTIME_ROOT') | default('', true)) ~ '/state/netbox/vms/vms.auto.json' }}"

        - name: Assert HyOps runtime root is available for seed sync
          ansible.builtin.assert:
            that:
              - hyops_seed_runtime_root | length > 0
            fail_msg: "HYOPS_RUNTIME_ROOT is not set; cannot run sync-only NetBox foundation seed."

        - name: Allocate controller-local NetBox tunnel port
          ansible.builtin.command:
            argv:
              - python3
              - -c
              - "import socket; s=socket.socket(); s.bind(('127.0.0.1', 0)); print(s.getsockname()[1]); s.close()"
          register: hyops_seed_tunnel_port_cmd
          changed_when: false

        - name: Set controller-local NetBox tunnel facts
          ansible.builtin.set_fact:
            hyops_seed_tunnel_port: "{{ hyops_seed_tunnel_port_cmd.stdout | trim }}"
            hyops_seed_tunnel_control_path: >-
              /tmp/hyops-netbox-seed-{{ inventory_hostname | regex_replace('[^A-Za-z0-9_.-]', '_') }}.ctl
            hyops_seed_netbox_api_url: "http://127.0.0.1:{{ hyops_seed_tunnel_port_cmd.stdout | trim }}/api/"

        - name: Seed NetBox through controller-local SSH tunnel
          block:
            - name: Remove stale seed tunnel control socket
              ansible.builtin.file:
                path: "{{ hyops_seed_tunnel_control_path }}"
                state: absent

            - name: Start controller-local SSH tunnel to NetBox API
              ansible.builtin.command:
                argv: >-
                  {{
                    [
                      'ssh',
                      '-f',
                      '-N',
                      '-o',
                      'BatchMode=yes',
                      '-o',
                      'ExitOnForwardFailure=yes',
                      '-o',
                      'ControlMaster=yes',
                      '-o',
                      'ControlPersist=60',
                      '-o',
                      'ControlPath=' ~ hyops_seed_tunnel_control_path,
                      '-p',
                      (hyops_seed_netbox_target_port | int | string)
                    ]
                    + (hyops_seed_netbox_ssh_common_args | default('') | split)
                    + [
                      '-L',
                      '127.0.0.1:' ~ hyops_seed_tunnel_port ~ ':127.0.0.1:' ~ (_hyops_input_netbox_http_host_port | string),
                      hyops_seed_netbox_target_user ~ '@' ~ hyops_seed_netbox_target_host
                    ]
                  }}
              changed_when: true

            - name: Wait for NetBox API to be reachable from controller before seed sync
              ansible.builtin.uri:
                url: "{{ hyops_seed_netbox_api_url }}"
                method: GET
                status_code: [200, 302, 401, 403]
                timeout: 5
              register: hyops_seed_api_wait
              retries: "{{ [1, (((_hyops_input_seed_foundation_netbox_wait_s | int) + 4) // 5)] | max }}"
              delay: 5
              until: hyops_seed_api_wait.status in [200, 302, 401, 403]

            - name: Check seed datasets exist
              ansible.builtin.stat:
                path: "{{ item }}"
              loop:
                - "{{ hyops_seed_ipam_dataset }}"
                - "{{ hyops_seed_vm_dataset }}"
              register: hyops_seed_dataset_stats

            - name: Assert seed datasets are present
              ansible.builtin.assert:
                that:
                  - (hyops_seed_dataset_stats.results | selectattr('stat.exists', 'equalto', false) | list | length) == 0
                fail_msg: >-
                  NetBox foundation seed dataset missing. Expected exported datasets at
                  {{ hyops_seed_ipam_dataset }} and {{ hyops_seed_vm_dataset }}.

            - name: Sync foundation IPAM prefixes into NetBox (strict)
              ansible.builtin.command:
                argv:
                  - "{{ hyops_seed_hyops_executable }}"
                  - "inventory"
                  - "sync-netbox"
                  - "--dataset"
                  - "{{ hyops_seed_ipam_dataset }}"
                  - "--kind"
                  - "ipam-prefixes"
                  - "--ipam-target"
                  - "onprem-sdn"
              environment:
                NETBOX_API_URL: "{{ hyops_seed_netbox_api_url }}"
                NETBOX_API_TOKEN: "{{ lookup('env', _hyops_input_api_token_env) }}"
              changed_when: true

            - name: Sync foundation VM inventory into NetBox (strict)
              ansible.builtin.command:
                argv:
                  - "{{ hyops_seed_hyops_executable }}"
                  - "inventory"
                  - "sync-netbox"
                  - "--dataset"
                  - "{{ hyops_seed_vm_dataset }}"
                  - "--kind"
                  - "vms"
              environment:
                NETBOX_API_URL: "{{ hyops_seed_netbox_api_url }}"
                NETBOX_API_TOKEN: "{{ lookup('env', _hyops_input_api_token_env) }}"
              changed_when: true
          always:
            - name: Stop controller-local SSH tunnel to NetBox API
              ansible.builtin.command:
                argv: >-
                  {{
                    [
                      'ssh',
                      '-S',
                      hyops_seed_tunnel_control_path,
                      '-O',
                      'exit',
                      '-p',
                      (hyops_seed_netbox_target_port | int | string)
                    ]
                    + (hyops_seed_netbox_ssh_common_args | default('') | split)
                    + [hyops_seed_netbox_target_user ~ '@' ~ hyops_seed_netbox_target_host]
                  }}
              changed_when: true
              failed_when: false

            - name: Remove seed tunnel control socket
              ansible.builtin.file:
                path: "{{ hyops_seed_tunnel_control_path }}"
                state: absent

    - name: Write HyOps outputs
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'netbox_url': ('http://' ~ (hostvars[inventory_hostname].ansible_host | default('')) ~ ':' ~ (_hyops_input_netbox_http_host_port | int) ~ '/'),
            'netbox_api_url': ('http://' ~ (hostvars[inventory_hostname].ansible_host | default('')) ~ ':' ~ (_hyops_input_netbox_http_host_port | int) ~ '/api/'),
            'netbox_http_host_port': (_hyops_input_netbox_http_host_port | int),
            'db_host': (_hyops_input_db_host | string),
            'db_port': (_hyops_input_db_port | int),
            'db_name': (_hyops_input_db_name | string),
            'db_user': (_hyops_input_db_user | string),
            'db_password_env': (_hyops_input_db_password_env | string),
            'secret_key_env': (_hyops_input_secret_key_env | string),
            'superuser_password_env': (_hyops_input_superuser_password_env | string),
            'api_token_env': (_hyops_input_api_token_env | string),
            'cap.ipam.netbox': 'ready'
          } | to_json }}
