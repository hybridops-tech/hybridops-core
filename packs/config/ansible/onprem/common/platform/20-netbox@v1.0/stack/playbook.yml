---
- name: platform/onprem/netbox (configure)
  hosts: targets
  become: true
  gather_facts: true

  vars:
    netbox_version: "{{ netbox_version | default('v4.1.7') }}"
    netbox_http_host_port: "{{ netbox_http_host_port | default(8000) }}"
    netbox_hostname: "{{ netbox_hostname | default('netbox') }}"
    netbox_domain: "{{ netbox_domain | default('hybzone.local') }}"

    db_host: "{{ db_host | default('') }}"
    db_port: "{{ db_port | default(5432) }}"
    db_name: "{{ db_name | default('netbox') }}"
    db_user: "{{ db_user | default('netbox') }}"
    db_password_env: "{{ db_password_env | default('NETBOX_DB_PASSWORD') }}"

    secret_key_env: "{{ secret_key_env | default('NETBOX_SECRET_KEY') }}"
    superuser_password_env: "{{ superuser_password_env | default('NETBOX_SUPERUSER_PASSWORD') }}"
    api_token_env: "{{ api_token_env | default('NETBOX_API_TOKEN') }}"
    seed_foundation_netbox_sync: "{{ seed_foundation_netbox_sync | default(false) }}"
    seed_foundation_netbox_wait_s: "{{ seed_foundation_netbox_wait_s | default(60) }}"

    install_docker_engine: "{{ install_docker_engine | default(true) }}"

  roles:
    - role: hybridops.app.netbox_service
      vars:
        netbox_version: "{{ netbox_version }}"
        netbox_hostname: "{{ netbox_hostname }}"
        netbox_domain: "{{ netbox_domain }}"
        netbox_http_host_port: "{{ netbox_http_host_port | int }}"

        netbox_install_docker_engine: "{{ install_docker_engine | bool }}"
        netbox_smoke_only: false

        netbox_db_host: "{{ db_host }}"
        netbox_db_port: "{{ db_port | int }}"
        netbox_db_name: "{{ db_name }}"
        netbox_db_user: "{{ db_user }}"
        netbox_db_password: "{{ lookup('env', db_password_env) }}"

        netbox_secret_key: "{{ lookup('env', secret_key_env) }}"
        netbox_superuser_password: "{{ lookup('env', superuser_password_env) | default('', true) }}"
        netbox_api_token_key: "{{ lookup('env', api_token_env) | default('', true) }}"

  post_tasks:
    - name: Seed NetBox with foundation IPAM + VM datasets (sync-only)
      when: seed_foundation_netbox_sync | bool
      delegate_to: localhost
      become: false
      block:
        - name: Resolve local HyOps/NetBox seed paths
          ansible.builtin.set_fact:
            hyops_seed_hyops_executable: "{{ lookup('env', 'HYOPS_EXECUTABLE') | default('hyops', true) }}"
            hyops_seed_runtime_root: "{{ lookup('env', 'HYOPS_RUNTIME_ROOT') | default('', true) }}"
            hyops_seed_netbox_api_url: "http://{{ hostvars[inventory_hostname].ansible_host | default('') }}:{{ netbox_http_host_port | int }}/api/"
            hyops_seed_ipam_dataset: "{{ (lookup('env', 'HYOPS_RUNTIME_ROOT') | default('', true)) ~ '/state/netbox/network/ipam-prefixes.auto.json' }}"
            hyops_seed_vm_dataset: "{{ (lookup('env', 'HYOPS_RUNTIME_ROOT') | default('', true)) ~ '/state/netbox/vms/vms.auto.json' }}"

        - name: Assert HyOps runtime root is available for seed sync
          ansible.builtin.assert:
            that:
              - hyops_seed_runtime_root | length > 0
            fail_msg: "HYOPS_RUNTIME_ROOT is not set; cannot run sync-only NetBox foundation seed."

        - name: Wait for NetBox API to be reachable from controller before seed sync
          ansible.builtin.uri:
            url: "{{ hyops_seed_netbox_api_url }}"
            method: GET
            status_code: 200
            timeout: 5
          register: hyops_seed_api_wait
          retries: "{{ [1, (((seed_foundation_netbox_wait_s | int) + 4) // 5)] | max }}"
          delay: 5
          until: hyops_seed_api_wait.status == 200

        - name: Check seed datasets exist
          ansible.builtin.stat:
            path: "{{ item }}"
          loop:
            - "{{ hyops_seed_ipam_dataset }}"
            - "{{ hyops_seed_vm_dataset }}"
          register: hyops_seed_dataset_stats

        - name: Assert seed datasets are present
          ansible.builtin.assert:
            that:
              - (hyops_seed_dataset_stats.results | selectattr('stat.exists', 'equalto', false) | list | length) == 0
            fail_msg: >-
              NetBox foundation seed dataset missing. Expected exported datasets at
              {{ hyops_seed_ipam_dataset }} and {{ hyops_seed_vm_dataset }}.

        - name: Sync foundation IPAM prefixes into NetBox (strict)
          ansible.builtin.command:
            argv:
              - "{{ hyops_seed_hyops_executable }}"
              - "inventory"
              - "sync-netbox"
              - "--dataset"
              - "{{ hyops_seed_ipam_dataset }}"
              - "--kind"
              - "ipam-prefixes"
              - "--ipam-target"
              - "onprem-sdn"
          environment:
            NETBOX_API_URL: "{{ hyops_seed_netbox_api_url }}"
            NETBOX_API_TOKEN: "{{ lookup('env', api_token_env) }}"

        - name: Sync foundation VM inventory into NetBox (strict)
          ansible.builtin.command:
            argv:
              - "{{ hyops_seed_hyops_executable }}"
              - "inventory"
              - "sync-netbox"
              - "--dataset"
              - "{{ hyops_seed_vm_dataset }}"
              - "--kind"
              - "vms"
          environment:
            NETBOX_API_URL: "{{ hyops_seed_netbox_api_url }}"
            NETBOX_API_TOKEN: "{{ lookup('env', api_token_env) }}"

    - name: Write HyOps outputs
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'netbox_url': ('http://' ~ (hostvars[inventory_hostname].ansible_host | default('')) ~ ':' ~ (netbox_http_host_port | int) ~ '/'),
            'netbox_api_url': ('http://' ~ (hostvars[inventory_hostname].ansible_host | default('')) ~ ':' ~ (netbox_http_host_port | int) ~ '/api/'),
            'netbox_http_host_port': (netbox_http_host_port | int),
            'db_host': (db_host | string),
            'db_port': (db_port | int),
            'db_name': (db_name | string),
            'db_user': (db_user | string),
            'db_password_env': (db_password_env | string),
            'secret_key_env': (secret_key_env | string),
            'superuser_password_env': (superuser_password_env | string),
            'api_token_env': (api_token_env | string),
            'cap.ipam.netbox': 'ready'
          } | to_json }}
