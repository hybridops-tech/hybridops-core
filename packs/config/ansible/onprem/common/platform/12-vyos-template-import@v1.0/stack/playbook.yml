---
- name: core/onprem/vyos-template-import (register existing VyOS template)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    template_key: "{{ template_key | default('') }}"
    template_vm_id: "{{ template_vm_id | default(0) | int }}"
    template_name: "{{ template_name | default('') }}"
    template_image_version: "{{ template_image_version | default('') }}"
    template_source_url: "{{ template_source_url | default('') }}"
    notes: "{{ notes | default('') }}"

  tasks:
    - name: Require template key
      ansible.builtin.assert:
        that:
          - (template_key | string | length) > 0
        fail_msg: "inputs.template_key must be set"

    - name: Require template VMID
      ansible.builtin.assert:
        that:
          - (template_vm_id | int) > 0
        fail_msg: "inputs.template_vm_id must be a positive integer"

    - name: Require template name
      ansible.builtin.assert:
        that:
          - (template_name | string | length) > 0
        fail_msg: "inputs.template_name must be set"

    - name: Write HyOps outputs
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{
            {
              'template_key': (template_key | string),
              'template_vm_id': (template_vm_id | int),
              'template_name': (template_name | string),
              'template_image_version': (template_image_version | string),
              'template_source_url': (template_source_url | string),
              'templates': {
                (template_key | string): {
                  'template_vm_id': (template_vm_id | int),
                  'template_name': (template_name | string),
                  'template_image_version': (template_image_version | string),
                  'template_source_url': (template_source_url | string),
                  'notes': (notes | string)
                }
              }
            } | to_json
          }}
