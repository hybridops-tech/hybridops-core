---
- name: Platform/network/decision-service (destroy)
  hosts: edge_control
  any_errors_fatal: true
  become: true
  gather_facts: false

  vars:
    decision_destroy_role_fqcn: "{{ decision_role_fqcn | default('hybridops.common.decision_service') }}"
    decision_destroy_state_var: decision_service_state
    decision_destroy_outputs:
      decision_service.status: absent
      decision_service.last_tick: ""
      decision_service.last_action: "none"
      decision_service.execution_mode: ""
      decision_service.last_decision_id: ""
      cap.control.decision_service: absent

  tasks:
    - name: Run shared decision destroy sequence
      ansible.builtin.include_tasks:
        file: ../../_shared/decision-destroy.tasks.yml
