---
- name: Platform/network/decision-service (configure)
  hosts: edge_control
  any_errors_fatal: true
  become: true
  gather_facts: true

  vars:
    decision_role_fqcn: "{{ decision_role_fqcn | default('hybridops.common.decision_service') }}"
    decision_role_name: "{{ decision_role_fqcn | regex_replace('^hybridops\\.common\\.', '') }}"
    _hyops_input_decision_state: "{{ decision_state | default('present') }}"
    _hyops_input_decision_thanos_query_url: "{{ thanos_query_url }}"
    _hyops_input_decision_policy: "{{ policy }}"
    _hyops_input_decision_actions: "{{ actions }}"
    _hyops_input_decision_execution_mode: "{{ decision_execution_mode | default('emit-only') }}"
    _hyops_input_decision_hyops_bin: "{{ decision_hyops_bin | default('/usr/local/bin/hyops') }}"
    _hyops_input_decision_runtime_env: "{{ decision_runtime_env | default('dev') }}"
    _hyops_input_decision_runtime_root: "{{ decision_runtime_root | default('') }}"
    _hyops_input_decision_action_env_names: "{{ decision_action_env_names | default([]) }}"
    _hyops_input_decision_action_timeout_s: "{{ decision_action_timeout_s | default(600) | int }}"
    _hyops_input_decision_signal_query_timeout_s: "{{ decision_signal_query_timeout_s | default(5) | int }}"
    _hyops_input_decision_require_signal_readiness: "{{ decision_require_signal_readiness | default(true) | bool }}"
    _hyops_input_decision_require_fresh_signals: "{{ decision_require_fresh_signals | default(true) | bool }}"
    _hyops_input_decision_max_signal_age_s: "{{ decision_max_signal_age_s | default(180) | int }}"
    _hyops_input_decision_min_ready_checks: "{{ decision_min_ready_checks | default(1) | int }}"
    _hyops_input_decision_require_action_state_guards: "{{ decision_require_action_state_guards | default(false) | bool }}"
    _hyops_input_decision_dry_run: "{{ dry_run | default(true) | bool }}"
    _hyops_input_decision_enable_actions: "{{ decision_enable_actions | default(false) | bool }}"
    _hyops_input_decision_tick_seconds: "{{ tick_seconds | default(30) | int }}"
    _hyops_input_decision_confirm_for_seconds: "{{ confirm_for_seconds | default(120) | int }}"
    _hyops_input_decision_stable_for_seconds: "{{ stable_for_seconds | default(300) | int }}"
    _hyops_input_decision_cooldown_seconds: "{{ cooldown_seconds | default(600) | int }}"
    _hyops_input_decision_log_level: "{{ decision_log_level | default('INFO') }}"

  pre_tasks:
    - name: Assert required decision policy and actions
      ansible.builtin.assert:
        that:
          - policy is mapping
          - (policy | length) > 0
          - actions is mapping
          - (actions.cutover_module_ref | default('') | length) > 0
          - (actions.failback_module_ref | default('') | length) > 0
          - (decision_enable_actions | default(false) | bool) | ternary((actions.module_inputs is mapping and (actions.module_inputs | length) > 0), true)
        fail_msg: "decision-service requires non-empty policy and actions module refs"

  tasks:
    - name: Run decision service role
      ansible.builtin.include_role:
        name: "{{ decision_role_name }}"
      vars:
        decision_service_state: "{{ _hyops_input_decision_state }}"
        decision_service_thanos_query_url: "{{ _hyops_input_decision_thanos_query_url }}"
        decision_service_policy: "{{ _hyops_input_decision_policy }}"
        decision_service_actions: "{{ _hyops_input_decision_actions }}"
        decision_service_execution_mode: "{{ _hyops_input_decision_execution_mode }}"
        decision_service_hyops_bin: "{{ _hyops_input_decision_hyops_bin }}"
        decision_service_runtime_env: "{{ _hyops_input_decision_runtime_env }}"
        decision_service_runtime_root: "{{ _hyops_input_decision_runtime_root }}"
        decision_service_action_env_names: "{{ _hyops_input_decision_action_env_names }}"
        decision_service_action_timeout_s: "{{ _hyops_input_decision_action_timeout_s }}"
        decision_service_signal_query_timeout_s: "{{ _hyops_input_decision_signal_query_timeout_s }}"
        decision_service_require_signal_readiness: "{{ _hyops_input_decision_require_signal_readiness }}"
        decision_service_require_fresh_signals: "{{ _hyops_input_decision_require_fresh_signals }}"
        decision_service_max_signal_age_s: "{{ _hyops_input_decision_max_signal_age_s }}"
        decision_service_min_ready_checks: "{{ _hyops_input_decision_min_ready_checks }}"
        decision_service_require_action_state_guards: "{{ _hyops_input_decision_require_action_state_guards }}"
        decision_service_dry_run: "{{ _hyops_input_decision_dry_run }}"
        decision_service_enable_actions: "{{ _hyops_input_decision_enable_actions }}"
        decision_service_tick_seconds: "{{ _hyops_input_decision_tick_seconds }}"
        decision_service_confirm_for_seconds: "{{ _hyops_input_decision_confirm_for_seconds }}"
        decision_service_stable_for_seconds: "{{ _hyops_input_decision_stable_for_seconds }}"
        decision_service_cooldown_seconds: "{{ _hyops_input_decision_cooldown_seconds }}"
        decision_service_log_level: "{{ _hyops_input_decision_log_level }}"

  post_tasks:
    - name: Wait for decision state file
      when: inventory_hostname == ansible_play_hosts_all[0]
      ansible.builtin.wait_for:
        path: "/opt/hybridops/decision-service/state/state.json"
        state: present
        timeout: 15
      register: __decision_state_wait
      failed_when: false

    - name: Read decision state
      when:
        - inventory_hostname == ansible_play_hosts_all[0]
        - __decision_state_wait is succeeded
      ansible.builtin.slurp:
        path: "/opt/hybridops/decision-service/state/state.json"
      register: __decision_state_raw
      failed_when: false
      changed_when: false

    - name: Normalize decision state
      when: inventory_hostname == ansible_play_hosts_all[0]
      delegate_to: localhost
      become: false
      ansible.builtin.set_fact:
        __decision_state_payload: >-
          {{
            ((__decision_state_raw.content | b64decode) | from_json)
            if (__decision_state_raw is defined and __decision_state_raw.content is defined)
            else {}
          }}

    - name: Write HyOps outputs
      when: inventory_hostname == ansible_play_hosts_all[0]
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'decision_service.status': 'ready',
            'decision_service.last_tick': (__decision_state_payload.timestamp_utc | default('')),
            'decision_service.last_action': (__decision_state_payload.last_action | default('none')),
            'decision_service.signal_ready': (__decision_state_payload.signal_ready | default('')),
            'decision_service.execution_mode': (__decision_state_payload.execution_mode | default(decision_execution_mode | default('emit-only'))),
            'decision_service.last_decision_id': (__decision_state_payload.last_decision_id | default('')),
            'cap.control.decision_service': 'ready'
          } | to_json }}
