---
- name: Destroy platform/network/edge-observability
  hosts: edge
  any_errors_fatal: true
  become: true
  gather_facts: true

  vars:
    edge_obs_role_fqcn: "{{ edge_obs_role_fqcn | default('hybridops.common.edge_observability') }}"
    edge_obs_state: "absent"

  tasks:
    - name: Run edge observability role (absent)
      ansible.builtin.include_role:
        name: "{{ edge_obs_role_fqcn }}"

- name: Publish platform/network/edge-observability outputs
  hosts: localhost
  become: false
  gather_facts: false

  tasks:
    - name: Write HyOps outputs
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'edge_obs_state': 'absent',
            'cap.obs.edge': 'absent'
          } | to_json }}
