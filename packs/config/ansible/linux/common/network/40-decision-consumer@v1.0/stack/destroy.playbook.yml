---
- name: Platform/network/decision-consumer (destroy)
  hosts: edge_control
  gather_facts: false
  any_errors_fatal: true
  tasks:
    - name: Remove decision consumer service
      ansible.builtin.include_role:
        name: hybridops.common.decision_consumer
      vars:
        decision_consumer_state: "absent"

    - name: Write HyOps outputs
      delegate_to: localhost
      become: false
      when: inventory_hostname == ansible_play_hosts_all[0]
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'decision_consumer.status': 'absent',
            'decision_consumer.last_tick': '',
            'decision_consumer.last_request_id': '',
            'decision_consumer.last_execution_id': '',
            'decision_consumer.execution_mode': '',
            'cap.control.decision_consumer': 'absent'
          } | to_json }}
