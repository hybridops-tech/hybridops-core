---
- name: platform/network/wan-edge (configure)
  hosts: wan_edge
  any_errors_fatal: true
  become: true
  gather_facts: true

  vars:
    wan_role_fqcn: "{{ wan_role_fqcn | default('hybridops.network.wan_edge') }}"
    wan_ipsec_psk_env: "{{ wan_ipsec_psk_env | default('WAN_IPSEC_PSK') }}"
    inside_prefix_len: "{{ inside_prefix_len | default(30) | int }}"
    wan_ipsec_defaults:
      psk: ""
      proposals: "aes256-sha256-modp2048"
      esp_proposals: "aes256-sha256"
      dpd_delay: "30s"
      dpd_timeout: "120s"
      start_action: "start"
      close_action: "restart"
      dpd_action: "restart"

    _hyops_edge01_profile:
      wan_pub_if: "{{ wan_pub_if | default('') }}"
      wan_public_local_ip: "{{ edge01_public_local_ip }}"
      wan_public_peer_ip: "{{ edge01_public_peer_ip }}"
      wan_loopbacks: "{{ edge01_loopbacks | default([]) }}"
      wan_tunnels:
        - name: "{{ edge01_tunnel_name }}"
          ifname: "{{ edge01_tunnel_ifname }}"
          key: "{{ edge01_tunnel_key | int }}"
          mark: "{{ edge01_tunnel_key | int }}"
          inside_local: "{{ edge01_inside_local_ip }}/{{ inside_prefix_len }}"
          inside_peer: "{{ edge01_inside_peer_ip }}"
      wan_bgp:
        local_as: "{{ wan_bgp_local_as | int }}"
        peer_as: "{{ wan_bgp_peer_as | int }}"
        router_id: "{{ edge01_router_id }}"
        neighbors:
          - "{{ edge01_inside_peer_ip }}"
        advertise: "{{ advertise_prefixes | default([]) }}"
        import_allow: "{{ import_allow_prefixes | default([]) }}"
        export_allow: "{{ export_allow_prefixes | default([]) }}"

    _hyops_edge02_profile:
      wan_pub_if: "{{ wan_pub_if | default('') }}"
      wan_public_local_ip: "{{ edge02_public_local_ip }}"
      wan_public_peer_ip: "{{ edge02_public_peer_ip }}"
      wan_loopbacks: "{{ edge02_loopbacks | default([]) }}"
      wan_tunnels:
        - name: "{{ edge02_tunnel_name }}"
          ifname: "{{ edge02_tunnel_ifname }}"
          key: "{{ edge02_tunnel_key | int }}"
          mark: "{{ edge02_tunnel_key | int }}"
          inside_local: "{{ edge02_inside_local_ip }}/{{ inside_prefix_len }}"
          inside_peer: "{{ edge02_inside_peer_ip }}"
      wan_bgp:
        local_as: "{{ wan_bgp_local_as | int }}"
        peer_as: "{{ wan_bgp_peer_as | int }}"
        router_id: "{{ edge02_router_id }}"
        neighbors:
          - "{{ edge02_inside_peer_ip }}"
        advertise: "{{ advertise_prefixes | default([]) }}"
        import_allow: "{{ import_allow_prefixes | default([]) }}"
        export_allow: "{{ export_allow_prefixes | default([]) }}"

  pre_tasks:
    - name: Assert WAN PSK environment is present
      ansible.builtin.assert:
        that:
          - (lookup('env', wan_ipsec_psk_env) | length) > 0
        fail_msg: >-
          Missing required secret env var {{ wan_ipsec_psk_env }}.
          Hint: hyops secrets ensure --env <env> {{ wan_ipsec_psk_env }}
      no_log: true

    - name: Build WAN host profile map keyed by inventory host
      ansible.builtin.set_fact:
        _hyops_host_profiles: "{{ {(edge01_vm_key | string): _hyops_edge01_profile, (edge02_vm_key | string): _hyops_edge02_profile} | to_json | from_json }}"

    - name: Assert host has a WAN profile
      ansible.builtin.assert:
        that:
          - _hyops_host_profiles.get(inventory_hostname, None) is mapping
        fail_msg: >-
          No WAN host profile defined for inventory host {{ inventory_hostname }}.
          Ensure inputs.edge01_vm_key/edge02_vm_key match inventory host names.

    - name: Build role vars for this host
      ansible.builtin.set_fact:
        _hyops_role_vars: "{{ (_hyops_host_profiles[inventory_hostname] | combine((wan_host_overrides.get(inventory_hostname, {}) if (wan_host_overrides is mapping) else {}), recursive=True)) | to_json | from_json }}"

    - name: Promote merged WAN vars into host vars
      ansible.builtin.set_fact:
        "{{ item.key }}": "{{ item.value }}"
      loop: "{{ (_hyops_role_vars if (_hyops_role_vars is mapping) else {}) | dict2items }}"
      no_log: true

    - name: Ensure WAN PSK map is visible to role preflight
      ansible.builtin.set_fact:
        wan_ipsec_psk_map: "{{ (((_hyops_role_vars.get('wan_ipsec_psk_map', {}) if (_hyops_role_vars is mapping and (_hyops_role_vars.get('wan_ipsec_psk_map', {}) is mapping)) else {}) | combine({ (((_hyops_role_vars.get('wan_tunnels', [{}]) | first).name | default('default')) | string): lookup('env', wan_ipsec_psk_env) }, recursive=True))) | to_json | from_json }}"
      no_log: true

    - name: Ensure WAN IPsec map contains default tunables
      ansible.builtin.set_fact:
        wan_ipsec: "{{ (wan_ipsec_defaults | combine((wan_ipsec if (wan_ipsec is mapping) else {}), recursive=True)) | to_json | from_json }}"
      no_log: true

  tasks:
    - name: Run WAN edge role
      ansible.builtin.include_role:
        name: "{{ wan_role_fqcn }}"

  post_tasks:
    - name: Write HyOps outputs
      run_once: true
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'edge01_vm_key': edge01_vm_key,
            'edge02_vm_key': edge02_vm_key,
            'edge01_public_local_ip': edge01_public_local_ip,
            'edge02_public_local_ip': edge02_public_local_ip,
            'edge01_public_peer_ip': edge01_public_peer_ip,
            'edge02_public_peer_ip': edge02_public_peer_ip,
            'edge01_inside_peer_ip': edge01_inside_peer_ip,
            'edge02_inside_peer_ip': edge02_inside_peer_ip,
            'cap.network.wan_edge': 'ready'
          } | to_json }}
