---
- name: Platform/network/decision-dispatcher (destroy)
  hosts: edge_control
  any_errors_fatal: true
  become: true
  gather_facts: false

  vars:
    decision_destroy_role_fqcn: "{{ dispatcher_role_fqcn | default('hybridops.common.decision_dispatcher') }}"
    decision_destroy_state_var: decision_dispatcher_state
    decision_destroy_outputs:
      decision_dispatcher.status: absent
      decision_dispatcher.last_tick: ""
      decision_dispatcher.last_dispatch_id: ""
      decision_dispatcher.execution_mode: ""
      cap.control.decision_dispatcher: absent

  tasks:
    - name: Run shared decision destroy sequence
      ansible.builtin.include_tasks:
        file: ../../_shared/decision-destroy.tasks.yml
