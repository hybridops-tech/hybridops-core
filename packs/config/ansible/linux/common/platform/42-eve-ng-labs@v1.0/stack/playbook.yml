---
- name: platform/linux/eve-ng-labs (configure)
  hosts: targets
  become: true
  gather_facts: true

  vars:
    eveng_labs_role_fqcn: "{{ eveng_labs_role_fqcn | default('hybridops.helper.eveng_labs') }}"
    _hyops_input_eveng_labs_source: "{{ eveng_labs_source | default('local') }}"
    _hyops_input_eveng_labs_local_path: "{{ eveng_labs_local_path | default('') }}"
    _hyops_input_eveng_labs_git_repo: "{{ eveng_labs_git_repo | default('') }}"
    _hyops_input_eveng_labs_git_branch: "{{ eveng_labs_git_branch | default('main') }}"
    _hyops_input_eveng_labs_remote_host: "{{ eveng_labs_remote_host | default('') }}"
    _hyops_input_eveng_labs_remote_path: "{{ eveng_labs_remote_path | default('/mnt/nfs/eveng-labs') }}"
    _hyops_input_eveng_lab_folders: "{{ eveng_lab_folders | default([]) }}"
    _hyops_input_eveng_labs_staging_dir: "{{ eveng_labs_staging_dir | default('/tmp/eveng_labs_staging') }}"
    _hyops_input_eveng_exclude_patterns: "{{ eveng_exclude_patterns | default([]) }}"
    _hyops_input_eveng_labs_sync_exclude_patterns: "{{ eveng_labs_sync_exclude_patterns | default([]) }}"

  tasks:
    - name: Install EVE-NG labs
      ansible.builtin.include_role:
        name: "{{ eveng_labs_role_fqcn }}"
      vars:
        eveng_labs_source: "{{ _hyops_input_eveng_labs_source }}"
        eveng_labs_local_path: "{{ _hyops_input_eveng_labs_local_path }}"
        eveng_labs_git_repo: "{{ _hyops_input_eveng_labs_git_repo }}"
        eveng_labs_git_branch: "{{ _hyops_input_eveng_labs_git_branch }}"
        eveng_labs_remote_host: "{{ _hyops_input_eveng_labs_remote_host }}"
        eveng_labs_remote_path: "{{ _hyops_input_eveng_labs_remote_path }}"
        eveng_lab_folders: "{{ _hyops_input_eveng_lab_folders }}"
        eveng_labs_staging_dir: "{{ _hyops_input_eveng_labs_staging_dir }}"
        eveng_exclude_patterns: "{{ _hyops_input_eveng_exclude_patterns }}"
        eveng_labs_sync_exclude_patterns: "{{ _hyops_input_eveng_labs_sync_exclude_patterns }}"

  post_tasks:
    - name: Write HyOps outputs
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'cap.lab.eveng.labs': 'ready',
            'eveng_labs_source': (eveng_labs_source | default('local')),
            'eveng_lab_folder_count': ((eveng_lab_folders | default([])) | length)
          } | to_json }}
