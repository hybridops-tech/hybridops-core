---
- name: platform/linux/eve-ng (configure)
  hosts: targets
  become: true
  gather_facts: true

  vars:
    eveng_role_fqcn: "{{ eveng_role_fqcn | default('hybridops.app.eveng') }}"
    _hyops_input_eveng_resource_profile: "{{ eveng_resource_profile | default('standard') }}"
    _hyops_input_eveng_environment_name: "{{ eveng_environment_name | default('') }}"
    _hyops_input_eveng_domain: "{{ eveng_domain | default('lab.local') }}"
    _hyops_input_eveng_users: "{{ eveng_users | default([]) }}"
    _hyops_input_eveng_force_reinstall: "{{ eveng_force_reinstall | default(false) | bool }}"
    _hyops_input_eveng_guest_nat_enabled: "{{ eveng_guest_nat_enabled | default(false) | bool }}"
    _hyops_input_eveng_guest_nat_bridge: "{{ eveng_guest_nat_bridge | default('pnet9') }}"
    _hyops_input_eveng_guest_nat_cidr: "{{ eveng_guest_nat_cidr | default('172.29.129.1/24') }}"
    _hyops_input_eveng_guest_nat_subnet: "{{ eveng_guest_nat_subnet | default('172.29.129.0/24') }}"
    _hyops_input_eveng_guest_nat_dhcp_start: "{{ eveng_guest_nat_dhcp_start | default('172.29.129.50') }}"
    _hyops_input_eveng_guest_nat_dhcp_end: "{{ eveng_guest_nat_dhcp_end | default('172.29.129.200') }}"
    _hyops_input_eveng_root_password: "{{ lookup('env', eveng_root_password_env | default('EVENG_ROOT_PASSWORD')) }}"
    _hyops_input_eveng_admin_password: "{{ lookup('env', eveng_admin_password_env | default('EVENG_ADMIN_PASSWORD')) }}"

  tasks:
    - name: Install and configure EVE-NG
      ansible.builtin.include_role:
        name: "{{ eveng_role_fqcn }}"
      vars:
        eveng_resource_profile: "{{ _hyops_input_eveng_resource_profile }}"
        eveng_environment_name: "{{ _hyops_input_eveng_environment_name }}"
        eveng_domain: "{{ _hyops_input_eveng_domain }}"
        eveng_users: "{{ _hyops_input_eveng_users }}"
        eveng_force_reinstall: "{{ _hyops_input_eveng_force_reinstall }}"
        eveng_guest_nat_enabled: "{{ _hyops_input_eveng_guest_nat_enabled }}"
        eveng_guest_nat_bridge: "{{ _hyops_input_eveng_guest_nat_bridge }}"
        eveng_guest_nat_cidr: "{{ _hyops_input_eveng_guest_nat_cidr }}"
        eveng_guest_nat_subnet: "{{ _hyops_input_eveng_guest_nat_subnet }}"
        eveng_guest_nat_dhcp_start: "{{ _hyops_input_eveng_guest_nat_dhcp_start }}"
        eveng_guest_nat_dhcp_end: "{{ _hyops_input_eveng_guest_nat_dhcp_end }}"
        eveng_root_password: "{{ _hyops_input_eveng_root_password }}"
        eveng_admin_password: "{{ _hyops_input_eveng_admin_password }}"

  post_tasks:
    - name: Write HyOps outputs
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'eveng_url': ('http://' ~ (
              hostvars[inventory_hostname].hyops_resolved_host
              | default(hostvars[inventory_hostname].hyops_private_host | default(hostvars[inventory_hostname].ansible_host | default('')))
            ) ~ '/'),
            'cap.lab.eveng': 'ready'
          } | to_json }}
