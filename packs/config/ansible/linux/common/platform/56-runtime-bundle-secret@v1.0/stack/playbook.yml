---
- name: platform/k8s/runtime-bundle-secret (apply)
  hosts: localhost
  connection: local
  become: false
  gather_facts: false

  vars:
    kubeconfig_path: "{{ kubeconfig_path | default('') }}"
    target_namespace: "{{ namespace | default('') }}"
    ensure_namespace: "{{ ensure_namespace | default(true) | bool }}"
    secret_name: "{{ secret_name | default('') }}"
    bundle_source_path: "{{ bundle_source_path | default('') }}"
    bundle_key: "{{ bundle_key | default('dist.tgz') }}"
    restart_targets: "{{ restart_targets | default([]) }}"
    rollout_timeout_s: "{{ rollout_timeout_s | default(300) | int }}"
    kubectl_bin: "{{ kubectl_bin | default('kubectl') }}"

  tasks:
    - name: Require namespace and secret inputs
      ansible.builtin.assert:
        that:
          - (target_namespace | length) > 0
          - (secret_name | length) > 0
          - (bundle_key | length) > 0
          - (kubectl_bin | length) > 0
        fail_msg: "namespace, secret_name, bundle_key, and kubectl_bin must be non-empty"

    - name: Check kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubeconfig_path }}"
      register: _hyops_kubeconfig_stat

    - name: Require kubeconfig to exist
      ansible.builtin.assert:
        that:
          - _hyops_kubeconfig_stat.stat.exists
          - _hyops_kubeconfig_stat.stat.isreg
        fail_msg: "Resolved kubeconfig_path does not exist: {{ kubeconfig_path }}"

    - name: Check bundle source exists
      ansible.builtin.stat:
        path: "{{ bundle_source_path }}"
        checksum_algorithm: sha256
      register: _hyops_bundle_stat

    - name: Require bundle source file
      ansible.builtin.assert:
        that:
          - _hyops_bundle_stat.stat.exists
          - _hyops_bundle_stat.stat.isreg
          - (_hyops_bundle_stat.stat.checksum | default('') | length) > 0
        fail_msg: "bundle_source_path must be an existing file: {{ bundle_source_path }}"

    - name: Ensure target namespace exists
      when: ensure_namespace
      ansible.builtin.shell: |
        set -o pipefail
        {{ kubectl_bin }} --kubeconfig {{ kubeconfig_path | quote }} create namespace {{ target_namespace | quote }} --dry-run=client -o yaml | \
        {{ kubectl_bin }} --kubeconfig {{ kubeconfig_path | quote }} apply -f -
      args:
        executable: /bin/bash
      register: _hyops_namespace_apply
      changed_when: >-
        (_hyops_namespace_apply.stdout is defined and (
          'created' in _hyops_namespace_apply.stdout or
          'configured' in _hyops_namespace_apply.stdout
        ))

    - name: Read existing runtime bundle SHA annotation
      ansible.builtin.command:
        argv:
          - "{{ kubectl_bin }}"
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - -n
          - "{{ target_namespace }}"
          - get
          - secret
          - "{{ secret_name }}"
          - -o
          - jsonpath={.metadata.annotations.hyops\.bundle-sha256}
      register: _hyops_existing_bundle_sha
      failed_when: false
      changed_when: false

    - name: Apply runtime bundle Secret
      ansible.builtin.shell: |
        set -o pipefail
        {{ kubectl_bin }} --kubeconfig {{ kubeconfig_path | quote }} -n {{ target_namespace | quote }} \
          create secret generic {{ secret_name | quote }} \
          --from-file={{ bundle_key | quote }}={{ bundle_source_path | quote }} \
          --dry-run=client -o yaml | \
        {{ kubectl_bin }} --kubeconfig {{ kubeconfig_path | quote }} apply --server-side --force-conflicts -f -
      args:
        executable: /bin/bash
      register: _hyops_secret_apply
      changed_when: >-
        (_hyops_secret_apply.stdout is defined and (
          'created' in _hyops_secret_apply.stdout or
          'configured' in _hyops_secret_apply.stdout
        ))

    - name: Annotate runtime bundle Secret with SHA-256
      ansible.builtin.command:
        argv:
          - "{{ kubectl_bin }}"
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - -n
          - "{{ target_namespace }}"
          - annotate
          - --overwrite
          - secret
          - "{{ secret_name }}"
          - "hyops.bundle-sha256={{ _hyops_bundle_stat.stat.checksum }}"
      register: _hyops_secret_annotate
      changed_when: >-
        (_hyops_secret_annotate.stdout is defined and (
          'annotated' in _hyops_secret_annotate.stdout or
          'configured' in _hyops_secret_annotate.stdout
        ))

    - name: Resolve bundle-change and restart intent
      ansible.builtin.set_fact:
        _hyops_bundle_changed: >-
          {{ (_hyops_existing_bundle_sha.stdout | default('') | trim) != (_hyops_bundle_stat.stat.checksum | string) }}
        _hyops_restarted_targets: []

    - name: Check restart targets that already exist
      when:
        - _hyops_bundle_changed
        - (restart_targets | length) > 0
      ansible.builtin.command:
        argv:
          - "{{ kubectl_bin }}"
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - -n
          - "{{ target_namespace }}"
          - get
          - "{{ item }}"
          - -o
          - name
      loop: "{{ restart_targets }}"
      register: _hyops_restart_target_probe
      failed_when: false
      changed_when: false

    - name: Select restart targets present in cluster
      when:
        - _hyops_bundle_changed
        - (restart_targets | length) > 0
      ansible.builtin.set_fact:
        _hyops_restarted_targets: >-
          {{
            (_hyops_restart_target_probe.results | default([]))
            | selectattr('rc', 'eq', 0)
            | map(attribute='item')
            | list
          }}

    - name: Restart workloads consuming the runtime bundle
      when:
        - _hyops_bundle_changed
        - (_hyops_restarted_targets | length) > 0
      ansible.builtin.command:
        argv:
          - "{{ kubectl_bin }}"
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - -n
          - "{{ target_namespace }}"
          - rollout
          - restart
          - "{{ item }}"
      loop: "{{ _hyops_restarted_targets }}"
      register: _hyops_rollout_restart
      changed_when: true

    - name: Wait for restarted workloads to become ready
      when:
        - _hyops_bundle_changed
        - (_hyops_restarted_targets | length) > 0
      ansible.builtin.command:
        argv:
          - "{{ kubectl_bin }}"
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - -n
          - "{{ target_namespace }}"
          - rollout
          - status
          - "{{ item }}"
          - "--timeout={{ rollout_timeout_s }}s"
      loop: "{{ _hyops_restarted_targets }}"
      register: _hyops_rollout_status
      changed_when: false

    - name: Write HyOps outputs
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'namespace': (target_namespace | string),
            'secret_name': (secret_name | string),
            'bundle_key': (bundle_key | string),
            'bundle_sha256': (_hyops_bundle_stat.stat.checksum | string),
            'restarted_targets': (_hyops_restarted_targets | default([])),
            'cap.k8s.runtime_bundle_secret': 'ready'
          } | to_json }}
