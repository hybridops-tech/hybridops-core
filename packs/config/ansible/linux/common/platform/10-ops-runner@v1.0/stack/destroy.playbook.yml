---
- name: platform/linux/ops-runner (destroy)
  hosts: runner
  any_errors_fatal: true
  gather_facts: false

  vars:
    runner_bin_dir_effective: >-
      {{
        (runner_bin_dir | string)
        if (runner_bin_dir is string and (runner_bin_dir | length) > 0)
        else ('/home/' ~ (target_user | default(ansible_user | default('opsadmin'))) ~ '/.local/bin')
      }}

  tasks:
    - name: Remove installed HybridOps prefix from runner
      become: true
      ansible.builtin.file:
        path: "{{ runner_install_prefix }}"
        state: absent

    - name: Remove runner wrapper from user bin dir
      become: true
      ansible.builtin.file:
        path: "{{ runner_bin_dir_effective | regex_replace('/+$', '') }}/hyops"
        state: absent

    - name: Remove global hyops system link when enabled
      become: true
      ansible.builtin.file:
        path: "/usr/local/bin/hyops"
        state: absent
      when: runner_system_link | default(true)

    - name: Remove runner staging directory
      become: true
      ansible.builtin.file:
        path: "{{ runner_stage_root }}"
        state: absent

  post_tasks:
    - name: Write HyOps outputs
      run_once: true
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {{ {
            'runner_state': 'absent',
            'runner_install_prefix': (runner_install_prefix | string),
            'runner_bin_dir': (runner_bin_dir_effective | string),
            'cap.ctrl.runner': 'absent'
          } | to_json }}
