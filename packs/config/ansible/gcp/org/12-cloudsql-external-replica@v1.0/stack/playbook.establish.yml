---
- name: Org/gcp/cloudsql-external-replica (establish or status)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _hyops_input_apply_mode: "{{ vars.get('apply_mode', 'establish') | string }}"
    _hyops_input_replication_mode: "{{ vars.get('replication_mode', 'logical') | string }}"
    _hyops_input_source_contract_version: "{{ vars.get('source_contract_version', 1) | int }}"
    _hyops_input_source_host: "{{ vars.get('source_host', '') | default('', true) | string }}"
    _hyops_input_source_port: "{{ vars.get('source_port', 5432) | int }}"
    _hyops_input_source_db_name: "{{ vars.get('source_db_name', '') | default('', true) | string }}"
    _hyops_input_source_leader_name: "{{ vars.get('source_leader_name', '') | default('', true) | string }}"
    _hyops_input_source_replication_candidate: "{{ vars.get('source_replication_candidate', false) | bool }}"
    _hyops_input_source_replication_user: "{{ vars.get('source_replication_user', '') | default('', true) | string }}"
    _hyops_input_source_replication_password_env: "{{ vars.get('source_replication_password_env', 'PATRONI_REPLICATION_PASSWORD') | string }}"
    _hyops_input_source_ssl_type: "{{ vars.get('source_ssl_type', 'NONE') | string }}"
    _hyops_input_source_ca_certificate_env: "{{ vars.get('source_ca_certificate_env', '') | default('', true) | string }}"
    _hyops_input_source_client_certificate_env: "{{ vars.get('source_client_certificate_env', '') | default('', true) | string }}"
    _hyops_input_source_private_key_env: "{{ vars.get('source_private_key_env', '') | default('', true) | string }}"

    _hyops_input_project_id: "{{ vars.get('project_id', '') | default('', true) | string }}"
    _hyops_input_region: "{{ vars.get('region', '') | default('', true) | string }}"
    _hyops_input_private_network: "{{ vars.get('private_network', '') | default('', true) | string }}"

    _hyops_input_source_connection_profile_name: "{{ vars.get('source_connection_profile_name', '') | default('', true) | string }}"
    _hyops_input_destination_connection_profile_name: "{{ vars.get('destination_connection_profile_name', '') | default('', true) | string }}"
    _hyops_input_migration_job_name: "{{ vars.get('migration_job_name', '') | default('', true) | string }}"
    _hyops_input_migration_job_type: "{{ vars.get('migration_job_type', 'CONTINUOUS') | string }}"
    _hyops_input_start_migration_job: "{{ vars.get('start_migration_job', true) | bool }}"
    _hyops_input_migration_objects_mode: "{{ vars.get('migration_objects_mode', 'single-database') | string }}"
    _hyops_input_destination_database_version: "{{ vars.get('destination_database_version', 'POSTGRES_16') | string }}"
    _hyops_input_destination_tier: "{{ vars.get('destination_tier', 'db-custom-2-8192') | string }}"
    _hyops_input_destination_edition: "{{ vars.get('destination_edition', 'ENTERPRISE') | string }}"
    _hyops_input_destination_availability_type: "{{ vars.get('destination_availability_type', 'REGIONAL') | string }}"
    _hyops_input_destination_enable_ipv4: "{{ vars.get('destination_enable_ipv4', false) | bool }}"
    _hyops_input_destination_allocated_ip_range_name: "{{ vars.get('destination_allocated_ip_range_name', '') | default('', true) | string }}"
    _hyops_input_destination_root_password_env: "{{ vars.get('destination_root_password_env', '') | default('', true) | string }}"
    _hyops_input_target_db_port: "{{ vars.get('target_db_port', 5432) | int }}"
    _hyops_input_endpoint_dns_name: "{{ vars.get('endpoint_dns_name', '') | default('', true) | string }}"
    _hyops_input_connectivity_mode: "{{ vars.get('connectivity_mode', 'static-ip') | string }}"
    _hyops_input_reverse_ssh_vm: "{{ vars.get('reverse_ssh_vm', '') | default('', true) | string }}"
    _hyops_input_reverse_ssh_vm_ip: "{{ vars.get('reverse_ssh_vm_ip', '') | default('', true) | string }}"
    _hyops_input_reverse_ssh_vm_zone: "{{ vars.get('reverse_ssh_vm_zone', '') | default('', true) | string }}"
    _hyops_input_reverse_ssh_vm_port: "{{ vars.get('reverse_ssh_vm_port', 0) | int }}"
    _hyops_input_reverse_ssh_vpc: "{{ vars.get('reverse_ssh_vpc', '') | default('', true) | string }}"

    _hyops_input_gcloud_bin: "{{ vars.get('gcloud_bin', 'gcloud') | string }}"
    _hyops_input_gcloud_copy_default_config: "{{ vars.get('gcloud_copy_default_config', true) | bool }}"
    _hyops_input_gcloud_runtime_config_dir: "{{ vars.get('gcloud_runtime_config_dir', '') | default('', true) | string }}"
    _hyops_input_gcloud_active_account: "{{ vars.get('gcloud_active_account', '') | default('', true) | string }}"
    _hyops_gcloud_config_dir: >-
      {{
        (_hyops_input_gcloud_runtime_config_dir | string)
        if (_hyops_input_gcloud_runtime_config_dir is string and (_hyops_input_gcloud_runtime_config_dir | length) > 0)
        else (hyops_runtime_root ~ '/cache/gcloud')
      }}
    _hyops_default_gcloud_config_dir: "{{ lookup('env', 'HOME') ~ '/.config/gcloud' }}"

  pre_tasks:
    - name: Normalize Cloud SQL external replica inputs
      ansible.builtin.set_fact:
        apply_mode: "{{ _hyops_input_apply_mode }}"
        replication_mode: "{{ _hyops_input_replication_mode }}"
        source_contract_version: "{{ _hyops_input_source_contract_version }}"
        source_host: "{{ _hyops_input_source_host }}"
        source_port: "{{ _hyops_input_source_port }}"
        source_db_name: "{{ _hyops_input_source_db_name }}"
        source_leader_name: "{{ _hyops_input_source_leader_name }}"
        source_replication_candidate: "{{ _hyops_input_source_replication_candidate }}"
        source_replication_user: "{{ _hyops_input_source_replication_user }}"
        source_replication_password_env: "{{ _hyops_input_source_replication_password_env }}"
        source_ssl_type: "{{ _hyops_input_source_ssl_type }}"
        source_ca_certificate_env: "{{ _hyops_input_source_ca_certificate_env }}"
        source_client_certificate_env: "{{ _hyops_input_source_client_certificate_env }}"
        source_private_key_env: "{{ _hyops_input_source_private_key_env }}"
        project_id: "{{ _hyops_input_project_id }}"
        region: "{{ _hyops_input_region }}"
        private_network: "{{ _hyops_input_private_network }}"
        source_connection_profile_name: "{{ _hyops_input_source_connection_profile_name }}"
        destination_connection_profile_name: "{{ _hyops_input_destination_connection_profile_name }}"
        migration_job_name: "{{ _hyops_input_migration_job_name }}"
        migration_job_type: "{{ _hyops_input_migration_job_type }}"
        start_migration_job: "{{ _hyops_input_start_migration_job }}"
        migration_objects_mode: "{{ _hyops_input_migration_objects_mode }}"
        destination_database_version: "{{ _hyops_input_destination_database_version }}"
        destination_tier: "{{ _hyops_input_destination_tier }}"
        destination_edition: "{{ _hyops_input_destination_edition }}"
        destination_availability_type: "{{ _hyops_input_destination_availability_type }}"
        destination_enable_ipv4: "{{ _hyops_input_destination_enable_ipv4 }}"
        destination_allocated_ip_range_name: "{{ _hyops_input_destination_allocated_ip_range_name }}"
        destination_root_password_env: "{{ _hyops_input_destination_root_password_env }}"
        target_db_port: "{{ _hyops_input_target_db_port }}"
        endpoint_dns_name: "{{ _hyops_input_endpoint_dns_name }}"
        connectivity_mode: "{{ _hyops_input_connectivity_mode }}"
        reverse_ssh_vm: "{{ _hyops_input_reverse_ssh_vm }}"
        reverse_ssh_vm_ip: "{{ _hyops_input_reverse_ssh_vm_ip }}"
        reverse_ssh_vm_zone: "{{ _hyops_input_reverse_ssh_vm_zone }}"
        reverse_ssh_vm_port: "{{ _hyops_input_reverse_ssh_vm_port }}"
        reverse_ssh_vpc: "{{ _hyops_input_reverse_ssh_vpc }}"
        gcloud_bin: "{{ _hyops_input_gcloud_bin }}"
        gcloud_copy_default_config: "{{ _hyops_input_gcloud_copy_default_config }}"
        gcloud_runtime_config_dir: "{{ _hyops_input_gcloud_runtime_config_dir }}"
        gcloud_active_account: "{{ _hyops_input_gcloud_active_account }}"
      changed_when: false

    - name: Require supported apply mode
      ansible.builtin.assert:
        that:
          - (apply_mode | string | lower) in ['establish', 'status']
        fail_msg: "inputs.apply_mode must be establish or status for this playbook"

    - name: Require logical replication mode
      ansible.builtin.assert:
        that:
          - (replication_mode | string | lower) == 'logical'
        fail_msg: "inputs.replication_mode must be logical (v1)"

    - name: Require source replication candidate posture
      ansible.builtin.assert:
        that:
          - source_replication_candidate | bool
        fail_msg: >-
          Source cluster is not ready for managed logical replication. Re-apply
          platform/onprem/postgresql-dr-source and confirm source_replication_candidate=true.

    - name: Require GCP project, region, and network
      ansible.builtin.assert:
        that:
          - (project_id | string | length) > 0
          - (region | string | length) > 0
          - (private_network | string | length) > 0
        fail_msg: "inputs.project_id, inputs.region, and inputs.private_network are required"

    - name: Require DMS object names
      ansible.builtin.assert:
        that:
          - (source_connection_profile_name | string | length) > 0
          - (destination_connection_profile_name | string | length) > 0
          - (migration_job_name | string | length) > 0
        fail_msg: >-
          inputs.source_connection_profile_name, inputs.destination_connection_profile_name,
          and inputs.migration_job_name are required.

    - name: Require source replication credentials for establish
      ansible.builtin.assert:
        that:
          - (source_replication_user | string | length) > 0
          - (source_replication_password_env | string | length) > 0
        fail_msg: >-
          inputs.source_replication_user and inputs.source_replication_password_env are required
          for apply_mode=establish.
      when: (apply_mode | string | lower) == 'establish'

    - name: Require reverse SSH bastion details when selected
      ansible.builtin.assert:
        that:
          - (reverse_ssh_vm | string | length) > 0
          - (reverse_ssh_vm_ip | string | length) > 0
          - (reverse_ssh_vm_zone | string | length) > 0
          - (reverse_ssh_vm_port | int) > 0
          - ((reverse_ssh_vpc | string | length) > 0) or ((private_network | string | length) > 0)
        fail_msg: >-
          inputs.reverse_ssh_vm, inputs.reverse_ssh_vm_ip, inputs.reverse_ssh_vm_zone, inputs.reverse_ssh_vm_port, and
          inputs.reverse_ssh_vpc/private_network are required when inputs.connectivity_mode=reverse-ssh.
      when: (connectivity_mode | string | lower) == 'reverse-ssh'

    - name: Ensure runtime gcloud config directory exists
      ansible.builtin.file:
        path: "{{ _hyops_gcloud_config_dir }}"
        state: directory
        mode: "0700"

    - name: Check default gcloud config sentinel
      ansible.builtin.stat:
        path: "{{ _hyops_default_gcloud_config_dir }}/config_sentinel"
      register: _hyops_default_gcloud_cfg

    - name: Check runtime gcloud config sentinel
      ansible.builtin.stat:
        path: "{{ _hyops_gcloud_config_dir }}/config_sentinel"
      register: _hyops_runtime_gcloud_cfg

    - name: Copy default gcloud config into runtime cache (best effort)
      ansible.builtin.command:
        argv:
          - cp
          - -a
          - "{{ _hyops_default_gcloud_config_dir }}/."
          - "{{ _hyops_gcloud_config_dir }}/"
      changed_when: true
      when:
        - gcloud_copy_default_config | bool
        - _hyops_default_gcloud_cfg.stat.exists
        - not _hyops_runtime_gcloud_cfg.stat.exists

    - name: Require gcloud binary
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - version
      changed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Resolve active gcloud account
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - auth
          - list
          - --filter=status:ACTIVE
          - --format=value(account)
      register: _hyops_gcloud_active_account
      changed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Fail when no active gcloud account is available
      ansible.builtin.assert:
        that:
          - (_hyops_gcloud_active_account.stdout | trim | length) > 0
        fail_msg: >-
          No active gcloud account was found. Authenticate gcloud first, or rerun hyops init gcp
          and ensure the controller has usable GCP CLI credentials.

    - name: Fail on unexpected gcloud account
      ansible.builtin.assert:
        that:
          - (_hyops_gcloud_active_account.stdout | trim) == (gcloud_active_account | trim)
        fail_msg: >-
          The active gcloud account does not match inputs.gcloud_active_account.
          Observed={{ _hyops_gcloud_active_account.stdout | trim }} expected={{ gcloud_active_account | trim }}
      when: (gcloud_active_account | string | length) > 0

    - name: Check Database Migration API enablement
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - services
          - list
          - --enabled
          - --project={{ project_id }}
          - --filter=config.name:datamigration.googleapis.com
          - --format=value(config.name)
      register: _hyops_datamigration_service
      changed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Fail when Database Migration API is disabled
      ansible.builtin.assert:
        that:
          - (_hyops_datamigration_service.stdout | trim) == 'datamigration.googleapis.com'
        fail_msg: >-
          datamigration.googleapis.com is not enabled in project {{ project_id }}.
          Enable it before apply, for example:
          gcloud services enable datamigration.googleapis.com --project={{ project_id }}
          If the project is HyOps-managed through project-factory, add the service to activate_apis there.

    - name: Verify reverse SSH bastion can reach source database
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - compute
          - ssh
          - "{{ reverse_ssh_vm }}"
          - --project={{ project_id }}
          - --zone={{ reverse_ssh_vm_zone }}
          - --command=nc -zv -w 5 {{ source_host }} {{ source_port | int }}
      register: _hyops_reverse_ssh_source_connectivity
      changed_when: false
      when:
        - (apply_mode | string | lower) == 'establish'
        - (connectivity_mode | string | lower) == 'reverse-ssh'
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Load replication and optional TLS secrets from environment
      ansible.builtin.set_fact:
        _hyops_source_replication_password: "{{ lookup('env', source_replication_password_env) | default('', true) }}"
        _hyops_source_ca_certificate: >-
          {{
            (lookup('env', source_ca_certificate_env) | default('', true))
            if (source_ca_certificate_env | string | length) > 0 else ''
          }}
        _hyops_source_client_certificate: >-
          {{
            (lookup('env', source_client_certificate_env) | default('', true))
            if (source_client_certificate_env | string | length) > 0 else ''
          }}
        _hyops_source_private_key: >-
          {{
            (lookup('env', source_private_key_env) | default('', true))
            if (source_private_key_env | string | length) > 0 else ''
          }}
        _hyops_destination_root_password: >-
          {{
            (lookup('env', destination_root_password_env) | default('', true))
            if (destination_root_password_env | string | length) > 0 else ''
          }}
      no_log: true

    - name: Require source replication password from environment for establish
      ansible.builtin.assert:
        that:
          - (_hyops_source_replication_password | string | length) > 0
        fail_msg: >-
          Environment variable {{ source_replication_password_env }} is empty or not set.
      no_log: true
      when: (apply_mode | string | lower) == 'establish'

  tasks:
    - name: Describe source connection profile
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - connection-profiles
          - describe
          - "{{ source_connection_profile_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
          - --format=json
      register: _hyops_source_cp_describe
      changed_when: false
      failed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Build source connection profile create command
      ansible.builtin.set_fact:
        _hyops_source_cp_create_argv: >-
          {{
            [
              gcloud_bin,
              'database-migration', 'connection-profiles', 'create', 'postgresql',
              source_connection_profile_name,
              '--project=' ~ project_id,
              '--region=' ~ region,
              '--display-name=' ~ source_connection_profile_name,
              '--role=SOURCE',
              '--host=' ~ source_host,
              '--port=' ~ (source_port | int | string),
              '--database=' ~ source_db_name,
              '--username=' ~ source_replication_user,
              '--password=' ~ _hyops_source_replication_password,
              '--no-async'
            ]
            + (((connectivity_mode | string | lower) == 'static-ip') | ternary(['--static-ip-connectivity'], []))
            + (((source_ssl_type | upper) != 'NONE') | ternary(['--ssl-type=' ~ (source_ssl_type | upper)], []))
            + ((((source_ssl_type | upper) != 'NONE') and ((_hyops_source_ca_certificate | length) > 0)) | ternary(['--ca-certificate=' ~ _hyops_source_ca_certificate], []))
            + ((((source_ssl_type | upper) != 'NONE') and ((_hyops_source_client_certificate | length) > 0)) | ternary(['--client-certificate=' ~ _hyops_source_client_certificate], []))
            + ((((source_ssl_type | upper) != 'NONE') and ((_hyops_source_private_key | length) > 0)) | ternary(['--private-key=' ~ _hyops_source_private_key], []))
          }}
      no_log: true
      when:
        - (apply_mode | string | lower) == 'establish'
        - (_hyops_source_cp_describe.rc | int) != 0

    - name: Create source connection profile
      ansible.builtin.command:
        argv: "{{ _hyops_source_cp_create_argv }}"
      register: _hyops_source_cp_create
      changed_when: (_hyops_source_cp_create.rc | int) == 0
      failed_when: >-
        (_hyops_source_cp_create.rc | int) != 0
        and ('already exists' not in ((_hyops_source_cp_create.stderr | default('')) | lower))
      no_log: true
      when:
        - (apply_mode | string | lower) == 'establish'
        - (_hyops_source_cp_describe.rc | int) != 0
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Describe destination connection profile
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - connection-profiles
          - describe
          - "{{ destination_connection_profile_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
          - --format=json
      register: _hyops_destination_cp_describe
      changed_when: false
      failed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Build destination connection profile create command
      ansible.builtin.set_fact:
        _hyops_destination_cp_create_argv: >-
          {{
            [
              gcloud_bin,
              'database-migration', 'connection-profiles', 'create', 'cloudsql',
              destination_connection_profile_name,
              '--project=' ~ project_id,
              '--region=' ~ region,
              '--display-name=' ~ destination_connection_profile_name,
              '--role=DESTINATION',
              '--source-id=' ~ source_connection_profile_name,
              '--database-version=' ~ (destination_database_version | upper),
              '--tier=' ~ destination_tier,
              '--edition=' ~ (destination_edition | lower),
              '--availability-type=' ~ (destination_availability_type | upper),
              '--private-network=' ~ private_network,
              '--provider=CLOUDSQL',
              '--no-async'
            ]
            + ((destination_enable_ipv4 | bool) | ternary(['--enable-ip-v4'], ['--no-enable-ip-v4']))
            + ((destination_allocated_ip_range_name | string | length > 0) | ternary(['--allocated-ip-range=' ~ destination_allocated_ip_range_name], []))
            + ((_hyops_destination_root_password | length > 0) | ternary(['--root-password=' ~ _hyops_destination_root_password], []))
          }}
      no_log: true
      when:
        - (apply_mode | string | lower) == 'establish'
        - (_hyops_destination_cp_describe.rc | int) != 0

    - name: Create destination connection profile (creates Cloud SQL replica)
      ansible.builtin.command:
        argv: "{{ _hyops_destination_cp_create_argv }}"
      register: _hyops_destination_cp_create
      changed_when: (_hyops_destination_cp_create.rc | int) == 0
      failed_when: >-
        (_hyops_destination_cp_create.rc | int) != 0
        and ('already exists' not in ((_hyops_destination_cp_create.stderr | default('')) | lower))
      no_log: true
      when:
        - (apply_mode | string | lower) == 'establish'
        - (_hyops_destination_cp_describe.rc | int) != 0
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Describe migration job
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - migration-jobs
          - describe
          - "{{ migration_job_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
          - --format=json
      register: _hyops_migration_job_describe
      changed_when: false
      failed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Normalize current migration job when present
      ansible.builtin.set_fact:
        _hyops_migration_job_existing: "{{ _hyops_migration_job_describe.stdout | from_json }}"
      changed_when: false
      when: (_hyops_migration_job_describe.rc | int) == 0

    - name: Detect reverse SSH drift on existing migration job
      ansible.builtin.set_fact:
        _hyops_recreate_migration_job: >-
          {{
            ((_hyops_migration_job_describe.rc | int) == 0)
            and ((connectivity_mode | string | lower) == 'reverse-ssh')
            and (
              ((_hyops_migration_job_existing.reverseSshConnectivity.vm | default('') | string) != (reverse_ssh_vm | string))
              or ((_hyops_migration_job_existing.reverseSshConnectivity.vmIp | default('') | string) != (reverse_ssh_vm_ip | string))
              or ((_hyops_migration_job_existing.reverseSshConnectivity.vmPort | default(0) | int) != (reverse_ssh_vm_port | int))
              or ((_hyops_migration_job_existing.reverseSshConnectivity.vpc | default('') | string) != (((reverse_ssh_vpc | string) if (reverse_ssh_vpc | string | length) > 0 else private_network) | string))
            )
          }}
      changed_when: false
      when:
        - (apply_mode | string | lower) == 'establish'
        - (_hyops_migration_job_describe.rc | int) == 0

    - name: Delete migration job when reverse SSH settings drift
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - migration-jobs
          - delete
          - "{{ migration_job_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
          - --quiet
      register: _hyops_migration_job_delete
      changed_when: (_hyops_migration_job_delete.rc | int) == 0
      when:
        - (apply_mode | string | lower) == 'establish'
        - _hyops_recreate_migration_job | default(false) | bool
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Reset migration job description after delete
      ansible.builtin.set_fact:
        _hyops_migration_job_describe:
          rc: 1
          stdout: "{}"
      changed_when: false
      when:
        - (apply_mode | string | lower) == 'establish'
        - _hyops_recreate_migration_job | default(false) | bool

    - name: Wait for migration job deletion to complete
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - migration-jobs
          - describe
          - "{{ migration_job_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
          - --format=json
      register: _hyops_migration_job_delete_wait
      changed_when: false
      failed_when: false
      until: (_hyops_migration_job_delete_wait.rc | int) != 0
      retries: 24
      delay: 5
      when:
        - (apply_mode | string | lower) == 'establish'
        - _hyops_recreate_migration_job | default(false) | bool
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Build migration job create command
      ansible.builtin.set_fact:
        _hyops_migration_job_create_argv: >-
          {{
            [
              gcloud_bin,
              'database-migration', 'migration-jobs', 'create',
              migration_job_name,
              '--project=' ~ project_id,
              '--region=' ~ region,
              '--source=' ~ source_connection_profile_name,
              '--destination=' ~ destination_connection_profile_name,
              '--type=' ~ (migration_job_type | upper),
              '--no-async'
            ]
            + (((migration_objects_mode | string | lower) == 'all-databases') | ternary(['--all-databases'], ['--databases-filter=' ~ source_db_name]))
            + (((connectivity_mode | string | lower) == 'static-ip') | ternary(['--static-ip'], []))
            + (((connectivity_mode | string | lower) == 'peer-vpc') | ternary(['--peer-vpc=' ~ private_network], []))
            + (((connectivity_mode | string | lower) == 'reverse-ssh') | ternary([
                  '--vm=' ~ reverse_ssh_vm,
                  '--vm-ip=' ~ reverse_ssh_vm_ip,
                  '--vm-port=' ~ (reverse_ssh_vm_port | int | string),
                  '--vpc=' ~ ((reverse_ssh_vpc | string) if (reverse_ssh_vpc | string | length) > 0 else private_network)
                ], []))
          }}
      when:
        - (apply_mode | string | lower) == 'establish'
        - (_hyops_migration_job_describe.rc | int) != 0

    - name: Create migration job
      ansible.builtin.command:
        argv: "{{ _hyops_migration_job_create_argv }}"
      register: _hyops_migration_job_create
      changed_when: (_hyops_migration_job_create.rc | int) == 0
      failed_when: >-
        (_hyops_migration_job_create.rc | int) != 0
        and ('already exists' not in ((_hyops_migration_job_create.stderr | default('')) | lower))
      when:
        - (apply_mode | string | lower) == 'establish'
        - (_hyops_migration_job_describe.rc | int) != 0
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Refresh migration job description after create
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - migration-jobs
          - describe
          - "{{ migration_job_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
          - --format=json
      register: _hyops_migration_job_current
      changed_when: false
      failed_when: false
      until: (_hyops_migration_job_current.rc | int) == 0
      retries: 24
      delay: 5
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Write runner reverse SSH bootstrap script to runtime cache
      ansible.builtin.copy:
        dest: "{{ hyops_runtime_root }}/cache/gcloud/{{ migration_job_name }}-reverse-ssh-runner.sh"
        mode: "0700"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          RUNNER_USER="$(id -un)"
          RUNNER_HOME="$(getent passwd "${RUNNER_USER}" | cut -d: -f6)"
          KEY_PATH="${RUNNER_HOME}/.ssh/id_ed25519_hyops_reverse"
          AUTHORIZED_KEYS="${RUNNER_HOME}/.ssh/authorized_keys"
          UNIT_NAME="hyops-dms-reverse-ssh-{{ migration_job_name }}.service"

          mkdir -p "${RUNNER_HOME}/.ssh"
          chmod 700 "${RUNNER_HOME}/.ssh"

          if [[ ! -f "${KEY_PATH}" ]]; then
            ssh-keygen -t ed25519 -N "" -f "${KEY_PATH}" >/dev/null
          fi

          PUB_KEY="$(cat "${KEY_PATH}.pub")"
          touch "${AUTHORIZED_KEYS}"
          grep -qxF "${PUB_KEY}" "${AUTHORIZED_KEYS}" || echo "${PUB_KEY}" >> "${AUTHORIZED_KEYS}"
          chmod 600 "${AUTHORIZED_KEYS}" "${KEY_PATH}"
          chmod 644 "${KEY_PATH}.pub"
          pkill -f 'ssh .* -R {{ reverse_ssh_vm_port | int }}:{{ source_host }}:{{ source_port | int }} localhost' || true
          sleep 1

          cat <<UNIT | sudo tee "/etc/systemd/system/${UNIT_NAME}" >/dev/null
          [Unit]
          Description=HybridOps DMS reverse SSH tunnel for {{ migration_job_name }}
          After=network-online.target ssh.service
          Wants=network-online.target

          [Service]
          Type=simple
          User=${RUNNER_USER}
          Environment=HOME=${RUNNER_HOME}
          ExecStart=/usr/bin/ssh -i ${KEY_PATH} -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -N -R {{ reverse_ssh_vm_port | int }}:{{ source_host }}:{{ source_port | int }} localhost
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNIT

          sudo systemctl daemon-reload
          sudo systemctl enable --now "${UNIT_NAME}" >/dev/null
          sudo systemctl restart "${UNIT_NAME}" >/dev/null
          ss -ltn | grep ':{{ reverse_ssh_vm_port | int }}' || true
          sudo systemctl is-active "${UNIT_NAME}"
      when:
        - (apply_mode | string | lower) == 'establish'
        - (connectivity_mode | string | lower) == 'reverse-ssh'
        - start_migration_job | bool
        - (_hyops_migration_job_current.rc | int) == 0
        - (((_hyops_migration_job_current.stdout | default('{}')) | from_json).state | default('') | upper) not in ['RUNNING', 'STARTING']

    - name: Copy reverse SSH bootstrap script to bastion VM
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - compute
          - scp
          - "{{ hyops_runtime_root }}/cache/gcloud/{{ migration_job_name }}-reverse-ssh-runner.sh"
          - "{{ reverse_ssh_vm }}:/tmp/{{ migration_job_name }}-reverse-ssh-runner.sh"
          - --project={{ project_id }}
          - --zone={{ reverse_ssh_vm_zone }}
      register: _hyops_reverse_ssh_script_copy
      changed_when: (_hyops_reverse_ssh_script_copy.rc | int) == 0
      when:
        - (apply_mode | string | lower) == 'establish'
        - (connectivity_mode | string | lower) == 'reverse-ssh'
        - start_migration_job | bool
        - (_hyops_migration_job_current.rc | int) == 0
        - (((_hyops_migration_job_current.stdout | default('{}')) | from_json).state | default('') | upper) not in ['RUNNING', 'STARTING']
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Bootstrap reverse SSH service on bastion VM
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - compute
          - ssh
          - "{{ reverse_ssh_vm }}"
          - --project={{ project_id }}
          - --zone={{ reverse_ssh_vm_zone }}
          - --command=bash /tmp/{{ migration_job_name }}-reverse-ssh-runner.sh
      register: _hyops_reverse_ssh_run
      changed_when: >-
        ('active' in ((_hyops_reverse_ssh_run.stdout | default('')) | lower))
        or ((':' ~ (reverse_ssh_vm_port | int | string)) in (_hyops_reverse_ssh_run.stdout | default('')))
      when:
        - (apply_mode | string | lower) == 'establish'
        - (connectivity_mode | string | lower) == 'reverse-ssh'
        - start_migration_job | bool
        - (_hyops_migration_job_current.rc | int) == 0
        - (((_hyops_migration_job_current.stdout | default('{}')) | from_json).state | default('') | upper) not in ['RUNNING', 'STARTING']
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Remove reverse SSH bootstrap script from bastion VM
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - compute
          - ssh
          - "{{ reverse_ssh_vm }}"
          - --project={{ project_id }}
          - --zone={{ reverse_ssh_vm_zone }}
          - --command=rm -f /tmp/{{ migration_job_name }}-reverse-ssh-runner.sh
      changed_when: false
      when:
        - (apply_mode | string | lower) == 'establish'
        - (connectivity_mode | string | lower) == 'reverse-ssh'
        - start_migration_job | bool
        - (_hyops_migration_job_current.rc | int) == 0
        - (((_hyops_migration_job_current.stdout | default('{}')) | from_json).state | default('') | upper) not in ['RUNNING', 'STARTING']
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Remove local reverse SSH bootstrap script from runtime cache
      ansible.builtin.file:
        path: "{{ hyops_runtime_root }}/cache/gcloud/{{ migration_job_name }}-reverse-ssh-runner.sh"
        state: absent
      when:
        - (apply_mode | string | lower) == 'establish'
        - (connectivity_mode | string | lower) == 'reverse-ssh'
        - start_migration_job | bool
        - (_hyops_migration_job_current.rc | int) == 0
        - (((_hyops_migration_job_current.stdout | default('{}')) | from_json).state | default('') | upper) not in ['RUNNING', 'STARTING']

    - name: Start migration job when requested and not already active
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - migration-jobs
          - start
          - "{{ migration_job_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
      register: _hyops_migration_job_start
      changed_when: true
      failed_when: >-
        (_hyops_migration_job_start.rc | int) != 0
        and ('already' not in ((_hyops_migration_job_start.stderr | default('')) | lower))
        and ('state' not in ((_hyops_migration_job_start.stderr | default('')) | lower))
      when:
        - (apply_mode | string | lower) == 'establish'
        - start_migration_job | bool
        - (_hyops_migration_job_current.rc | int) == 0
        - (((_hyops_migration_job_current.stdout | default('{}')) | from_json).state | default('') | upper) not in ['RUNNING', 'STARTING']
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Describe source connection profile (final)
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - connection-profiles
          - describe
          - "{{ source_connection_profile_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
          - --format=json
      register: _hyops_source_cp_final
      changed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Describe destination connection profile (final)
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - connection-profiles
          - describe
          - "{{ destination_connection_profile_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
          - --format=json
      register: _hyops_destination_cp_final
      changed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Describe migration job (final)
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - database-migration
          - migration-jobs
          - describe
          - "{{ migration_job_name }}"
          - --project={{ project_id }}
          - --region={{ region }}
          - --format=json
      register: _hyops_migration_job_final
      changed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Normalize final DMS objects
      ansible.builtin.set_fact:
        _hyops_destination_cp_json: "{{ _hyops_destination_cp_final.stdout | from_json }}"
        _hyops_migration_job_json: "{{ _hyops_migration_job_final.stdout | from_json }}"
      changed_when: false

    - name: Normalize required migration job states
      ansible.builtin.set_fact:
        _hyops_required_migration_job_states: >-
          {{ required_migration_job_states | default([]) | map('string') | map('upper') | list }}
      changed_when: false

    - name: Assert migration job is in an allowed state when required
      ansible.builtin.assert:
        that:
          - (_hyops_migration_job_json.state | default('UNKNOWN') | string | upper) in _hyops_required_migration_job_states
        fail_msg: >-
          Migration job {{ migration_job_name }} is not in an allowed state.
          Required={{ _hyops_required_migration_job_states }},
          observed={{ _hyops_migration_job_json.state | default('UNKNOWN') | string | upper }}.
      when: (_hyops_required_migration_job_states | length) > 0

    - name: Resolve managed Cloud SQL instance name from destination profile
      ansible.builtin.set_fact:
        _hyops_cloudsql_instance_name: >-
          {{
            (
              _hyops_destination_cp_json.cloudsql.cloudSqlId
              | default(destination_connection_profile_name, true)
            ) | string
          }}
      changed_when: false

    - name: Describe managed Cloud SQL instance
      ansible.builtin.command:
        argv:
          - "{{ gcloud_bin }}"
          - sql
          - instances
          - describe
          - "{{ _hyops_cloudsql_instance_name }}"
          - --project={{ project_id }}
          - --format=json
      register: _hyops_cloudsql_instance_final
      changed_when: false
      failed_when: false
      environment:
        CLOUDSDK_CONFIG: "{{ _hyops_gcloud_config_dir }}"
        CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

    - name: Normalize final Cloud SQL instance
      ansible.builtin.set_fact:
        _hyops_cloudsql_instance_json: >-
          {{
            (_hyops_cloudsql_instance_final.stdout | from_json)
            if ((_hyops_cloudsql_instance_final.rc | int) == 0 and (_hyops_cloudsql_instance_final.stdout | default('') | trim | length) > 0)
            else {}
          }}
      changed_when: false

- name: Org/gcp/cloudsql-external-replica (publish outputs)
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Write HyOps outputs
      ansible.builtin.copy:
        dest: "{{ hyops_outputs_file }}"
        mode: "0600"
        content: |
          {% set job_state = (_hyops_migration_job_json.state | default('UNKNOWN') | string) %}
          {% set destination_cp = _hyops_destination_cp_json | default({}) %}
          {% set cloudsql_instance = _hyops_cloudsql_instance_json | default({}) %}
          {% set target_instance_name =
               (_hyops_cloudsql_instance_name | default('') | string)
               if ((_hyops_cloudsql_instance_name | default('') | string | length) > 0)
               else (destination_connection_profile_name | string) %}
          {% set target_host =
               (destination_cp.cloudsql.privateIp | default(''))
               if (destination_cp.cloudsql is defined and (destination_cp.cloudsql.privateIp | default('') | string | length) > 0)
               else (
                 (
                   (cloudsql_instance.ipAddresses | default([]))
                   | selectattr('type', 'equalto', 'PRIVATE')
                   | map(attribute='ipAddress')
                   | list
                   | first
                 ) | default('', true)
               ) %}
          {% set endpoint_target =
               (endpoint_dns_name | string)
               if (endpoint_dns_name | string | length) > 0
               else target_host %}
          {% set established = (job_state | upper) not in ['FAILED', 'STOPPED', 'UNKNOWN'] %}
          {% set ready_for_cutover = (job_state | upper) == 'RUNNING' %}
          {% set cap_state = 'established' if established else 'assessed' %}
          {{
            {
              'target_project_id': (project_id | string),
              'target_region': (region | string),
              'target_instance_name': target_instance_name,
              'target_db_host': (target_host | string),
              'target_db_port': (target_db_port | int),
              'target_connection_name': (cloudsql_instance.connectionName | default('') | string),
              'endpoint_dns_name': (endpoint_dns_name | string),
              'endpoint_target': endpoint_target,
              'endpoint_target_type': ('dns' if (endpoint_dns_name | string | length) > 0 else 'host'),
              'endpoint_host': (target_host | string),
              'endpoint_port': (target_db_port | int),
              'endpoint_cutover_required': ((endpoint_dns_name | string | length) == 0),
              'source_host': (source_host | string),
              'source_port': (source_port | int),
              'source_leader_name': (source_leader_name | string),
              'source_replication_candidate': (source_replication_candidate | bool),
              'source_connection_profile_name': (source_connection_profile_name | string),
              'destination_connection_profile_name': (destination_connection_profile_name | string),
              'migration_job_name': (migration_job_name | string),
              'migration_job_state': job_state,
              'managed_replication_ready_for_cutover': ready_for_cutover,
              'connectivity_mode': (connectivity_mode | string),
              'managed_replication_mode': (replication_mode | string),
              'managed_replication_prereqs_ready': (source_replication_candidate | bool),
              'managed_replication_established': established,
              'cap.db.managed_external_replica': cap_state
            } | to_json
          }}
