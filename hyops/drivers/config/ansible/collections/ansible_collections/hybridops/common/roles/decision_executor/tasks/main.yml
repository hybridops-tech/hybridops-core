---
# purpose: Install the HybridOps decision executor service
# maintainer: HybridOps

- name: Ensure executor runtime directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ decision_executor_run_as_user }}"
    group: "{{ decision_executor_run_as_group }}"
    mode: "0750"
  loop:
    - "{{ decision_executor_root }}"
    - "{{ decision_executor_root }}/config"
    - "{{ decision_executor_root }}/state"
    - "{{ decision_executor_root }}/state/attempts"
    - "{{ decision_executor_root }}/logs"
  when: decision_executor_state | default('present') == 'present'

- name: Render executor config
  ansible.builtin.copy:
    dest: "{{ decision_executor_root }}/config/config.json"
    owner: "{{ decision_executor_run_as_user }}"
    group: "{{ decision_executor_run_as_group }}"
    mode: "0640"
    content: |
      {
        "execution_records_dir": {{ (decision_executor_execution_records_dir | default('/opt/hybridops/decision-consumer/state/executions')) | to_json }},
        "attempts_dir": {{ ((decision_executor_root | default('/opt/hybridops/decision-executor')) ~ '/state/attempts') | to_json }},
        "execution_mode": {{ (decision_executor_execution_mode | default('dry-run')) | to_json }},
        "poll_seconds": {{ (decision_executor_poll_seconds | default(15) | int) | to_json }},
        "log_level": {{ (decision_executor_log_level | default('INFO')) | to_json }}
      }
  notify: Restart decision executor
  when: decision_executor_state | default('present') == 'present'

- name: Render decision executor runtime
  ansible.builtin.template:
    src: decision-executor.py.j2
    dest: "{{ decision_executor_root }}/decision-executor.py"
    owner: "{{ decision_executor_run_as_user }}"
    group: "{{ decision_executor_run_as_group }}"
    mode: "0750"
  notify: Restart decision executor
  when: decision_executor_state | default('present') == 'present'

- name: Render decision executor systemd unit
  ansible.builtin.template:
    src: decision-executor.service.j2
    dest: "/etc/systemd/system/{{ decision_executor_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart decision executor
  when: decision_executor_state | default('present') == 'present'

- name: Enable and start decision executor
  ansible.builtin.systemd:
    name: "{{ decision_executor_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  when: decision_executor_state | default('present') == 'present'

- name: Stop and disable decision executor
  ansible.builtin.systemd:
    name: "{{ decision_executor_service_name }}"
    enabled: false
    state: stopped
    daemon_reload: true
  when: decision_executor_state | default('present') == 'absent'
  failed_when: false

- name: Remove decision executor unit
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ decision_executor_service_name }}.service"
    state: absent
  when: decision_executor_state | default('present') == 'absent'

- name: Remove decision executor runtime
  ansible.builtin.file:
    path: "{{ decision_executor_root }}"
    state: absent
  when: decision_executor_state | default('present') == 'absent'
