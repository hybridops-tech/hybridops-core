---
vyos_site_extension_state: "present"
site_extension_psk_env: "SITE_EXTENSION_IPSEC_PSK"

target_host: ""
target_user: "vyos"
target_port: 22
ssh_private_key_file: "~/.ssh/id_ed25519"
onprem_ssh_user: "{{ target_user | default('vyos') }}"
onprem_ssh_port: "{{ target_port | default(22) }}"
onprem_ssh_key_file: "{{ ssh_private_key_file | default('~/.ssh/id_ed25519') }}"
onprem_ssh_private_key_env: "ONPREM_EDGE_SSH_PRIVATE_KEY"
onprem_ssh_connectivity_timeout_s: 8
onprem_ssh_connectivity_wait_s: 180
onprem_ssh_opts:
  - "-o StrictHostKeyChecking=no"
  - "-o UserKnownHostsFile=/dev/null"
  - "-o ConnectTimeout=10"
  - "-o BatchMode=yes"

onprem_local_id: ""
onprem_local_address: "any"
onprem_bind_interface: "eth1"
internal_route_next_hop: ""
static_route_prefixes: []
consumer_snat_enabled: false
consumer_snat_rule_base: 4300
consumer_snat_rule_slots: 16
consumer_snat_source_cidrs: []
consumer_snat_destination_cidrs: []
consumer_snat_translation_address: ""
consumer_snat_outbound_interface: ""

edge01_name: "edge-a"
edge02_name: "edge-b"
edge01_public_ip: ""
edge02_public_ip: ""
edge01_remote_id: ""
edge02_remote_id: ""

edge01_inside_local_ip: "169.254.30.1"
edge01_inside_peer_ip: "169.254.30.2"
edge02_inside_local_ip: "169.254.30.5"
edge02_inside_peer_ip: "169.254.30.6"
inside_prefix_len: 30

edge01_tunnel_ifname: "vti30"
edge02_tunnel_ifname: "vti31"
edge01_tunnel_name: "siteext-a"
edge02_tunnel_name: "siteext-b"
onprem_router_id: "10.10.0.20"

local_asn: 65010
peer_asn: 65010
advertise_prefixes: []
import_allow_prefixes:
  - "10.70.0.0/20"
  - "10.70.16.0/20"

ipsec_ike_group: "HYOPS-SITEEXT-IKE"
ipsec_esp_group: "HYOPS-SITEEXT-ESP"
bgp_export_prefix_list: "HYOPS-SITEEXT-EXPORT"
bgp_import_prefix_list: "HYOPS-SITEEXT-IMPORT"
bgp_export_route_map: "HYOPS-SITEEXT-EXPORT"
bgp_import_route_map: "HYOPS-SITEEXT-IMPORT"

validate_post_apply: true
status_convergence_retries: 12
status_convergence_delay_s: 10
vyos_site_extension_no_log_sensitive: true
