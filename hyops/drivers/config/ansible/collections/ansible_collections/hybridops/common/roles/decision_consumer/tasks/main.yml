---
# purpose: Install the HybridOps decision consumer service
# maintainer: HybridOps

- name: Ensure consumer runtime directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ decision_consumer_run_as_user }}"
    group: "{{ decision_consumer_run_as_group }}"
    mode: "0750"
  loop:
    - "{{ decision_consumer_root }}"
    - "{{ decision_consumer_root }}/config"
    - "{{ decision_consumer_root }}/state"
    - "{{ decision_consumer_root }}/state/approvals"
    - "{{ decision_consumer_root }}/state/executions"
    - "{{ decision_consumer_root }}/logs"
  when: decision_consumer_state | default('present') == 'present'

- name: Render consumer config
  ansible.builtin.copy:
    dest: "{{ decision_consumer_root }}/config/config.json"
    owner: "{{ decision_consumer_run_as_user }}"
    group: "{{ decision_consumer_run_as_group }}"
    mode: "0640"
    content: |
      {
        "dispatch_requests_dir": {{ (decision_consumer_dispatch_requests_dir | default('/opt/hybridops/decision-dispatcher/state/requests')) | to_json }},
        "approval_dir": {{ ((decision_consumer_root | default('/opt/hybridops/decision-consumer')) ~ '/state/approvals') | to_json }},
        "executions_dir": {{ ((decision_consumer_root | default('/opt/hybridops/decision-consumer')) ~ '/state/executions') | to_json }},
        "execution_mode": {{ (decision_consumer_execution_mode | default('approval-only')) | to_json }},
        "require_approval": {{ (decision_consumer_require_approval | default(true) | bool) | to_json }},
        "poll_seconds": {{ (decision_consumer_poll_seconds | default(15) | int) | to_json }},
        "log_level": {{ (decision_consumer_log_level | default('INFO')) | to_json }}
      }
  notify: Restart decision consumer
  when: decision_consumer_state | default('present') == 'present'

- name: Render decision consumer runtime
  ansible.builtin.template:
    src: decision-consumer.py.j2
    dest: "{{ decision_consumer_root }}/decision-consumer.py"
    owner: "{{ decision_consumer_run_as_user }}"
    group: "{{ decision_consumer_run_as_group }}"
    mode: "0750"
  notify: Restart decision consumer
  when: decision_consumer_state | default('present') == 'present'

- name: Render decision consumer systemd unit
  ansible.builtin.template:
    src: decision-consumer.service.j2
    dest: "/etc/systemd/system/{{ decision_consumer_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart decision consumer
  when: decision_consumer_state | default('present') == 'present'

- name: Enable and start decision consumer
  ansible.builtin.systemd:
    name: "{{ decision_consumer_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  when: decision_consumer_state | default('present') == 'present'

- name: Stop and disable decision consumer
  ansible.builtin.systemd:
    name: "{{ decision_consumer_service_name }}"
    enabled: false
    state: stopped
    daemon_reload: true
  when: decision_consumer_state | default('present') == 'absent'
  failed_when: false

- name: Remove decision consumer unit
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ decision_consumer_service_name }}.service"
    state: absent
  when: decision_consumer_state | default('present') == 'absent'

- name: Remove decision consumer runtime
  ansible.builtin.file:
    path: "{{ decision_consumer_root }}"
    state: absent
  when: decision_consumer_state | default('present') == 'absent'
