---
- name: Preflight | assert supported state
  ansible.builtin.assert:
    that:
      - vyos_site_extension_state in ["present", "absent"]
    fail_msg: "vyos_site_extension_state must be 'present' or 'absent'"

- name: Preflight | assert target host available
  ansible.builtin.assert:
    that:
      - (target_host | default('', true) | string | trim | length) > 0
    fail_msg: "target_host must be resolved before platform/network/vyos-site-extension-onprem runs."

- name: Preflight | resolve site-extension PSK from environment
  ansible.builtin.set_fact:
    _site_extension_psk: "{{ lookup('ansible.builtin.env', site_extension_psk_env) | default('', true) | string }}"
  no_log: true
  when: vyos_site_extension_state == "present"

- name: Preflight | assert site-extension PSK available
  ansible.builtin.assert:
    that:
      - _site_extension_psk | length > 0
    fail_msg: "Required env {{ site_extension_psk_env }} is missing for VyOS site-extension configuration."
  no_log: true
  when: vyos_site_extension_state == "present"

- name: Preflight | resolve inline on-prem VyOS SSH private key from environment
  ansible.builtin.set_fact:
    _onprem_ssh_private_key_inline: ""
  no_log: true
  when: vyos_site_extension_state == "present"

- name: Preflight | load inline on-prem VyOS SSH private key from configured environment variable
  ansible.builtin.set_fact:
    _onprem_ssh_private_key_inline: >-
      {{ (lookup('ansible.builtin.env', onprem_ssh_private_key_env) | default('', true) | string)
         | regex_replace('\\n', '\n')
         | regex_replace('\r', '') }}
  no_log: true
  when:
    - vyos_site_extension_state == "present"
    - (onprem_ssh_private_key_env | default('', true) | string | trim | length) > 0

- name: Preflight | set effective on-prem SSH key path
  ansible.builtin.set_fact:
    _onprem_ssh_key_effective: "{{ onprem_ssh_key_file }}"
  changed_when: false
  when: vyos_site_extension_state == "present"

- name: Preflight | write inline on-prem VyOS SSH private key to transient file
  ansible.builtin.copy:
    dest: "/tmp/hyops-vyos-siteext-onprem.key"
    mode: "0600"
    content: "{{ _onprem_ssh_private_key_inline }}"
  no_log: true
  when:
    - vyos_site_extension_state == "present"
    - _onprem_ssh_private_key_inline | length > 0

- name: Preflight | validate inline on-prem VyOS SSH private key format
  ansible.builtin.command:
    cmd: ssh-keygen -y -f /tmp/hyops-vyos-siteext-onprem.key
  register: _onprem_inline_key_check
  changed_when: false
  failed_when: _onprem_inline_key_check.rc != 0
  when:
    - vyos_site_extension_state == "present"
    - _onprem_ssh_private_key_inline | length > 0

- name: Preflight | switch to transient on-prem SSH key path when inline key is provided
  ansible.builtin.set_fact:
    _onprem_ssh_key_effective: "/tmp/hyops-vyos-siteext-onprem.key"
  changed_when: false
  when:
    - vyos_site_extension_state == "present"
    - _onprem_ssh_private_key_inline | length > 0

- name: Preflight | check effective on-prem SSH key path exists
  ansible.builtin.stat:
    path: "{{ _onprem_ssh_key_effective }}"
  register: _onprem_ssh_key_stat
  when: vyos_site_extension_state == "present"

- name: Preflight | assert effective on-prem SSH key is available
  ansible.builtin.assert:
    that:
      - _onprem_ssh_key_stat.stat.exists | default(false)
    fail_msg: >-
      On-prem VyOS SSH key is unavailable. Ensure inputs.onprem_ssh_key_file exists locally,
      or provide env {{ onprem_ssh_private_key_env | default('ONPREM_EDGE_SSH_PRIVATE_KEY') }}.
  when: vyos_site_extension_state == "present"

- name: Build on-prem edge peer profiles
  ansible.builtin.set_fact:
    _onprem_edge_peers:
      - key: "edge01"
        edge_name: "{{ edge01_name }}"
        public_ip: "{{ edge01_public_ip }}"
        remote_id: "{{ (edge01_remote_id | default('', true) | string | trim) if (edge01_remote_id | default('', true) | string | trim | length) > 0 else (edge01_public_ip | string) }}"
        inside_local_ip: "{{ edge01_inside_local_ip }}"
        inside_peer_ip: "{{ edge01_inside_peer_ip }}"
        tunnel_ifname: "{{ edge01_tunnel_ifname }}"
        tunnel_name: "{{ edge01_tunnel_name }}"
      - key: "edge02"
        edge_name: "{{ edge02_name }}"
        public_ip: "{{ edge02_public_ip }}"
        remote_id: "{{ (edge02_remote_id | default('', true) | string | trim) if (edge02_remote_id | default('', true) | string | trim | length) > 0 else (edge02_public_ip | string) }}"
        inside_local_ip: "{{ edge02_inside_local_ip }}"
        inside_peer_ip: "{{ edge02_inside_peer_ip }}"
        tunnel_ifname: "{{ edge02_tunnel_ifname }}"
        tunnel_name: "{{ edge02_tunnel_name }}"
  changed_when: false

- name: Preflight | assert peer profile completeness
  ansible.builtin.assert:
    that:
      - item.public_ip | length > 0
      - item.remote_id | length > 0
      - item.inside_local_ip | length > 0
      - item.inside_peer_ip | length > 0
      - item.tunnel_ifname | length > 0
    fail_msg: "On-prem site-extension profile {{ item.key }} is missing required fields"
  loop: "{{ _onprem_edge_peers }}"
  loop_control:
    label: "{{ item.key }}"

- name: Preflight | wait for on-prem edge SSH reachability
  ansible.builtin.wait_for:
    host: "{{ target_host }}"
    port: "{{ onprem_ssh_port | int }}"
    connect_timeout: "{{ onprem_ssh_connectivity_timeout_s | int }}"
    timeout: "{{ onprem_ssh_connectivity_wait_s | int }}"
    state: started
    msg: >-
      Cannot reach on-prem VyOS edge on {{ target_host }}:{{ onprem_ssh_port }}
      within {{ onprem_ssh_connectivity_wait_s }} seconds. Reconcile platform/onprem/vyos-edge,
      then rerun platform/network/vyos-site-extension-onprem.
  when: vyos_site_extension_state == "present"

- name: Preflight | verify on-prem edge SSH authentication
  ansible.builtin.shell: |
    set -euo pipefail
    ssh_key="{{ _onprem_ssh_key_effective }}"
    ssh {{ onprem_ssh_opts | join(' ') }} -p "{{ onprem_ssh_port | int }}" -i "$ssh_key" "{{ onprem_ssh_user }}@{{ target_host }}" "echo HYOPS_ONPREM_AUTH_OK"
  args:
    executable: /bin/bash
  register: _onprem_ssh_auth
  changed_when: false
  failed_when:
    - _onprem_ssh_auth.rc != 0
    - "'HYOPS_ONPREM_AUTH_OK' not in (_onprem_ssh_auth.stdout | default(''))"
  when: vyos_site_extension_state == "present"

- name: Preflight | verify public peer route path or require explicit next hop
  ansible.builtin.shell: |
    set -euo pipefail
    ssh_key="{{ _onprem_ssh_key_effective }}"
    ssh {{ onprem_ssh_opts | join(' ') }} -p "{{ onprem_ssh_port | int }}" -i "$ssh_key" "{{ onprem_ssh_user }}@{{ target_host }}" "sudo /bin/bash -s" <<'HYOPS_EOF'
    set -euo pipefail
    bind_if="{{ onprem_bind_interface }}"
    explicit_nh="{{ public_peer_route_next_hop | default('', true) | trim }}"
    {% for item in _onprem_edge_peers %}
    route_line="$(ip route get {{ item.public_ip }} 2>/dev/null || true)"
    [ -n "$route_line" ] || {
      echo "missing route lookup for {{ item.public_ip }}" >&2
      exit 15
    }
    if [ -z "$explicit_nh" ]; then
      dev_name="$(printf '%s\n' "$route_line" | awk '{for (i = 1; i <= NF; i++) if ($i == "dev") {print $(i+1); exit}}')"
      [ "$dev_name" = "$bind_if" ] || {
        echo "peer {{ item.public_ip }} resolves via ${dev_name:-<none>} instead of ${bind_if}; set inputs.public_peer_route_next_hop" >&2
        exit 16
      }
    fi
    {% endfor %}
    HYOPS_EOF
  args:
    executable: /bin/bash
  register: _onprem_public_peer_route_check
  changed_when: false
  when: vyos_site_extension_state == "present"

- name: Apply on-prem site-extension config (present)
  ansible.builtin.shell: |
    set -euo pipefail
    ssh_key="{{ _onprem_ssh_key_effective }}"
    ssh {{ onprem_ssh_opts | join(' ') }} -p "{{ onprem_ssh_port | int }}" -i "$ssh_key" "{{ onprem_ssh_user }}@{{ target_host }}" "sudo /bin/vbash -s" <<'VYOS_EOF'
    source /opt/vyatta/etc/functions/script-template
    configure

    delete vpn ipsec ike-group {{ ipsec_ike_group }}
    set vpn ipsec ike-group {{ ipsec_ike_group }} key-exchange 'ikev2'
    set vpn ipsec ike-group {{ ipsec_ike_group }} proposal 1 dh-group '14'
    set vpn ipsec ike-group {{ ipsec_ike_group }} proposal 1 encryption 'aes256'
    set vpn ipsec ike-group {{ ipsec_ike_group }} proposal 1 hash 'sha256'

    delete vpn ipsec esp-group {{ ipsec_esp_group }}
    set vpn ipsec esp-group {{ ipsec_esp_group }} mode 'tunnel'
    set vpn ipsec esp-group {{ ipsec_esp_group }} pfs 'disable'
    set vpn ipsec esp-group {{ ipsec_esp_group }} proposal 1 encryption 'aes256'
    set vpn ipsec esp-group {{ ipsec_esp_group }} proposal 1 hash 'sha256'

    set vpn ipsec options disable-route-autoinstall
    set vpn ipsec interface '{{ onprem_bind_interface }}'

    delete vpn ipsec authentication psk HYOPS-SITEEXT-PSK
    set vpn ipsec authentication psk HYOPS-SITEEXT-PSK id '{{ onprem_local_id }}'
    {% for item in _onprem_edge_peers %}
    set vpn ipsec authentication psk HYOPS-SITEEXT-PSK id '{{ item.remote_id }}'
    {% endfor %}
    set vpn ipsec authentication psk HYOPS-SITEEXT-PSK secret '{{ _site_extension_psk }}'

    {% for prefix in static_route_prefixes %}
    delete protocols static route '{{ prefix }}'
    set protocols static route '{{ prefix }}' next-hop '{{ internal_route_next_hop }}'
    {% endfor %}

    {% for item in _onprem_edge_peers %}
    delete protocols static route '{{ item.public_ip }}/32'
    {% if public_peer_route_next_hop | default('', true) | string | trim | length > 0 %}
    set protocols static route '{{ item.public_ip }}/32' next-hop '{{ public_peer_route_next_hop }}'
    {% endif %}
    {% endfor %}

    {% for item in _onprem_edge_peers %}
    delete interfaces vti {{ item.tunnel_ifname }}
    set interfaces vti {{ item.tunnel_ifname }} description '{{ item.tunnel_name }}'
    set interfaces vti {{ item.tunnel_ifname }} address '{{ item.inside_local_ip }}/{{ inside_prefix_len | int }}'

    delete vpn ipsec site-to-site peer {{ item.edge_name }}
    set vpn ipsec site-to-site peer {{ item.edge_name }} authentication mode 'pre-shared-secret'
    set vpn ipsec site-to-site peer {{ item.edge_name }} authentication local-id '{{ onprem_local_id }}'
    set vpn ipsec site-to-site peer {{ item.edge_name }} authentication remote-id '{{ item.remote_id }}'
    set vpn ipsec site-to-site peer {{ item.edge_name }} ike-group '{{ ipsec_ike_group }}'
    set vpn ipsec site-to-site peer {{ item.edge_name }} default-esp-group '{{ ipsec_esp_group }}'
    set vpn ipsec site-to-site peer {{ item.edge_name }} local-address '{{ onprem_local_address }}'
    set vpn ipsec site-to-site peer {{ item.edge_name }} remote-address '{{ item.public_ip }}'
    set vpn ipsec site-to-site peer {{ item.edge_name }} connection-type 'initiate'
    set vpn ipsec site-to-site peer {{ item.edge_name }} vti bind '{{ item.tunnel_ifname }}'
    set vpn ipsec site-to-site peer {{ item.edge_name }} vti esp-group '{{ ipsec_esp_group }}'
    {% endfor %}

    delete policy prefix-list {{ bgp_export_prefix_list }}
    {% for prefix in advertise_prefixes %}
    set policy prefix-list {{ bgp_export_prefix_list }} rule {{ loop.index * 10 }} action 'permit'
    set policy prefix-list {{ bgp_export_prefix_list }} rule {{ loop.index * 10 }} prefix '{{ prefix }}'
    {% endfor %}

    delete policy prefix-list {{ bgp_import_prefix_list }}
    {% for prefix in import_allow_prefixes %}
    set policy prefix-list {{ bgp_import_prefix_list }} rule {{ loop.index * 10 }} action 'permit'
    set policy prefix-list {{ bgp_import_prefix_list }} rule {{ loop.index * 10 }} prefix '{{ prefix }}'
    {% endfor %}

    delete policy route-map {{ bgp_export_route_map }}
    {% if advertise_prefixes | length > 0 %}
    set policy route-map {{ bgp_export_route_map }} rule 10 action 'permit'
    set policy route-map {{ bgp_export_route_map }} rule 10 match ip address prefix-list '{{ bgp_export_prefix_list }}'
    {% endif %}

    delete policy route-map {{ bgp_import_route_map }}
    {% if import_allow_prefixes | length > 0 %}
    set policy route-map {{ bgp_import_route_map }} rule 10 action 'permit'
    set policy route-map {{ bgp_import_route_map }} rule 10 match ip address prefix-list '{{ bgp_import_prefix_list }}'
    {% endif %}

    set protocols bgp system-as '{{ local_asn | int }}'
    delete protocols bgp parameters router-id
    set protocols bgp parameters router-id '{{ onprem_router_id }}'
    {% for prefix in advertise_prefixes %}
    set protocols bgp address-family ipv4-unicast network '{{ prefix }}'
    {% endfor %}
    {% for item in _onprem_edge_peers %}
    delete protocols bgp neighbor {{ item.inside_peer_ip }}
    set protocols bgp neighbor {{ item.inside_peer_ip }} remote-as '{{ peer_asn | int }}'
    {% if import_allow_prefixes | length > 0 %}
    set protocols bgp neighbor {{ item.inside_peer_ip }} address-family ipv4-unicast route-map import '{{ bgp_import_route_map }}'
    {% else %}
    delete protocols bgp neighbor {{ item.inside_peer_ip }} address-family ipv4-unicast route-map import
    {% endif %}
    {% if advertise_prefixes | length > 0 %}
    set protocols bgp neighbor {{ item.inside_peer_ip }} address-family ipv4-unicast route-map export '{{ bgp_export_route_map }}'
    {% else %}
    delete protocols bgp neighbor {{ item.inside_peer_ip }} address-family ipv4-unicast route-map export
    {% endif %}
    {% endfor %}

    commit
    save
    exit
    VYOS_EOF
  args:
    executable: /bin/bash
  no_log: "{{ vyos_site_extension_no_log_sensitive | bool }}"
  when: vyos_site_extension_state == "present"

- name: Remove on-prem site-extension config (absent)
  ansible.builtin.shell: |
    set -euo pipefail
    ssh_key="{{ _onprem_ssh_key_effective | default(onprem_ssh_key_file) }}"
    ssh {{ onprem_ssh_opts | join(' ') }} -p "{{ onprem_ssh_port | int }}" -i "$ssh_key" "{{ onprem_ssh_user }}@{{ target_host }}" "sudo /bin/vbash -s" <<'VYOS_EOF'
    source /opt/vyatta/etc/functions/script-template
    configure
    delete interfaces vti {{ edge01_tunnel_ifname }}
    delete interfaces vti {{ edge02_tunnel_ifname }}
    delete vpn ipsec site-to-site peer {{ edge01_name }}
    delete vpn ipsec site-to-site peer {{ edge02_name }}
    delete vpn ipsec authentication psk HYOPS-SITEEXT-PSK
    delete protocols bgp neighbor {{ edge01_inside_peer_ip }}
    delete protocols bgp neighbor {{ edge02_inside_peer_ip }}
    delete protocols static route '{{ edge01_public_ip }}/32'
    delete protocols static route '{{ edge02_public_ip }}/32'
    delete policy route-map {{ bgp_export_route_map }}
    delete policy route-map {{ bgp_import_route_map }}
    delete policy prefix-list {{ bgp_export_prefix_list }}
    delete policy prefix-list {{ bgp_import_prefix_list }}
    {% for prefix in static_route_prefixes %}
    delete protocols static route '{{ prefix }}'
    {% endfor %}
    commit
    save
    exit
    VYOS_EOF
  args:
    executable: /bin/bash
  when: vyos_site_extension_state == "absent"

- name: Collect on-prem site-extension live status (present)
  ansible.builtin.shell: |
    set -euo pipefail
    ssh_key="{{ _onprem_ssh_key_effective }}"
    ssh {{ onprem_ssh_opts | join(' ') }} -p "{{ onprem_ssh_port | int }}" -i "$ssh_key" "{{ onprem_ssh_user }}@{{ target_host }}" "sudo /bin/bash -s" <<'HYOPS_EOF'
    set -euo pipefail
    for ifname in "{{ edge01_tunnel_ifname }}" "{{ edge02_tunnel_ifname }}"; do
      ip_line="$(ip -brief address show "$ifname" 2>/dev/null || true)"
      echo "$ip_line"
      [ -n "$ip_line" ] || exit 12
      printf '%s\n' "$ip_line" | awk -v ifname="$ifname" '$1 ~ ("^" ifname "(@.*)?$") && $2 != "DOWN" {found=1} END{exit(found ? 0 : 1)}'
    done
    echo '---'
    bgp_summary="$(vtysh -c 'show ip bgp summary' 2>/dev/null || true)"
    echo "$bgp_summary"
    for nbr in "{{ edge01_inside_peer_ip }}" "{{ edge02_inside_peer_ip }}"; do
      state="$(printf '%s\n' "$bgp_summary" | awk -v nbr="$nbr" '$1 == nbr {print $10; exit}')"
      [ -n "$state" ] || exit 13
      case "$state" in
        Idle|Active|Connect|OpenSent|OpenConfirm|Idle\(Admin\)|Clearing|Deleted)
          exit 14
          ;;
      esac
      printf 'BGP_STATE_%s=%s\n' "${nbr//./_}" "$state"
    done
    HYOPS_EOF
  args:
    executable: /bin/bash
  register: _onprem_siteext_status
  changed_when: false
  retries: "{{ status_convergence_retries | int }}"
  delay: "{{ status_convergence_delay_s | int }}"
  until: _onprem_siteext_status.rc == 0
  when:
    - vyos_site_extension_state == "present"
    - validate_post_apply | bool

- name: Cleanup | remove transient on-prem VyOS SSH key file
  ansible.builtin.file:
    path: "/tmp/hyops-vyos-siteext-onprem.key"
    state: absent
  no_log: true
  when: _onprem_ssh_private_key_inline | default('') | length > 0

- name: Assert on-prem site-extension live status (present)
  ansible.builtin.assert:
    that:
      - _onprem_siteext_status.rc == 0
      - (_onprem_siteext_status.stdout is search('^' ~ edge01_tunnel_ifname ~ '(@.*)?\\s+(UP|UNKNOWN)\\b', multiline=True))
      - (_onprem_siteext_status.stdout is search('^' ~ edge02_tunnel_ifname ~ '(@.*)?\\s+(UP|UNKNOWN)\\b', multiline=True))
      - (_onprem_siteext_status.stdout is search('BGP_STATE_' ~ (edge01_inside_peer_ip | replace('.', '_')) ~ '='))
      - (_onprem_siteext_status.stdout is search('BGP_STATE_' ~ (edge02_inside_peer_ip | replace('.', '_')) ~ '='))
    fail_msg: >-
      On-prem site-extension verification failed.
      Expected tunnel interfaces {{ edge01_tunnel_ifname }}, {{ edge02_tunnel_ifname }}
      to be operational (UP/UNKNOWN) and BGP neighbors {{ edge01_inside_peer_ip }}, {{ edge02_inside_peer_ip }}
      to reach an established state.
  when:
    - vyos_site_extension_state == "present"
    - validate_post_apply | bool
