---
# purpose: Install and manage edge decision loop service
# maintainer: HybridOps

- name: Preflight | assert state value
  ansible.builtin.assert:
    that:
      - decision_service_state in ["present", "absent"]
    fail_msg: "decision_service_state must be 'present' or 'absent'"

- name: Stop decision service (absent)
  ansible.builtin.service:
    name: "{{ decision_service_name }}"
    state: stopped
    enabled: false
  when: decision_service_state == "absent"
  failed_when: false

- name: Remove decision service files (absent)
  ansible.builtin.file:
    path: "{{ decision_service_root }}"
    state: absent
  when: decision_service_state == "absent"

- name: Remove decision service unit (absent)
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ decision_service_name }}.service"
    state: absent
  when: decision_service_state == "absent"

- name: Systemd | reload (absent)
  ansible.builtin.systemd:
    daemon_reload: true
  when: decision_service_state == "absent"

- name: Ensure decision directories (present)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0750"
  loop:
    - "{{ decision_service_root }}"
    - "{{ decision_service_config_dir }}"
    - "{{ decision_service_state_dir }}"
    - "{{ decision_service_state_dir }}/records"
    - "{{ decision_service_state_dir }}/metrics"
    - "{{ decision_service_logs_dir }}"
  when: decision_service_state == "present"

- name: Ensure decision runtime root directories (present)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0750"
  loop:
    - "{{ decision_service_runtime_root }}"
    - "{{ decision_service_runtime_root }}/meta"
    - "{{ decision_service_runtime_root }}/credentials"
  when:
    - decision_service_state == "present"
    - (decision_service_runtime_root | default('') | length) > 0

- name: Compute action state guard refs for local-hyops runtime
  ansible.builtin.set_fact:
    decision_service_state_guard_refs: >-
      {{
        (
          (decision_service_actions.module_state_guards.cutover | default([]))
          + (decision_service_actions.module_state_guards.failback | default([]))
        )
        | map(attribute='state_ref')
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | unique
        | list
      }}
  when:
    - decision_service_state == "present"
    - decision_service_execution_mode == "local-hyops"
    - decision_service_require_action_state_guards | bool
    - (decision_service_runtime_root | default('') | length) > 0
    - decision_service_actions is mapping
    - decision_service_actions.module_state_guards is mapping

- name: Assert controller runtime root is available for state guard seeding
  ansible.builtin.assert:
    that:
      - (hyops_runtime_root | default('') | string | length) > 0
    fail_msg: >-
      local-hyops action state guards require hyops_runtime_root so guard state can be mirrored into
      the local runtime root.
  when:
    - decision_service_state == "present"
    - decision_service_execution_mode == "local-hyops"
    - decision_service_require_action_state_guards | bool
    - (decision_service_state_guard_refs | default([]) | length) > 0

- name: Assert controller guard state exists before mirroring
  delegate_to: localhost
  become: false
  ansible.builtin.stat:
    path: >-
      {{
        (
          (hyops_runtime_root | string)
          ~ '/state/modules/'
          ~ ((_state_ref.split('#', 1)[0] | replace('.', '/') | trim('/') | replace('/', '__')))
          ~ (
            ('/instances/' ~ _state_ref.split('#', 1)[1] ~ '.json')
            if ('#' in _state_ref)
            else '/latest.json'
          )
        )
      }}
  vars:
    _state_ref: "{{ item }}"
  register: decision_service_guard_state_stats
  when:
    - decision_service_state == "present"
    - decision_service_execution_mode == "local-hyops"
    - decision_service_require_action_state_guards | bool
    - (decision_service_state_guard_refs | default([]) | length) > 0
  loop: "{{ decision_service_state_guard_refs | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Fail when controller guard state is missing
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: >-
      local-hyops action state guard source is missing on the controller:
      {{ item.stat.path | default('unknown') }}
  when:
    - decision_service_state == "present"
    - decision_service_execution_mode == "local-hyops"
    - decision_service_require_action_state_guards | bool
    - (decision_service_state_guard_refs | default([]) | length) > 0
  loop: "{{ decision_service_guard_state_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('state-ref') }}"

- name: Ensure local-hyops runtime state guard directories
  ansible.builtin.file:
    path: >-
      {{
        decision_service_runtime_root
        ~ '/state/modules/'
        ~ ((_state_ref.split('#', 1)[0] | replace('.', '/') | trim('/') | replace('/', '__')))
        ~ (
          '/instances'
          if ('#' in _state_ref)
          else ''
        )
      }}
    state: directory
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0750"
  vars:
    _state_ref: "{{ item }}"
  when:
    - decision_service_state == "present"
    - decision_service_execution_mode == "local-hyops"
    - decision_service_require_action_state_guards | bool
    - (decision_service_state_guard_refs | default([]) | length) > 0
  loop: "{{ decision_service_state_guard_refs | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Mirror controller guard state into local-hyops runtime
  ansible.builtin.copy:
    src: >-
      {{
        (
          (hyops_runtime_root | string)
          ~ '/state/modules/'
          ~ ((_state_ref.split('#', 1)[0] | replace('.', '/') | trim('/') | replace('/', '__')))
          ~ (
            ('/instances/' ~ _state_ref.split('#', 1)[1] ~ '.json')
            if ('#' in _state_ref)
            else '/latest.json'
          )
        )
      }}
    dest: >-
      {{
        (
          decision_service_runtime_root
          ~ '/state/modules/'
          ~ ((_state_ref.split('#', 1)[0] | replace('.', '/') | trim('/') | replace('/', '__')))
          ~ (
            ('/instances/' ~ _state_ref.split('#', 1)[1] ~ '.json')
            if ('#' in _state_ref)
            else '/latest.json'
          )
        )
      }}
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0640"
  vars:
    _state_ref: "{{ item }}"
  when:
    - decision_service_state == "present"
    - decision_service_execution_mode == "local-hyops"
    - decision_service_require_action_state_guards | bool
    - (decision_service_state_guard_refs | default([]) | length) > 0
  loop: "{{ decision_service_state_guard_refs | default([]) }}"
  loop_control:
    label: "{{ item }}"
  notify: Restart decision service

- name: Seed cloudflare runtime credentials for local-hyops actions
  ansible.builtin.copy:
    dest: "{{ decision_service_runtime_root }}/credentials/cloudflare.credentials.tfvars"
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0600"
    content: |
      # purpose: Minimal runtime credentials marker for decision-service local-hyops Cloudflare actions.
      # Secrets stay in process environment, not on disk.
  when:
    - decision_service_state == "present"
    - (decision_service_runtime_root | default('') | length) > 0
    - decision_service_execution_mode == "local-hyops"
    - decision_service_actions is mapping
    - (decision_service_actions.cutover_module_ref | default('') == 'platform/network/cloudflare-traffic-steering') or (decision_service_actions.failback_module_ref | default('') == 'platform/network/cloudflare-traffic-steering')
  notify: Restart decision service

- name: Assert required action env vars are available on controller
  ansible.builtin.assert:
    that:
      - (lookup('ansible.builtin.env', item) | default('', true) | string | length) > 0
    fail_msg: "decision_service_action_env_names requires controller env var {{ item }}"
  loop: "{{ decision_service_action_env_names | default([]) }}"
  when: decision_service_state == "present"

- name: Write decision action env file
  ansible.builtin.copy:
    dest: "{{ decision_service_env_path }}"
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0600"
    content: |
      {% for name in decision_service_action_env_names | default([]) %}
      {{ name }}={{ lookup('ansible.builtin.env', name) }}
      {% endfor %}
  when: decision_service_state == "present"
  notify: Restart decision service

- name: Write decision policy
  ansible.builtin.copy:
    dest: "{{ decision_service_config_dir }}/policy.json"
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0640"
    content: "{{ (decision_service_policy | default({})) | to_nice_json }}"
  when: decision_service_state == "present"
  notify: Restart decision service

- name: Seed decision demo signal file
  ansible.builtin.copy:
    dest: "{{ decision_service_demo_signal_path }}"
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0640"
    content: |
      {
        "pressure": {{ decision_service_demo_signal_default_pressure | int }},
        "active_until_epoch": null,
        "note": "",
        "updated_at": ""
      }
  when:
    - decision_service_state == "present"
    - decision_service_demo_signal_enabled | bool
  notify: Restart decision service

- name: Write decision runtime config
  ansible.builtin.copy:
    dest: "{{ decision_service_config_dir }}/config.json"
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0640"
    content: |
      {{
        {
          'thanos_query_url': (decision_service_thanos_query_url | string),
          'execution_mode': (decision_service_execution_mode | string),
          'hyops_bin': (decision_service_hyops_bin | string),
          'runtime_env': (decision_service_runtime_env | string),
          'runtime_root': (decision_service_runtime_root | string),
          'action_timeout_s': (decision_service_action_timeout_s | int),
          'signal_query_timeout_s': (decision_service_signal_query_timeout_s | int),
          'require_signal_readiness': (decision_service_require_signal_readiness | bool),
          'require_fresh_signals': (decision_service_require_fresh_signals | bool),
          'max_signal_age_s': (decision_service_max_signal_age_s | int),
          'min_ready_checks': (decision_service_min_ready_checks | int),
          'require_action_state_guards': (decision_service_require_action_state_guards | bool),
          'metrics_enabled': (decision_service_metrics_enabled | bool),
          'metrics_bind_host': (decision_service_metrics_bind_host | string),
          'metrics_port': (decision_service_metrics_port | int),
          'demo_signal_enabled': (decision_service_demo_signal_enabled | bool),
          'demo_signal_path': (decision_service_demo_signal_path | string),
          'dry_run': (decision_service_dry_run | bool),
          'enable_actions': (decision_service_enable_actions | bool),
          'tick_seconds': (decision_service_tick_seconds | int),
          'confirm_for_seconds': (decision_service_confirm_for_seconds | int),
          'stable_for_seconds': (decision_service_stable_for_seconds | int),
          'cooldown_seconds': (decision_service_cooldown_seconds | int),
          'log_level': (decision_service_log_level | string),
          'actions': (decision_service_actions | default({}))
        } | to_nice_json
      }}
  when: decision_service_state == "present"
  notify: Restart decision service

- name: Render decision demo signal helper
  ansible.builtin.template:
    src: decision-demo-signal.py.j2
    dest: "{{ decision_service_demo_signal_bin_path }}"
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0750"
  when: decision_service_state == "present"
  notify: Restart decision service

- name: Render decision service script
  ansible.builtin.template:
    src: decision-service.py.j2
    dest: "{{ decision_service_bin_path }}"
    owner: "{{ decision_service_run_as_user }}"
    group: "{{ decision_service_run_as_group }}"
    mode: "0750"
  when: decision_service_state == "present"
  notify: Restart decision service

- name: Render systemd unit
  ansible.builtin.template:
    src: decision-service.service.j2
    dest: "/etc/systemd/system/{{ decision_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  when: decision_service_state == "present"
  notify: Restart decision service

- name: Systemd | reload (present)
  ansible.builtin.systemd:
    daemon_reload: true
  when: decision_service_state == "present"

- name: Ensure decision service started
  ansible.builtin.service:
    name: "{{ decision_service_name }}"
    state: started
    enabled: true
  when: decision_service_state == "present"
