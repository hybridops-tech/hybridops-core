---
# purpose: Install and manage edge observability services via Docker Compose
# maintainer: HybridOps.Tech

- name: Preflight | assert supported state
  ansible.builtin.assert:
    that:
      - edge_obs_state in ["present", "absent"]
    fail_msg: "edge_obs_state must be 'present' or 'absent'"

- name: Preflight | assert objstore config is present when required
  ansible.builtin.assert:
    that:
      - (edge_obs_objstore_config | default('') | length) > 0
    fail_msg: "edge_obs_objstore_config is required when Thanos uses object storage"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_receive or edge_obs_enable_store_gateway or edge_obs_enable_ruler

- name: Preflight | assert hashring endpoints when receive enabled
  ansible.builtin.assert:
    that:
      - (edge_obs_hashring_endpoints | default([]) | length) > 0
    fail_msg: "edge_obs_hashring_endpoints must include at least one receiver endpoint"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_receive

- name: Preflight | assert local metrics dependencies
  ansible.builtin.assert:
    that:
      - not (edge_obs_enable_blackbox_exporter or edge_obs_enable_thanos_sidecar) or edge_obs_enable_prometheus
      - not (edge_obs_enable_prometheus or edge_obs_enable_blackbox_exporter or edge_obs_enable_thanos_sidecar) or (edge_obs_probe_targets | default([]) | length) > 0
    fail_msg: >-
      Local probe metrics require edge_obs_enable_prometheus=true and at least one edge_obs_probe_targets entry.
  when: edge_obs_state == "present"

- name: Preflight | compute query upstreams when empty
  ansible.builtin.set_fact:
    edge_obs_query_upstreams_effective: >-
      {{ (edge_obs_query_upstreams | length > 0)
          | ternary(edge_obs_query_upstreams,
              ( (edge_obs_enable_thanos_sidecar | ternary(['thanos-sidecar:10901'], []))
                + (edge_obs_enable_receive | ternary(['thanos-receive:10901'], []))
                + (edge_obs_enable_store_gateway | ternary(['thanos-store-gateway:10901'], []))
              )
            )
      }}
  when: edge_obs_state == "present"

- name: Preflight | compute Prometheus external labels when sidecar enabled
  ansible.builtin.set_fact:
    edge_obs_prometheus_external_labels_effective: >-
      {{
        (edge_obs_prometheus_external_labels | default({}))
        if (edge_obs_prometheus_external_labels | default({}) | length) > 0
        else {
          'hyops_env': ((hyops_runtime_root | default('/var/lib/hyops')) | regex_replace('/+$', '') | basename),
          'edge_node': inventory_hostname,
        }
      }}
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_thanos_sidecar

- name: Preflight | assert Prometheus external labels when sidecar enabled
  ansible.builtin.assert:
    that:
      - (edge_obs_prometheus_external_labels_effective | default({}) | length) > 0
    fail_msg: >-
      edge_obs_enable_thanos_sidecar requires non-empty Prometheus external labels.
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_thanos_sidecar

- name: Stop edge observability (absent)
  ansible.builtin.service:
    name: edge-observability
    state: stopped
    enabled: false
  when: edge_obs_state == "absent"
  failed_when: false

- name: Remove edge observability files (absent)
  ansible.builtin.file:
    path: "{{ edge_obs_root }}"
    state: absent
  when: edge_obs_state == "absent"

- name: Ensure base directories (present)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - "{{ edge_obs_root }}"
    - "{{ edge_obs_config_dir }}"
    - "{{ edge_obs_data_dir }}"
    - "{{ edge_obs_logs_dir }}"
  when: edge_obs_state == "present"

- name: Ensure Grafana dashboard directory (present)
  ansible.builtin.file:
    path: "{{ edge_obs_grafana_dashboards_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_grafana
    - edge_obs_enable_burst_dashboard

- name: Ensure Thanos data directories (present)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ edge_obs_thanos_uid }}"
    group: "{{ edge_obs_thanos_gid }}"
    mode: "0750"
    recurse: true
  loop:
    - "{{ edge_obs_data_dir }}/receive"
    - "{{ edge_obs_data_dir }}/store"
    - "{{ edge_obs_data_dir }}/ruler"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_receive or edge_obs_enable_store_gateway or edge_obs_enable_ruler

- name: Ensure Prometheus data directory (present)
  ansible.builtin.file:
    path: "{{ edge_obs_data_dir }}/prometheus"
    state: directory
    owner: "{{ edge_obs_prometheus_uid }}"
    group: "{{ edge_obs_prometheus_gid }}"
    mode: "0750"
    recurse: true
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_prometheus

- name: Ensure Grafana data directory (present)
  ansible.builtin.file:
    path: "{{ edge_obs_data_dir }}/grafana"
    state: directory
    owner: "{{ edge_obs_grafana_uid }}"
    group: "{{ edge_obs_grafana_gid }}"
    mode: "0750"
    recurse: true
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_grafana

- name: Ensure Alertmanager data directory (present)
  ansible.builtin.file:
    path: "{{ edge_obs_data_dir }}/alertmanager"
    state: directory
    owner: "{{ edge_obs_alertmanager_uid }}"
    group: "{{ edge_obs_alertmanager_gid }}"
    mode: "0750"
    recurse: true
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_alertmanager

- name: Write Grafana env file
  ansible.builtin.copy:
    dest: "{{ edge_obs_env_path }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      GF_SECURITY_ADMIN_USER={{ edge_obs_grafana_admin_user }}
      GF_SECURITY_ADMIN_PASSWORD={{ edge_obs_grafana_admin_password }}
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_grafana
  notify: Restart edge observability

- name: Render objstore config
  ansible.builtin.template:
    src: objstore.yml.j2
    dest: "{{ edge_obs_config_dir }}/objstore.yml"
    owner: "{{ edge_obs_thanos_uid }}"
    group: "{{ edge_obs_thanos_gid }}"
    mode: "0640"
  when: edge_obs_state == "present"
  notify: Restart edge observability

- name: Render hashring config
  ansible.builtin.template:
    src: hashring.json.j2
    dest: "{{ edge_obs_config_dir }}/hashring.json"
    owner: "{{ edge_obs_thanos_uid }}"
    group: "{{ edge_obs_thanos_gid }}"
    mode: "0640"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_receive
  notify: Restart edge observability

- name: Render Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasources.yaml.j2
    dest: "{{ edge_obs_config_dir }}/grafana-datasources.yaml"
    owner: "{{ edge_obs_grafana_uid }}"
    group: "{{ edge_obs_grafana_gid }}"
    mode: "0640"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_grafana
  notify: Restart edge observability

- name: Render Grafana dashboard provisioning
  ansible.builtin.template:
    src: grafana-dashboards.yaml.j2
    dest: "{{ edge_obs_grafana_dashboard_provider_path }}"
    owner: root
    group: root
    mode: "0644"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_grafana
    - edge_obs_enable_burst_dashboard
  notify: Restart edge observability

- name: Render burst control dashboard
  ansible.builtin.template:
    src: grafana-burst-dashboard.json.j2
    dest: "{{ edge_obs_grafana_dashboards_dir }}/burst-control.json"
    owner: root
    group: root
    mode: "0644"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_grafana
    - edge_obs_enable_burst_dashboard
  notify: Restart edge observability

- name: Render Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ edge_obs_config_dir }}/prometheus.yml"
    owner: root
    group: root
    mode: "0644"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_prometheus
  notify: Restart edge observability

- name: Render Blackbox Exporter config
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: "{{ edge_obs_config_dir }}/blackbox.yml"
    owner: root
    group: root
    mode: "0644"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_blackbox_exporter
  notify: Restart edge observability

- name: Render Alertmanager config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ edge_obs_config_dir }}/alertmanager.yml"
    owner: "{{ edge_obs_alertmanager_uid }}"
    group: "{{ edge_obs_alertmanager_gid }}"
    mode: "0640"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_alertmanager
  notify: Restart edge observability

- name: Render Thanos Ruler rules
  ansible.builtin.template:
    src: thanos-rules.yaml.j2
    dest: "{{ edge_obs_config_dir }}/rules.yaml"
    owner: "{{ edge_obs_thanos_uid }}"
    group: "{{ edge_obs_thanos_gid }}"
    mode: "0640"
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_ruler
  notify: Restart edge observability

- name: Render docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ edge_obs_compose_path }}"
    owner: root
    group: root
    mode: "0640"
  when: edge_obs_state == "present"
  notify: Restart edge observability

- name: Render systemd service
  ansible.builtin.template:
    src: edge-observability.service.j2
    dest: /etc/systemd/system/edge-observability.service
    owner: root
    group: root
    mode: "0644"
  when: edge_obs_state == "present"
  notify: Restart edge observability

- name: Systemd | reload
  ansible.builtin.systemd:
    daemon_reload: true
  when: edge_obs_state == "present"

- name: Ensure edge observability service is enabled and started
  ansible.builtin.service:
    name: edge-observability
    state: started
    enabled: true
  when: edge_obs_state == "present"

- name: Flush handlers before readiness checks
  ansible.builtin.meta: flush_handlers
  when: edge_obs_state == "present"

- name: Compute expected edge observability services
  ansible.builtin.set_fact:
    edge_obs_expected_services:
      "{{ (edge_obs_enable_receive | ternary(['thanos-receive'], []))
          + (edge_obs_enable_store_gateway | ternary(['thanos-store-gateway'], []))
          + (edge_obs_enable_query | ternary(['thanos-query'], []))
          + (edge_obs_enable_ruler | ternary(['thanos-ruler'], []))
          + (edge_obs_enable_alertmanager | ternary(['alertmanager'], []))
          + (edge_obs_enable_grafana | ternary(['grafana'], []))
          + (edge_obs_enable_prometheus | ternary(['prometheus'], []))
          + (edge_obs_enable_blackbox_exporter | ternary(['blackbox-exporter'], []))
          + (edge_obs_enable_thanos_sidecar | ternary(['thanos-sidecar'], []))
      }}"
  when: edge_obs_state == "present"

- name: Wait for expected edge observability containers to be running
  ansible.builtin.shell: |
    set -euo pipefail
    docker compose -f "{{ edge_obs_compose_path }}" ps --services --status running
  args:
    executable: /bin/bash
  register: edge_obs_running_services
  changed_when: false
  retries: "{{ edge_obs_startup_retries | int }}"
  delay: "{{ edge_obs_startup_delay_s | int }}"
  until:
    - (edge_obs_expected_services | difference((edge_obs_running_services.stdout_lines | default([]) | map('trim') | reject('equalto', '') | list))) | length == 0
  when: edge_obs_state == "present"

- name: Wait for Thanos Query HTTP readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ edge_obs_query_http_port }}/-/healthy"
    status_code: 200
  register: edge_obs_query_health
  retries: "{{ edge_obs_startup_retries | int }}"
  delay: "{{ edge_obs_startup_delay_s | int }}"
  until: edge_obs_query_health.status == 200
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_query

- name: Wait for Prometheus HTTP readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ edge_obs_prometheus_http_port }}/-/ready"
    status_code: 200
  register: edge_obs_prometheus_health
  retries: "{{ edge_obs_startup_retries | int }}"
  delay: "{{ edge_obs_startup_delay_s | int }}"
  until: edge_obs_prometheus_health.status == 200
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_prometheus

- name: Wait for Blackbox Exporter HTTP readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ edge_obs_blackbox_exporter_http_port }}/metrics"
    status_code: 200
  register: edge_obs_blackbox_health
  retries: "{{ edge_obs_startup_retries | int }}"
  delay: "{{ edge_obs_startup_delay_s | int }}"
  until: edge_obs_blackbox_health.status == 200
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_blackbox_exporter

- name: Wait for probe metrics to appear in Thanos Query
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ edge_obs_query_http_port }}/api/v1/query?query=probe_success"
    status_code: 200
    return_content: true
  register: edge_obs_probe_metrics
  retries: "{{ edge_obs_startup_retries | int }}"
  delay: "{{ edge_obs_startup_delay_s | int }}"
  until:
    - edge_obs_probe_metrics.status == 200
    - edge_obs_probe_metrics.json.status | default('') == 'success'
    - (edge_obs_probe_metrics.json.data.result | default([]) | length) > 0
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_query
    - edge_obs_enable_prometheus
    - edge_obs_enable_blackbox_exporter
    - edge_obs_enable_thanos_sidecar

- name: Wait for Grafana HTTP readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ edge_obs_grafana_http_port }}/api/health"
    status_code: 200
  register: edge_obs_grafana_health
  retries: "{{ edge_obs_startup_retries | int }}"
  delay: "{{ edge_obs_startup_delay_s | int }}"
  until: edge_obs_grafana_health.status == 200
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_grafana

- name: Wait for Alertmanager HTTP readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ edge_obs_alertmanager_http_port }}/-/healthy"
    status_code: 200
  register: edge_obs_alertmanager_health
  retries: "{{ edge_obs_startup_retries | int }}"
  delay: "{{ edge_obs_startup_delay_s | int }}"
  until: edge_obs_alertmanager_health.status == 200
  when:
    - edge_obs_state == "present"
    - edge_obs_enable_alertmanager
