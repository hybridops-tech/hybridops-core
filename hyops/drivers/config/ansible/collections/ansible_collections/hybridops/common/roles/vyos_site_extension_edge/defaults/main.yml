---
vyos_site_extension_state: "present"
site_extension_psk_env: "SITE_EXTENSION_IPSEC_PSK"

vyos_ssh_user: "vyos"
vyos_ssh_port: 22
vyos_ssh_key_file: "/home/opsadmin/.ssh/id_ed25519"
vyos_ssh_private_key_env: "WAN_EDGE_SSH_PRIVATE_KEY"
edge_ssh_connectivity_timeout_s: 8
edge_ssh_connectivity_wait_s: 180
vyos_ssh_opts:
  - "-o StrictHostKeyChecking=no"
  - "-o UserKnownHostsFile=/dev/null"
  - "-o ConnectTimeout=10"
  - "-o BatchMode=yes"

edge01_name: "edge-a"
edge02_name: "edge-b"
edge01_ssh_host: ""
edge02_ssh_host: ""
edge01_public_ip: ""
edge02_public_ip: ""

onprem_peer_remote_address: ""
onprem_peer_id: ""

edge01_inside_local_ip: "169.254.30.2"
edge01_inside_peer_ip: "169.254.30.1"
edge02_inside_local_ip: "169.254.30.6"
edge02_inside_peer_ip: "169.254.30.5"
inside_prefix_len: 30

edge01_tunnel_ifname: "vti30"
edge02_tunnel_ifname: "vti31"
edge01_tunnel_name: "siteext-a"
edge02_tunnel_name: "siteext-b"
edge01_router_id: "10.80.0.11"
edge02_router_id: "10.80.0.12"
edge_bind_interface: "eth0"

local_asn: 65010
peer_asn: 65010
advertise_prefixes:
  - "10.70.0.0/20"
  - "10.70.16.0/20"
import_allow_prefixes: []

ipsec_ike_group: "HYOPS-SITEEXT-IKE"
ipsec_esp_group: "HYOPS-SITEEXT-ESP"
bgp_export_prefix_list: "HYOPS-SITEEXT-EXPORT"
bgp_import_prefix_list: "HYOPS-SITEEXT-IMPORT"
bgp_export_route_map: "HYOPS-SITEEXT-EXPORT"
bgp_import_route_map: "HYOPS-SITEEXT-IMPORT"

validate_post_apply: true
status_convergence_retries: 12
status_convergence_delay_s: 10
vyos_site_extension_no_log_sensitive: true
