---
- name: Preflight | assert supported state
  ansible.builtin.assert:
    that:
      - powerdns_state in ["present", "absent"]
    fail_msg: "powerdns_state must be 'present' or 'absent'"

- name: Preflight | assert supported mode
  ansible.builtin.assert:
    that:
      - powerdns_mode in ["primary", "secondary"]
    fail_msg: "powerdns_mode must be 'primary' or 'secondary'"
  when: powerdns_state == "present"

- name: Ensure Docker Engine is present
  ansible.builtin.include_role:
    name: hybridops.common.docker_engine
  vars:
    docker_engine_state: "{{ 'present' if powerdns_state == 'present' else 'absent' }}"
    docker_engine_enable: "{{ docker_engine_enable | bool }}"

- name: Compute PowerDNS role flags
  ansible.builtin.set_fact:
    _powerdns_enable_primary: "{{ powerdns_mode == 'primary' }}"
    _powerdns_enable_secondary: "{{ powerdns_mode == 'secondary' }}"
  when: powerdns_state == "present"

- name: Compute effective PowerDNS API key for rendered config
  ansible.builtin.set_fact:
    _powerdns_api_key_effective: >-
      {{
        (powerdns_api_key | string)
        if (powerdns_api_key is string and (powerdns_api_key | length) > 0)
        else (lookup('env', powerdns_api_key_env | default('POWERDNS_API_KEY')) | default('', true) | string)
      }}
  when: powerdns_state == "present"
  no_log: true

- name: Ensure PowerDNS root and config directories (present)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ powerdns_root }}"
    - "{{ powerdns_config_dir }}"
  when: powerdns_state == "present"

- name: Ensure PowerDNS data and logs directories (present)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ powerdns_container_uid }}"
    group: "{{ powerdns_container_gid }}"
    mode: "0750"
  loop:
    - "{{ powerdns_data_dir }}"
    - "{{ powerdns_logs_dir }}"
  when: powerdns_state == "present"

- name: Render PowerDNS config
  ansible.builtin.template:
    src: pdns.conf.j2
    dest: "{{ powerdns_config_dir }}/pdns.conf"
    owner: root
    group: root
    mode: "0644"
  when: powerdns_state == "present"
  notify: Restart powerdns authority

- name: Render docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ powerdns_compose_path }}"
    owner: root
    group: root
    mode: "0644"
  when: powerdns_state == "present"
  notify: Restart powerdns authority

- name: Check whether PowerDNS SQLite database exists
  ansible.builtin.stat:
    path: "{{ powerdns_data_dir }}/pdns.sqlite3"
  register: powerdns_sqlite_db
  when: powerdns_state == "present"

- name: Initialize PowerDNS SQLite database schema
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - --entrypoint
      - /bin/sh
      - -v
      - "{{ powerdns_data_dir }}:/var/lib/powerdns"
      - "{{ powerdns_image }}"
      - -lc
      - sqlite3 /var/lib/powerdns/pdns.sqlite3 < /usr/local/share/doc/pdns/schema.sqlite3.sql
  when:
    - powerdns_state == "present"
    - not (powerdns_sqlite_db.stat.exists | default(false))

- name: Manage compose-backed PowerDNS service
  ansible.builtin.include_role:
    name: hybridops.common.docker_compose_stack
  vars:
    docker_compose_stack_state: "{{ powerdns_state }}"
    docker_compose_stack_service_name: powerdns-authority
    docker_compose_stack_compose_path: "{{ powerdns_compose_path }}"
    docker_compose_stack_workdir: "{{ powerdns_root }}"
    docker_compose_stack_project_name: "{{ powerdns_compose_project }}"
    docker_compose_stack_notify_handler: Restart powerdns authority

- name: Remove PowerDNS files (absent)
  ansible.builtin.file:
    path: "{{ powerdns_root }}"
    state: absent
  when: powerdns_state == "absent"

- name: Apply pending PowerDNS handler restarts before readiness checks
  ansible.builtin.meta: flush_handlers
  when: powerdns_state == "present"

- name: Wait for PowerDNS API
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ powerdns_api_port }}"
    delay: 0
    timeout: 60
  when:
    - powerdns_state == "present"
    - powerdns_api_enabled | bool

- name: Check whether zone already exists
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ powerdns_compose_path }}"
      - exec
      - -T
      - pdns
      - pdnsutil
      - list-zone
      - "{{ powerdns_zone_name }}"
  register: powerdns_zone_check
  changed_when: false
  failed_when: false
  when:
    - powerdns_state == "present"
    - (powerdns_zone_name | default('') | length) > 0

- name: Bootstrap primary zone
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ powerdns_compose_path }}"
      - exec
      - -T
      - pdns
      - pdnsutil
      - create-zone
      - "{{ powerdns_zone_name }}"
      - "{{ powerdns_default_ns }}"
  when:
    - powerdns_state == "present"
    - powerdns_mode == "primary"
    - (powerdns_zone_name | default('') | length) > 0
    - (powerdns_zone_check.rc | default(1)) != 0

- name: Bootstrap secondary zone
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ powerdns_compose_path }}"
      - exec
      - -T
      - pdns
      - pdnsutil
      - create-secondary-zone
      - "{{ powerdns_zone_name }}"
      - "{{ powerdns_primary_endpoint }}"
  when:
    - powerdns_state == "present"
    - powerdns_mode == "secondary"
    - (powerdns_zone_name | default('') | length) > 0
    - (powerdns_zone_check.rc | default(1)) != 0

- name: Trigger initial secondary zone retrieve
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ powerdns_compose_path }}"
      - exec
      - -T
      - pdns
      - pdns_control
      - retrieve
      - "{{ powerdns_zone_name }}"
  register: powerdns_secondary_retrieve
  changed_when: false
  failed_when: false
  when:
    - powerdns_state == "present"
    - powerdns_mode == "secondary"
    - (powerdns_zone_name | default('') | length) > 0
