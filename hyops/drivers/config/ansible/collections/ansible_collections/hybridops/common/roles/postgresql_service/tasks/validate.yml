---
# purpose: Input validation for PostgreSQL service wrapper
# adr: ADR-0101, ADR-0103
# maintainer: HybridOps.Tech

- name: Validate listen addresses
  ansible.builtin.assert:
    that:
      - postgresql_service_listen_addresses is iterable
      - (postgresql_service_listen_addresses | length) > 0
    fail_msg: "postgresql_service_listen_addresses must be a non-empty list."

- name: Validate port
  ansible.builtin.assert:
    that:
      - postgresql_service_port is number
      - postgresql_service_port > 0
      - postgresql_service_port < 65536
    fail_msg: "postgresql_service_port must be a valid TCP port."

- name: Validate allowed client list schema
  ansible.builtin.assert:
    that:
      - postgresql_service_allowed_clients is iterable
      - >-
        (postgresql_service_allowed_clients | selectattr('cidr', 'defined') | list | length)
        == (postgresql_service_allowed_clients | length)
      - >-
        (postgresql_service_allowed_clients | selectattr('database', 'defined') | list | length)
        == (postgresql_service_allowed_clients | length)
      - >-
        (postgresql_service_allowed_clients | selectattr('user', 'defined') | list | length)
        == (postgresql_service_allowed_clients | length)
    fail_msg: "Each postgresql_service_allowed_clients item must define: database, user, cidr."

- name: Guardrail - remote listen requires explicit allowed clients
  ansible.builtin.assert:
    that:
      - >-
        (postgresql_service_listen_addresses | difference(['127.0.0.1', 'localhost']) | length) == 0
        or (postgresql_service_allowed_clients | length) > 0
    fail_msg: >-
      Remote listen_addresses set but no allowed clients provided. Define
      postgresql_service_allowed_clients with permitted client CIDRs.

- name: Guardrail - passwords required when creating users
  ansible.builtin.assert:
    that:
      - >-
        (postgresql_service_users
         | selectattr('password', 'defined')
         | map(attribute='password')
         | map('string')
         | map('trim')
         | reject('equalto', '')
         | list
         | length) == (postgresql_service_users | length)
    fail_msg: "Each postgresql_service_users item must provide a non-empty password."
  when: (postgresql_service_users | length) > 0
