---
# purpose: Install and manage Docker Engine and Compose plugin on Linux hosts
# adr: ADR-0602-docker-engine-baseline
# maintainer: HybridOps.Tech

- name: Fail on unsupported OS family
  ansible.builtin.fail:
    msg: >-
      hybridops.common.docker_engine supports Debian/Ubuntu and EL9 (Rocky/RHEL).
      For other distros, install Docker Engine and Compose using your baseline and
      skip this role.
  when:
    - docker_engine_state == "present"
    - ansible_os_family not in ["Debian", "RedHat"]

- name: Install Docker CE repo prerequisites (Debian family)
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  when:
    - ansible_os_family == "Debian"
    - docker_engine_state == "present"

- name: Add Docker GPG key (Debian/Ubuntu)
  ansible.builtin.apt_key:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    state: present
  when:
    - ansible_os_family == "Debian"
    - docker_engine_state == "present"

- name: Configure Docker CE APT repository (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker-ce-stable
  when:
    - ansible_os_family == "Debian"
    - docker_engine_state == "present"

- name: Update APT cache after adding Docker CE repo
  ansible.builtin.apt:
    update_cache: true
  when:
    - ansible_os_family == "Debian"
    - docker_engine_state == "present"

- name: Install Docker Engine and Compose plugin (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: "{{ docker_engine_state }}"
  when:
    - ansible_os_family == "Debian"

- name: Install Docker CE repo prerequisites (EL family)
  ansible.builtin.yum:
    name:
      - yum-utils
      - ca-certificates
      - curl
    state: present
  when:
    - ansible_os_family == "RedHat"
    - docker_engine_state == "present"

- name: Configure Docker CE yum repository (EL family)
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: "Docker CE Stable - $releasever - $basearch"
    baseurl: "https://download.docker.com/linux/centos/$releasever/$basearch/stable"
    gpgcheck: true
    enabled: true
    gpgkey: "https://download.docker.com/linux/centos/gpg"
  when:
    - ansible_os_family == "RedHat"
    - docker_engine_state == "present"

- name: Install Docker Engine and containerd (EL family)
  ansible.builtin.yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: "{{ docker_engine_state }}"
  when:
    - ansible_os_family == "RedHat"

- name: Ensure Docker service state
  ansible.builtin.service:
    name: docker
    state: "{{ (docker_engine_state == 'present') | ternary('started', 'stopped') }}"
    enabled: "{{ (docker_engine_state == 'present') and (docker_engine_enable | bool) }}"
  when:
    - ansible_os_family in ["Debian", "RedHat"]

- name: Ensure users are in docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_engine_users }}"
  when:
    - docker_engine_state == "present"
    - (docker_engine_users | length) > 0

- name: Debug Docker version for evidence (optional)
  ansible.builtin.command: >-
    docker version --format '{{ "{{.Server.Version}}" }}'
  register: docker_engine_version
  changed_when: false
  failed_when: false
  when:
    - docker_engine_state == "present"

- name: Show Docker Engine version (when available)
  ansible.builtin.debug:
    msg: "Docker Engine server version: {{ docker_engine_version.stdout | default('unknown') }}"
  when:
    - docker_engine_state == "present"
    - docker_engine_version is defined
