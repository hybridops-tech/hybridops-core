---
# purpose: Smoke test for hybridops.common.docker_engine on bare Linux hosts
# adr: ADR-0602-docker-engine-baseline

- name: Smoke-test Docker Engine baseline on docker_test hosts
  hosts: cicd_test
  become: true
  gather_facts: true

  vars:
    # Make sure the current SSH user can run docker without sudo after install.
    docker_engine_users:
      - "{{ ansible_user | default('root') }}"

  roles:
    - role: hybridops.common.docker_engine
