---
# purpose: Install and configure PostgreSQL via upstream role
# adr: ADR-0101, ADR-0103
# maintainer: HybridOps.Tech

- name: Validate inputs
  ansible.builtin.include_tasks: validate.yml

- name: Build upstream postgresql.conf options
  ansible.builtin.set_fact:
    postgresql_service_conf:
      - option: port
        value: "{{ postgresql_service_port }}"
      - option: listen_addresses
        value: "{{ postgresql_service_listen_addresses | join(',') }}"
      - option: log_directory
        value: "{{ postgresql_service_log_dir }}"
  changed_when: false

- name: Build HBA host rules from allowed clients
  ansible.builtin.set_fact:
    postgresql_service_hba_host_rules: >-
      {{
        (postgresql_service_hba_host_rules | default([]))
        + [{
          'type': 'host',
          'database': item.database,
          'user': item.user,
          'address': item.cidr,
          'auth_method': postgresql_service_auth_method
        }]
      }}
  loop: "{{ postgresql_service_allowed_clients }}"
  when: (postgresql_service_allowed_clients | length) > 0
  changed_when: false

- name: Assemble final HBA entries
  ansible.builtin.set_fact:
    postgresql_service_hba_entries: >-
      {{ postgresql_service_hba_local_defaults + (postgresql_service_hba_host_rules | default([])) }}
  changed_when: false

- name: Refresh APT metadata before upstream PostgreSQL package install
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ postgresql_service_apt_cache_valid_time }}"
  when:
    - postgresql_service_apt_update_cache | bool
    - ansible_facts.os_family == "Debian"

- name: Run upstream PostgreSQL role
  ansible.builtin.include_role:
    name: geerlingguy.postgresql
  vars:
    postgresql_version: "{{ postgresql_service_version | default(omit) }}"
    postgresql_service_state: "{{ postgresql_service_service_state }}"
    postgresql_service_enabled: "{{ postgresql_service_service_enabled }}"
    postgresql_log_dir: "{{ postgresql_service_log_dir }}"
    postgresql_global_config_options: "{{ postgresql_service_conf + postgresql_service_extra_conf }}"
    postgresql_hba_entries: "{{ postgresql_service_hba_entries }}"
    postgresql_databases: "{{ postgresql_service_databases }}"
    postgresql_users: "{{ postgresql_service_users }}"
    postgresql_privs: "{{ postgresql_service_privs }}"
    postgres_users_no_log: "{{ postgresql_service_users_no_log }}"
  when: postgresql_service_upstream_version is not defined

- name: Run upstream PostgreSQL role with EL10 compatibility overrides
  ansible.builtin.include_role:
    name: geerlingguy.postgresql
  vars:
    postgresql_version: "{{ postgresql_service_version | default(omit) }}"
    postgresql_service_state: "{{ postgresql_service_service_state }}"
    postgresql_service_enabled: "{{ postgresql_service_service_enabled }}"
    postgresql_log_dir: "{{ postgresql_service_log_dir }}"
    postgresql_global_config_options: "{{ postgresql_service_conf + postgresql_service_extra_conf }}"
    postgresql_hba_entries: "{{ postgresql_service_hba_entries }}"
    postgresql_databases: "{{ postgresql_service_databases }}"
    postgresql_users: "{{ postgresql_service_users }}"
    postgresql_privs: "{{ postgresql_service_privs }}"
    postgres_users_no_log: "{{ postgresql_service_users_no_log }}"
    __postgresql_version: "{{ postgresql_service_upstream_version | default(omit) }}"
    __postgresql_data_dir: "{{ postgresql_service_upstream_data_dir | default(omit) }}"
    __postgresql_bin_path: "{{ postgresql_service_upstream_bin_path | default(omit) }}"
    __postgresql_config_path: "{{ postgresql_service_upstream_config_path | default(omit) }}"
    __postgresql_daemon: "{{ postgresql_service_upstream_daemon | default(omit) }}"
    __postgresql_packages: "{{ postgresql_service_upstream_packages | default(omit) }}"
    __postgresql_unix_socket_directories_mode: "{{ postgresql_service_upstream_unix_socket_directories_mode | default(omit) }}"
    postgresql_python_library: "{{ postgresql_service_upstream_python_library | default(omit) }}"
  when: postgresql_service_upstream_version is defined

- name: Evidence
  ansible.builtin.include_tasks: evidence.yml
  when: postgresql_service_evidence_enabled | bool
