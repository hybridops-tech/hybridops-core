---
# purpose: Defaults for dns_routing role (routing intent + optional manual command apply)
# maintainer: HybridOps.Studio

dns_state: present
dns_state_dir: /opt/hybridops/dns-routing/state
dns_intent_file: latest.json

provider: manual-command
zone: ""
record_fqdn: ""
record_type: "A"
ttl: 60
primary_targets: []
secondary_targets: []
desired: primary

powerdns_api_url: ""
powerdns_server_id: "localhost"
powerdns_zone_id: ""
powerdns_api_key_env: "POWERDNS_API_KEY"
powerdns_validate_tls: true
powerdns_account: "hyops"
powerdns_comment: ""

dry_run: true
dns_apply: false
provider_command: ""
