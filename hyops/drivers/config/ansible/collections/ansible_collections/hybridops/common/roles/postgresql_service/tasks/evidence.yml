---
# purpose: Capture evidence for PostgreSQL deployment and health
# adr: ADR-0000 (evidence strategy), ADR-0103
# maintainer: HybridOps.Tech

- name: Ensure evidence directory exists
  ansible.builtin.file:
    path: "{{ hybridops_evidence_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Build PostgreSQL service name list
  ansible.builtin.set_fact:
    _hyops_pg_service_names: >-
      {{
        ['postgresql']
        + (
            ['postgresql-' ~ hybridops_postgres_version]
            if (hybridops_postgres_version is string and (hybridops_postgres_version | length) > 0)
            else []
          )
      }}
  changed_when: false

- name: Write service status
  ansible.builtin.copy:
    dest: "{{ hybridops_evidence_dir }}/systemctl-status.txt"
    content: |
      {% for service_name in _hyops_pg_service_names | default([]) %}
      === {{ service_name }} ===
      found={{ service_name in (ansible_facts.services | default({})) }}
      {{ (ansible_facts.services | default({})).get(service_name, {}) | to_nice_json }}
      {% endfor %}
    owner: root
    group: root
    mode: "0640"

- name: Check pg_isready availability
  ansible.builtin.command: "command -v pg_isready"
  register: _pg_isready_bin
  changed_when: false
  failed_when: false

- name: Capture readiness
  ansible.builtin.command: "pg_isready -p {{ hybridops_postgres_port }}"
  register: _pg_ready
  changed_when: false
  failed_when: false
  when: (_pg_isready_bin.rc | default(1)) == 0

- name: Write readiness
  ansible.builtin.copy:
    dest: "{{ hybridops_evidence_dir }}/pg_isready.txt"
    content: |-
      {{ _pg_ready.stdout | default('') }}

      {{ _pg_ready.stderr | default('') }}
    owner: root
    group: root
    mode: "0640"
  when: (_pg_isready_bin.rc | default(1)) == 0

- name: Write evidence timestamp
  ansible.builtin.copy:
    dest: "{{ hybridops_evidence_dir }}/timestamp.txt"
    content: "{{ ansible_date_time.iso8601 }}\n"
    owner: root
    group: root
    mode: "0640"
