---
- name: Preflight | assert supported state
  ansible.builtin.assert:
    that:
      - docker_compose_stack_state in ["present", "absent"]
      - (docker_compose_stack_service_name | default("") | length) > 0
      - (docker_compose_stack_compose_path | default("") | length) > 0
    fail_msg: >-
      docker_compose_stack requires state=present|absent, a non-empty service name,
      and a non-empty compose path.

- name: Stop compose stack service (absent)
  ansible.builtin.service:
    name: "{{ docker_compose_stack_service_name }}"
    state: stopped
    enabled: false
  when: docker_compose_stack_state == "absent"
  failed_when: false

- name: Remove compose stack unit (absent)
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ docker_compose_stack_service_name }}.service"
    state: absent
  when: docker_compose_stack_state == "absent"

- name: Systemd | reload after absent cleanup
  ansible.builtin.systemd:
    daemon_reload: true
  when: docker_compose_stack_state == "absent"

- name: Render compose stack systemd unit with restart notify
  ansible.builtin.template:
    src: docker-compose-stack.service.j2
    dest: "/etc/systemd/system/{{ docker_compose_stack_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  when:
    - docker_compose_stack_state == "present"
    - (docker_compose_stack_notify_handler | default("") | length) > 0
  notify: "{{ docker_compose_stack_notify_handler }}"

- name: Render compose stack systemd unit without restart notify
  ansible.builtin.template:
    src: docker-compose-stack.service.j2
    dest: "/etc/systemd/system/{{ docker_compose_stack_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  when:
    - docker_compose_stack_state == "present"
    - (docker_compose_stack_notify_handler | default("") | length) == 0

- name: Systemd | reload after unit render
  ansible.builtin.systemd:
    daemon_reload: true
  when: docker_compose_stack_state == "present"

- name: Pull compose stack images
  ansible.builtin.command:
    cmd: >-
      docker compose
      {% if (docker_compose_stack_project_name | default('') | length) > 0 %}
      --project-name "{{ docker_compose_stack_project_name }}"
      {% endif %}
      {% if (docker_compose_stack_env_file | default('') | length) > 0 %}
      --env-file "{{ docker_compose_stack_env_file }}"
      {% endif %}
      -f "{{ docker_compose_stack_compose_path }}"
      pull
    chdir: "{{ docker_compose_stack_workdir }}"
  when:
    - docker_compose_stack_state == "present"
    - docker_compose_stack_pull | bool
  changed_when: false

- name: Ensure compose stack service is enabled and started
  ansible.builtin.service:
    name: "{{ docker_compose_stack_service_name }}"
    state: started
    enabled: true
  when: docker_compose_stack_state == "present"
