---
- name: Test API login endpoint
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/auth/login"
    method: POST
    body_format: json
    body:
      username: "{{ eveng_admin_username | default('admin') }}"
      password: "{{ eveng_admin_password | default('eve') }}"
    status_code: [200, 400]
    return_content: true
    validate_certs: false
    timeout: 10
  register: api_login
  failed_when: false
  tags:
    - health_api

- name: Set API authentication result
  ansible.builtin.set_fact:
    health_check_results: >-
      {{
        health_check_results
        | combine(
            {
              'api': health_check_results.api
              | combine({'authentication': auth_result})
            },
            recursive=True
          )
      }}
  vars:
    auth_result:
      success: "{{ (api_login.status | default(0) | int) == 200 }}"
      cookie_present: >-
        {{
          'unetlab_session' in (api_login.cookies | default({}))
          or 'set-cookie' in (api_login.cookies | default({}))
        }}
  tags:
    - health_api

- name: Extract session cookie
  ansible.builtin.set_fact:
    api_session_cookie: "{{ api_login.cookies.unetlab_session }}"
  when: (api_login.status | default(0) | int) == 200
  tags:
    - health_api

- name: Test API status endpoint (authenticated)
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/status"
    method: GET
    headers:
      Cookie: "unetlab_session={{ api_session_cookie }}"
    status_code: [200, 401, 412]
    return_content: true
    validate_certs: false
    timeout: 10
  register: api_status
  failed_when: false
  when: (api_login.status | default(0) | int) == 200
  tags:
    - health_api

- name: Test API folders endpoint (authenticated)
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/folders/"
    method: GET
    headers:
      Cookie: "unetlab_session={{ api_session_cookie }}"
    status_code: [200, 401]
    return_content: true
    validate_certs: false
    timeout: 10
  register: api_folders
  failed_when: false
  when: (api_login.status | default(0) | int) == 200
  tags:
    - health_api

- name: Set API endpoints status
  ansible.builtin.set_fact:
    health_check_results: >-
      {{
        health_check_results
        | combine(
            {
              'api': health_check_results.api
              | combine(
                  {
                    'endpoints': endpoints_status,
                    'reachable': api_reachable
                  }
                )
            },
            recursive=True
          )
      }}
  vars:
    endpoints_status:
      login: "{{ (api_login.status | default(0) | int) == 200 }}"
      status: "{{ (api_status.status | default(0) | int) == 200 }}"
      folders: "{{ (api_folders.status | default(0) | int) == 200 }}"
    api_reachable: "{{ (api_login.status | default(0) | int) in [200, 400] }}"
  tags:
    - health_api

- name: Set API overall status
  ansible.builtin.set_fact:
    health_check_results: >-
      {{
        health_check_results
        | combine(
            {
              'api': health_check_results.api
              | combine({'status': api_status_result})
            },
            recursive=True
          )
      }}
  vars:
    api_status_result: >-
      {{
        'pass'
        if (
          (health_check_results.api.reachable | default(false) | bool)
          and (health_check_results.api.authentication.success | default(false) | bool)
          and (health_check_results.api.endpoints.status | default(false) | bool)
          and (health_check_results.api.endpoints.folders | default(false) | bool)
        )
        else 'fail'
      }}
  tags:
    - health_api

- name: API health summary
  ansible.builtin.debug:
    msg:
      - "API reachable: {{ health_check_results.api.reachable }}"
      - "Login: {{ 'OK' if (health_check_results.api.authentication.success | bool) else 'FAILED' }}"
      - "Status endpoint: {{ 'OK' if (health_check_results.api.endpoints.status | bool) else 'FAILED' }}"
      - "Folders endpoint: {{ 'OK' if (health_check_results.api.endpoints.folders | bool) else 'FAILED' }}"
  when: (health_check_report_format | default('') | string) == 'detailed'
  tags:
    - health_api
