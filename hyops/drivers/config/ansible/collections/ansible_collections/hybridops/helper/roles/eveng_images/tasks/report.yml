---
# purpose: Build per-run image report and controller logs for EVE-NG images
# maintainer: HybridOps.Tech

- name: Ensure run timestamp is set
  ansible.builtin.set_fact:
    eveng_images_run_at: "{{ eveng_images_run_at | default(ansible_date_time.iso8601) }}"

- name: Derive run identifier
  ansible.builtin.set_fact:
    eveng_images_run_id: "{{ eveng_images_run_at | regex_replace('[^0-9]', '') }}"

- name: Normalise corrupt files fact
  ansible.builtin.set_fact:
    eveng_images_corrupt_files: "{{ eveng_images_corrupt_files | default([]) }}"

- name: Compute controller output directories and log path
  ansible.builtin.set_fact:
    eveng_images_log_dir_controller: >-
      {{
        eveng_images_log_dir_controller
        | default((playbook_dir | default('.', true)) ~ '/var/log/hybridops/eveng-images')
      }}
    eveng_images_report_dir_controller: >-
      {{
        eveng_images_report_dir_controller
        | default((playbook_dir | default('.', true)) ~ '/var/lib/hybridops/reports/eveng-images')
      }}
    eveng_images_download_log: >-
      {{
        eveng_images_download_log
        | default(eveng_images_log_dir_controller ~ '/downloads-' ~ inventory_hostname ~ '.log')
      }}

- name: Ensure controller log directory exists
  ansible.builtin.file:
    path: "{{ eveng_images_log_dir_controller }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  run_once: true

- name: Ensure controller report directory exists
  ansible.builtin.file:
    path: "{{ eveng_images_report_dir_controller }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  run_once: true

- name: Build image report entries
  ansible.builtin.set_fact:
    eveng_images_report_files: >-
      {{
        (eveng_images_report_files | default([]))
        + [
          {
            'name': item.path | basename,
            'path': item.path,
            'size_bytes': item.size,
            'type': (
              eveng_images_list | default([])
              | selectattr('name', 'defined')
              | selectattr('name', 'equalto', item.path | basename)
              | map(attribute='type')
              | first
              | default('unknown')
            ),
            'source_url': (
              eveng_images_list | default([])
              | selectattr('name', 'defined')
              | selectattr('name', 'equalto', item.path | basename)
              | map(attribute='url')
              | first
              | default('')
            ),
            'status': (
              'corrupt'
              if item.path in (eveng_images_corrupt_files | default([]))
              else 'ok'
            )
          }
        ]
      }}
  loop: "{{ eveng_downloaded_files | default([]) }}"
  when: eveng_downloaded_files is defined

- name: Normalise report files list
  ansible.builtin.set_fact:
    eveng_images_report_files: "{{ eveng_images_report_files | default([]) }}"

- name: Build report document
  ansible.builtin.set_fact:
    eveng_images_report_document:
      run_at: "{{ eveng_images_run_at }}"
      host: "{{ inventory_hostname }}"
      cache_dir: "{{ eveng_images_cache_dir }}"
      files: "{{ eveng_images_report_files }}"

- name: Compute report file paths
  ansible.builtin.set_fact:
    eveng_images_report_run_path: >-
      {{ eveng_images_report_dir_controller }}/report-{{ inventory_hostname }}-{{ eveng_images_run_id }}.yml
    eveng_images_report_latest_host_path: >-
      {{ eveng_images_report_dir_controller }}/report-{{ inventory_hostname }}.yml
    eveng_images_report_latest_link_path: >-
      {{ eveng_images_report_dir_controller }}/latest.yml

- name: Write per-run report on controller
  ansible.builtin.copy:
    dest: "{{ eveng_images_report_run_path }}"
    mode: "0644"
    content: "{{ eveng_images_report_document | to_nice_yaml }}"
  delegate_to: localhost
  become: false

- name: Write latest host report on controller
  ansible.builtin.copy:
    dest: "{{ eveng_images_report_latest_host_path }}"
    mode: "0644"
    content: "{{ eveng_images_report_document | to_nice_yaml }}"
  delegate_to: localhost
  become: false

- name: Point latest.yml symlink at latest host report
  ansible.builtin.file:
    state: link
    src: "{{ eveng_images_report_latest_host_path }}"
    dest: "{{ eveng_images_report_latest_link_path }}"
    force: true
  delegate_to: localhost
  become: false

- name: Append summary line to controller log
  ansible.builtin.lineinfile:
    path: "{{ eveng_images_download_log }}"
    create: true
    mode: "0644"
    insertafter: EOF
    line: >-
      {{ eveng_images_run_at }} [{{ inventory_hostname }}]
      images={{ eveng_images_report_files | length }}
      corrupt={{ eveng_images_corrupt_count }}
      cache={{ eveng_images_cache_dir }}
      files={{ eveng_images_files_csv }}
      corrupt_files={{ eveng_images_corrupt_files_csv }}
  vars:
    eveng_images_corrupt_count: >-
      {{
        eveng_images_report_files
        | selectattr('status', 'equalto', 'corrupt')
        | list
        | length
      }}
    eveng_images_files_csv: >-
      {{
        eveng_images_report_files
        | map(attribute='name')
        | join(',')
      }}
    eveng_images_corrupt_files_csv: >-
      {{
        eveng_images_report_files
        | selectattr('status', 'equalto', 'corrupt')
        | map(attribute='name')
        | join(',')
      }}
  delegate_to: localhost
  become: false
  when: eveng_images_logging_enabled | default(true) | bool
