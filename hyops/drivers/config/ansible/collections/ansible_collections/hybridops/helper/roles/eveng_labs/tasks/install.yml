# purpose: Install staged labs into EVE-NG lab folders
# maintainer: HybridOps.Tech

- name: Ensure staging directory exists
  stat:
    path: "{{ eveng_labs_staging_dir }}"
  register: eveng_labs_staging_stat

- name: Fail when staging directory is missing
  fail:
    msg: "Staging directory not found or empty: {{ eveng_labs_staging_dir }}"
  when: not eveng_labs_staging_stat.stat.exists

- name: Install labs from staging into target directory
  shell: |
    set -e
    SRC="{{ eveng_labs_staging_dir }}/"
    DEST_BASE="/opt/unetlab/labs"

    if [ "{{ eveng_lab_folders | default([]) | length }}" -gt 0 ]; then
      for folder in {{ eveng_lab_folders | default([]) | join(' ') }}; do
        DEST="${DEST_BASE}/${folder}"
        mkdir -p "$DEST"
        rsync -a "$SRC" "$DEST"/
      done
    else
      rsync -a "$SRC" "${DEST_BASE}/"
    fi
  args:
    executable: /bin/bash
  changed_when: true
