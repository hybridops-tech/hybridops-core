# purpose: Database health checks for eveng_healthcheck
# maintainer: HybridOps.Tech
---
- name: Check if EVE-NG database exists
  ansible.builtin.command: mysql -e "SHOW DATABASES LIKE 'eve_ng_db';"
  register: db_exists
  changed_when: false
  failed_when: false
  tags:
    - health_database
    - db_check

- name: Verify database exists
  ansible.builtin.set_fact:
    health_check_results: >-
      {{
        health_check_results
        | combine(
            {'database': health_check_results.database | combine({'exists': db_present})},
            recursive=True
          )
      }}
  vars:
    db_present: "{{ 'eve_ng_db' in db_exists.stdout }}"
  tags:
    - health_database

- name: Count database tables
  ansible.builtin.command: >-
    mysql eve_ng_db -e
    "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='eve_ng_db';"
  register: table_count
  changed_when: false
  failed_when: false
  when: "'eve_ng_db' in db_exists.stdout"
  tags:
    - health_database
    - db_tables

- name: Set table count
  ansible.builtin.set_fact:
    health_check_results: >-
      {{
        health_check_results
        | combine(
            {'database': health_check_results.database | combine({'table_count': tables})},
            recursive=True
          )
      }}
  vars:
    tables: "{{ table_count.stdout_lines[-1] if (table_count.stdout_lines | length) > 0 else '0' }}"
  when: "'eve_ng_db' in db_exists.stdout"
  tags:
    - health_database
    - db_tables

- name: Check critical tables exist
  ansible.builtin.command: mysql eve_ng_db -e "SHOW TABLES LIKE '{{ item }}';"
  register: table_check
  changed_when: false
  failed_when: false
  loop:
    - users
    - pods
    - html5
  when: "'eve_ng_db' in db_exists.stdout"
  tags:
    - health_database
    - db_tables

- name: Set critical tables status
  ansible.builtin.set_fact:
    health_check_results: >-
      {{
        health_check_results
        | combine(
            {'database': health_check_results.database | combine({'critical_tables': tables_present})},
            recursive=True
          )
      }}
  vars:
    tables_present:
      users: "{{ 'users' in table_check.results[0].stdout }}"
      pods: "{{ 'pods' in table_check.results[1].stdout }}"
      html5: "{{ 'html5' in table_check.results[2].stdout }}"
  when: "'eve_ng_db' in db_exists.stdout"
  tags:
    - health_database
    - db_tables

- name: Check admin user exists
  ansible.builtin.command: mysql eve_ng_db -e "SELECT COUNT(*) FROM users WHERE username='admin';"
  register: admin_check
  changed_when: false
  failed_when: false
  when: "'eve_ng_db' in db_exists.stdout"
  tags:
    - health_database
    - db_users

- name: Set admin user status
  ansible.builtin.set_fact:
    health_check_results: >-
      {{
        health_check_results
        | combine(
            {'database': health_check_results.database | combine({'admin_user_exists': admin_present})},
            recursive=True
          )
      }}
  vars:
    admin_present: >-
      {{
        (admin_check.stdout_lines[-1] | int) > 0
        if (admin_check.stdout_lines | length) > 0
        else false
      }}
  when: "'eve_ng_db' in db_exists.stdout"
  tags:
    - health_database
    - db_users

- name: Set database status
  ansible.builtin.set_fact:
    health_check_results: >-
      {{
        health_check_results
        | combine(
            {'database': health_check_results.database | combine({'status': db_status})},
            recursive=True
          )
      }}
  vars:
    db_status: >-
      {{
        'pass'
        if (
          health_check_results.database.exists
          and ((health_check_results.database.table_count | int) >= 3)
          and health_check_results.database.admin_user_exists
        )
        else 'fail'
      }}
  tags:
    - health_database

- name: Database health summary
  ansible.builtin.debug:
    msg:
      - "Database exists: {{ health_check_results.database.exists }}"
      - "Tables: {{ health_check_results.database.table_count | default(0) }}"
      - >-
        Admin user: {{ 'OK' if (health_check_results.database.admin_user_exists | default(false)) else 'MISSING' }}
  when: health_check_report_format == 'detailed'
  tags:
    - health_database
