---
# EVE-NG health check entry point

- name: Initialize health check results
  ansible.builtin.set_fact:
    health_check_results:
      services: {}
      database: {}
      api: {}
      virtualization: {}
      images: {}
      labs: {}
      overall_status: "unknown"
  tags:
    - always

- name: Service health checks
  ansible.builtin.include_tasks: services.yml
  when: health_check_services | bool
  tags:
    - health
    - health_services
    - services

- name: Database health checks
  ansible.builtin.include_tasks: database.yml
  when: health_check_database | bool
  tags:
    - health
    - health_database
    - database

- name: API health checks
  ansible.builtin.include_tasks: api.yml
  when: health_check_api | bool
  tags:
    - health
    - health_api
    - api

- name: Virtualization health checks
  ansible.builtin.include_tasks: virtualization.yml
  when: health_check_kvm | bool
  tags:
    - health
    - health_virtualization
    - virtualization
    - kvm

- name: Image health checks
  ansible.builtin.include_tasks: images.yml
  when:
    - health_check_images | bool
    - health_check_level in ['images', 'full']
  tags:
    - health
    - health_images
    - images

- name: Lab health checks
  ansible.builtin.include_tasks: labs.yml
  when:
    - health_check_labs | bool
    - health_check_level == 'full'
  tags:
    - health
    - health_labs
    - labs

- name: Generate health report
  ansible.builtin.include_tasks: report.yml
  tags:
    - always
    - report
