---
# Main orchestrator for EVE-NG image deployment

- name: Ensure EVE-NG directories exist
  file:
    path: "/opt/unetlab/addons/{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - qemu
    - iol
    - iol/bin
    - iol/lib
    - dynamips

- name: Download images
  include_tasks: "download-{{ eveng_images_source }}.yml"
  when: eveng_images_download | default(true)

- name: Install images
  include_tasks: install.yml
  when: eveng_images_install | default(true)
