---
# file: roles/eveng_labs/tasks/source-git.yml
# purpose: Stage labs from git repository
# maintainer: HybridOps.Tech

- name: Ensure git is installed
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: true

- name: Clear staging directory
  ansible.builtin.file:
    path: "{{ eveng_labs_staging_dir }}"
    state: absent

- name: Recreate staging directory
  ansible.builtin.file:
    path: "{{ eveng_labs_staging_dir }}"
    state: directory
    mode: "0755"

- name: Clone labs repository into staging
  ansible.builtin.git:
    repo: "{{ eveng_labs_git_repo }}"
    dest: "{{ eveng_labs_staging_dir }}"
    version: "{{ eveng_labs_git_branch | default('main') }}"
    force: true
