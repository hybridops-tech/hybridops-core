---
- name: Verify
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Run healthcheck role
      ansible.builtin.include_role:
        name: eveng_healthcheck
      vars:
        health_check_fail_on_warning: true

    - name: Display health status
      ansible.builtin.debug:
        msg: "Health Status: {{ health_check_results.overall_status }}"

    - name: Fail if unhealthy
      ansible.builtin.fail:
        msg: "EVE-NG health check failed"
      when: health_check_results.overall_status != 'HEALTHY'
