---
# purpose: Preflight checks for NetBox deployment (runtime availability, dependency reachability, and port conflicts)
# adr: ADR-0002, ADR-0501, ADR-0502
# maintainer: HybridOps.Tech

- name: Require docker CLI
  ansible.builtin.command: docker --version
  register: netbox_service_docker_cli
  changed_when: false

- name: Require docker compose plugin
  ansible.builtin.command: docker compose version
  register: netbox_service_compose_version
  changed_when: false

- name: Preflight - DB TCP reachable (required)
  when:
    - netbox_service_require_db | bool
    - not netbox_service_smoke_only | bool
  block:
    - name: Wait for PostgreSQL to be reachable
      ansible.builtin.wait_for:
        host: "{{ netbox_service_db_host }}"
        port: "{{ netbox_service_db_port }}"
        state: started
        timeout: "{{ netbox_service_db_connect_timeout }}"
  rescue:
    - name: Fail fast when DB is required but unreachable
      ansible.builtin.fail:
        msg: "NetBox requires PostgreSQL but {{ netbox_service_db_host }}:{{ netbox_service_db_port }} is not reachable."

- name: Preflight - detect local HTTP port conflicts
  ansible.builtin.command: >-
    ss -ltnpH state listen sport = :{{ netbox_service_http_host_port }}
  register: netbox_service_port_check
  changed_when: false
  failed_when: false
  when:
    - netbox_service_enabled | bool
    - not netbox_service_smoke_only | bool
    - netbox_service_preflight_port_conflict_policy != "ignore"

- name: Preflight - report local HTTP port conflict
  ansible.builtin.debug:
    msg: >-
      Port {{ netbox_service_http_host_port }} is already in use on this host:
      {{ netbox_service_port_check.stdout | default('') }}
  when:
    - netbox_service_enabled | bool
    - not netbox_service_smoke_only | bool
    - netbox_service_preflight_port_conflict_policy != "ignore"
    - (netbox_service_port_check.stdout | default('') | trim | length) > 0

- name: Preflight - fail on local HTTP port conflict
  ansible.builtin.fail:
    msg: >-
      Port {{ netbox_service_http_host_port }} is already in use. Set netbox_service_http_host_port to a free port or stop the
      conflicting service.
  when:
    - netbox_service_enabled | bool
    - not netbox_service_smoke_only | bool
    - netbox_service_preflight_port_conflict_policy == "fail"
    - (netbox_service_port_check.stdout | default('') | trim | length) > 0
