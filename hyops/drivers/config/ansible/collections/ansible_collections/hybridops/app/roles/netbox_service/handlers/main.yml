---
# purpose: Handlers for NetBox compose lifecycle
# maintainer: HybridOps.Tech

- name: Restart NetBox
  ansible.builtin.command:
    cmd: >-
      docker compose
      --project-name "{{ netbox_service_compose_project }}"
      --env-file "{{ netbox_service_install_root }}/compose/netbox.env"
      -f "{{ netbox_service_install_root }}/compose/docker-compose.yml"
      up -d
    chdir: "{{ netbox_service_install_root }}/compose"
  changed_when: true
  when:
    - netbox_service_enabled | bool
    - not netbox_service_smoke_only | bool

- name: Wait for NetBox readiness after restart
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/readiness.yml"
  listen: Restart NetBox
  when:
    - netbox_service_enabled | bool
    - not netbox_service_smoke_only | bool
