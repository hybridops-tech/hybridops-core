---
# purpose: Role metadata for netbox_service
# maintainer: HybridOps.Studio

galaxy_info:
  role_name: netbox_service
  namespace: hybridops
  author: HybridOps.Studio
  description: Deploy NetBox via Docker Compose.
  license: MIT-0
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions: ["9"]
    - name: Ubuntu
      versions: ["22.04", "24.04"]

dependencies:
  - role: hybridops.common.docker_engine
    when: netbox_install_docker_engine | bool
