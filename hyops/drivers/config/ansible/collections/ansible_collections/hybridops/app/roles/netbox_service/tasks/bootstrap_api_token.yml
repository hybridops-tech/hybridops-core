---
# purpose: Ensure a stable NetBox API token exists for automation (idempotent)
# adr: ADR-0002, ADR-0502
# maintainer: HybridOps.Tech

- name: Ensure NetBox API token exists
  ansible.builtin.command:
    cmd: >-
      docker compose
      --project-name "{{ netbox_service_compose_project }}"
      --env-file "{{ netbox_service_install_root }}/compose/netbox.env"
      -f "{{ netbox_service_install_root }}/compose/docker-compose.yml"
      exec -T netbox
      /opt/netbox/venv/bin/python
      /opt/netbox/netbox/manage.py shell -c
      "from django.contrib.auth import get_user_model; import importlib, importlib.util, sys;
      U=get_user_model(); username='{{ netbox_service_api_token_username }}';
      key='{{ netbox_service_api_token_key }}'; desc='{{ netbox_service_api_token_description }}';
      write_enabled={{ 'True' if netbox_service_api_token_write_enabled | bool else 'False' }};
      mod=('users.models' if importlib.util.find_spec('users.models') else 'rest_framework.authtoken.models');
      Token=getattr(importlib.import_module(mod), 'Token');
      u=U.objects.get(username=username); tok=Token.objects.filter(key=key).first();
      conflict=bool(tok and hasattr(tok, 'user_id') and tok.user_id != u.id);
      conflict and (print('conflict') or sys.exit(2));
      hasattr(Token, 'description') and Token.objects.filter(user=u, description=desc).exclude(key=key).delete();
      tok and (print('exists') or sys.exit(0));
      kwargs={'user': u, 'key': key};
      hasattr(Token, 'write_enabled') and kwargs.update({'write_enabled': write_enabled});
      hasattr(Token, 'description') and kwargs.update({'description': desc});
      Token.objects.create(**kwargs); print('created')"
  args:
    chdir: "{{ netbox_service_install_root }}/compose"
  register: netbox_service_token
  failed_when: netbox_service_token.rc | int not in [0, 2]
  changed_when: "'created' in (netbox_service_token.stdout | default(''))"

- name: Fail on token key conflict
  ansible.builtin.fail:
    msg: >-
      NetBox API token key conflict: the provided key already exists for a different user.
      Choose a different NETBOX_API_TOKEN (or rotate it) and re-run.
  when: netbox_service_token.rc | int == 2
