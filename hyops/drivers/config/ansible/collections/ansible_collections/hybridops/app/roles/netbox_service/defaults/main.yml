---
# purpose: Default variables for NetBox deployment (Docker Compose)
# adr: ADR-0002, ADR-0501, ADR-0502
# maintainer: HybridOps.Tech

netbox_service_version: "{{ netbox_version | default('v4.1.7') }}"

netbox_service_preflight_port_conflict_policy: "{{ netbox_preflight_port_conflict_policy | default('warn') }}"  # warn|fail|ignore

netbox_service_smoke_only: "{{ netbox_smoke_only | default(false) }}"
netbox_service_install_docker_engine: "{{ netbox_install_docker_engine | default(true) }}"

netbox_service_compose_project: "{{ netbox_compose_project | default('netbox') }}"
netbox_service_install_root: "{{ netbox_install_root | default('/opt/netbox') }}"
netbox_service_data_root: "{{ netbox_data_root | default('/var/lib/netbox') }}"

netbox_service_hostname: "{{ netbox_hostname | default('netbox') }}"
netbox_service_domain: "{{ netbox_domain | default('hybridops.local') }}"
netbox_service_base_url: "{{ netbox_base_url | default('') }}"
netbox_service_http_host_port: "{{ netbox_http_host_port | default(8000) }}"

netbox_service_require_db: "{{ netbox_require_db | default(true) }}"
netbox_service_db_host: "{{ netbox_db_host | default('') }}"
netbox_service_db_port: "{{ netbox_db_port | default(5432) }}"
netbox_service_db_name: "{{ netbox_db_name | default('netbox') }}"
netbox_service_db_user: "{{ netbox_db_user | default('netbox') }}"
netbox_service_db_password: "{{ netbox_db_password | default('') }}"
netbox_service_db_connect_timeout: "{{ netbox_db_connect_timeout | default(3) }}"

netbox_service_redis_host: "{{ netbox_redis_host | default('redis') }}"
netbox_service_redis_port: "{{ netbox_redis_port | default(6379) }}"
netbox_service_redis_password: "{{ netbox_redis_password | default('') }}"
# redis:7-alpine uses a non-root user in the container; the bind-mounted data
# directory must be writable or Redis enters MISCONF and NetBox fails writes.
netbox_service_redis_data_owner: "{{ netbox_redis_data_owner | default('999') }}"
netbox_service_redis_data_group: "{{ netbox_redis_data_group | default('999') }}"
netbox_service_redis_data_mode: "{{ netbox_redis_data_mode | default('0750') }}"

netbox_service_secret_key: "{{ netbox_secret_key | default('') }}"

netbox_service_allowed_hosts: >-
  {{
    netbox_allowed_hosts
    | default([
        netbox_service_hostname ~ '.' ~ netbox_service_domain,
        netbox_service_hostname
      ])
  }}
# The role also auto-adds ansible_host/inventory_hostname to ALLOWED_HOSTS at render time,
# so bootstrap access by IP works before DNS is in place.

netbox_service_superuser_name: "{{ netbox_superuser_name | default('admin') }}"
netbox_service_superuser_email: "{{ netbox_superuser_email | default('admin@example.invalid') }}"
netbox_service_superuser_password: "{{ netbox_superuser_password | default('') }}"
# When true, apply reconciles the existing NetBox superuser password to the
# configured/vault value so bootstrap credentials remain deterministic.
netbox_service_superuser_password_enforce: "{{ netbox_superuser_password_enforce | default(true) }}"

netbox_service_api_token_key: "{{ netbox_api_token_key | default('') }}"
netbox_service_api_token_username: "{{ netbox_api_token_username | default(netbox_service_superuser_name) }}"
netbox_service_api_token_description: "{{ netbox_api_token_description | default('hyops') }}"
netbox_service_api_token_write_enabled: "{{ netbox_api_token_write_enabled | default(true) }}"

netbox_service_compose_pull: "{{ netbox_compose_pull | default(true) }}"
netbox_service_enabled: true

netbox_service_readiness_enabled: "{{ netbox_readiness_enabled | default(true) }}"
netbox_service_readiness_url: >-
  {{
    netbox_readiness_url
    | default(
        'http://127.0.0.1:'
        ~ (netbox_service_http_host_port | string)
        ~ (netbox_service_base_url | string)
        ~ '/api/'
      )
  }}
netbox_service_readiness_retries: "{{ netbox_readiness_retries | default(80) }}"
netbox_service_readiness_delay: "{{ netbox_readiness_delay | default(3) }}"
