---
# purpose: Wait for NetBox API readiness (migrations complete)
# adr: ADR-0002
# maintainer: HybridOps.Tech

- name: Wait for NetBox API readiness
  block:
    - name: Wait for NetBox API readiness
      ansible.builtin.uri:
        url: "{{ netbox_service_readiness_url }}"
        method: GET
        status_code: [200, 302, 401, 403]
        return_content: false
      register: netbox_service_readiness
      retries: "{{ netbox_service_readiness_retries }}"
      delay: "{{ netbox_service_readiness_delay }}"
      until: netbox_service_readiness.status in [200, 302, 401, 403]
      changed_when: false
  rescue:
    - name: Collect docker compose ps (best effort)
      ansible.builtin.command: "docker compose -p {{ netbox_service_compose_project }} ps --all"
      args:
        chdir: "{{ netbox_service_install_root }}/compose"
      register: netbox_service_compose_ps
      changed_when: false
      failed_when: false

    - name: Collect docker compose logs (best effort)
      ansible.builtin.command: "docker compose -p {{ netbox_service_compose_project }} logs --no-color --tail 200"
      args:
        chdir: "{{ netbox_service_install_root }}/compose"
      register: netbox_service_compose_logs
      changed_when: false
      failed_when: false

    - name: Show docker compose ps
      ansible.builtin.debug:
        var: netbox_service_compose_ps.stdout_lines

    - name: Show docker compose logs
      ansible.builtin.debug:
        var: netbox_service_compose_logs.stdout_lines

    - name: Fail readiness
      ansible.builtin.fail:
        msg: >-
          NetBox readiness failed within the configured wait window; see docker compose ps/logs in task output.
          If this is a first bootstrap on a clean database, increase netbox_service_readiness_retries or
          netbox_service_readiness_delay.
