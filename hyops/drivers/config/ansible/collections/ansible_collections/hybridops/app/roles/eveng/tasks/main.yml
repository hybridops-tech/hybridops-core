---
# Main task entry point for EVE-NG role

- name: Apply resource profile
  ansible.builtin.include_tasks: "profile-{{ eveng_resource_profile }}.yml"
  when:
    - eveng_resource_profile in ["minimal", "performance"]
    - eveng_configure_php | bool
  tags:
    - eveng
    - install
    - config

- name: Install and configure EVE-NG
  ansible.builtin.include_tasks: setup.yml
  tags:
    - eveng
    - install
    - setup

- name: Manage additional users
  ansible.builtin.include_tasks: users.yml
  when:
    - eveng_users is defined
    - eveng_users | length > 0
  tags:
    - eveng
    - users
