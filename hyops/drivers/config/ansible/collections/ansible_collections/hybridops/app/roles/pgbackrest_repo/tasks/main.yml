---

- name: Normalize backend
  ansible.builtin.set_fact:
    _hyops_pgbackrest_backend: >-
      {{
        'gcs' if (backend | string | lower) in ['gcs', 'gcp'] else
        'azure' if (backend | string | lower) in ['azure', 'azblob', 'blob'] else
        's3' if (backend | string | lower) in ['s3'] else
        ''
      }}
  changed_when: false

- name: "Preflight: validate backend"
  ansible.builtin.assert:
    that:
      - (_hyops_pgbackrest_backend | string | length) > 0
    fail_msg: >-
      inputs.backend is invalid. Supported backends: s3, gcs, azure.

- name: Normalize secondary repo toggle and defaults
  ansible.builtin.set_fact:
    _hyops_pgbackrest_secondary_enabled: "{{ secondary_enabled | default(false) | bool }}"
    _hyops_pgbackrest_secondary_repo_path: "{{ (secondary_repo_path | default('') | string) if (secondary_repo_path | default('') | string | length) > 0 else (repo_path | string) }}"
  changed_when: false

- name: Normalize secondary backend
  ansible.builtin.set_fact:
    _hyops_pgbackrest_secondary_backend: >-
      {{
        'gcs' if (secondary_backend | string | lower) in ['gcs', 'gcp'] else
        'azure' if (secondary_backend | string | lower) in ['azure', 'azblob', 'blob'] else
        's3' if (secondary_backend | string | lower) in ['s3'] else
        ''
      }}
  changed_when: false
  when: _hyops_pgbackrest_secondary_enabled

- name: "Preflight: validate secondary backend"
  ansible.builtin.assert:
    that:
      - (_hyops_pgbackrest_secondary_backend | string | length) > 0
    fail_msg: >-
      inputs.secondary_backend is required when inputs.secondary_enabled=true
      and must be one of: s3, gcs, azure.
  when: _hyops_pgbackrest_secondary_enabled

- name: "Preflight: validate S3 settings"
  ansible.builtin.assert:
    that:
      - (s3_bucket | string | length) > 0
    fail_msg: >-
      Missing required inputs for S3 pgBackRest repository.
      Required: inputs.s3_bucket (non-empty).
  when: _hyops_pgbackrest_backend == 's3'

- name: "Preflight: validate GCS settings"
  ansible.builtin.assert:
    that:
      - (gcs_bucket | string | length) > 0
    fail_msg: >-
      Missing required inputs for GCS pgBackRest repository.
      Required: inputs.gcs_bucket (non-empty).
  when: _hyops_pgbackrest_backend == 'gcs'

- name: "Preflight: validate Azure Blob settings"
  ansible.builtin.assert:
    that:
      - (azure_storage_account | string | length) > 0
      - (azure_container | string | length) > 0
    fail_msg: >-
      Missing required inputs for Azure pgBackRest repository.
      Required: inputs.azure_storage_account and inputs.azure_container (non-empty).
  when: _hyops_pgbackrest_backend == 'azure'

- name: "Preflight: validate secondary S3 settings"
  ansible.builtin.assert:
    that:
      - (secondary_s3_bucket | string | length) > 0
    fail_msg: >-
      Missing required inputs for secondary S3 pgBackRest repository.
      Required: inputs.secondary_s3_bucket (non-empty).
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 's3'

- name: "Preflight: validate secondary GCS settings"
  ansible.builtin.assert:
    that:
      - (secondary_gcs_bucket | string | length) > 0
    fail_msg: >-
      Missing required inputs for secondary GCS pgBackRest repository.
      Required: inputs.secondary_gcs_bucket (non-empty).
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 'gcs'

- name: "Preflight: validate secondary Azure Blob settings"
  ansible.builtin.assert:
    that:
      - (secondary_azure_storage_account | string | length) > 0
      - (secondary_azure_container | string | length) > 0
    fail_msg: >-
      Missing required inputs for secondary Azure pgBackRest repository.
      Required: inputs.secondary_azure_storage_account and inputs.secondary_azure_container (non-empty).
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 'azure'

- name: "Preflight: ensure S3 credentials are present in environment"
  ansible.builtin.assert:
    that:
      - (lookup('ansible.builtin.env', s3_access_key_env | string) | length) > 0
      - (lookup('ansible.builtin.env', s3_secret_key_env | string) | length) > 0
    fail_msg: >-
      Missing S3 credentials in environment. Ensure vault/env provides:
      {{ s3_access_key_env }} and {{ s3_secret_key_env }}.
      Hint: hyops secrets set --env <env> {{ s3_access_key_env }}='...' {{ s3_secret_key_env }}='...'
  no_log: true
  when: _hyops_pgbackrest_backend == 's3'

- name: "Preflight: ensure GCS credentials are present in environment"
  ansible.builtin.assert:
    that:
      - (lookup('ansible.builtin.env', gcs_sa_json_env | string) | length) > 0
    fail_msg: >-
      Missing GCS service account JSON in environment. Ensure vault/env provides:
      {{ gcs_sa_json_env }} (service account JSON content).
      Hint: export {{ gcs_sa_json_env }}="$(cat sa.json)"; hyops secrets set --env <env> --from-env {{ gcs_sa_json_env }}
  no_log: true
  when: _hyops_pgbackrest_backend == 'gcs'

- name: "Preflight: ensure Azure storage account key is present in environment"
  ansible.builtin.assert:
    that:
      - (lookup('ansible.builtin.env', azure_account_key_env | string) | length) > 0
    fail_msg: >-
      Missing Azure storage account key in environment. Ensure vault/env provides:
      {{ azure_account_key_env }}.
      Hint: hyops secrets set --env <env> {{ azure_account_key_env }}='...'
  no_log: true
  when: _hyops_pgbackrest_backend == 'azure'

- name: "Preflight: ensure secondary S3 credentials are present in environment"
  ansible.builtin.assert:
    that:
      - (lookup('ansible.builtin.env', secondary_s3_access_key_env | string) | length) > 0
      - (lookup('ansible.builtin.env', secondary_s3_secret_key_env | string) | length) > 0
    fail_msg: >-
      Missing secondary S3 credentials in environment. Ensure vault/env provides:
      {{ secondary_s3_access_key_env }} and {{ secondary_s3_secret_key_env }}.
  no_log: true
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 's3'

- name: "Preflight: ensure secondary GCS credentials are present in environment"
  ansible.builtin.assert:
    that:
      - (lookup('ansible.builtin.env', secondary_gcs_sa_json_env | string) | length) > 0
    fail_msg: >-
      Missing secondary GCS service account JSON in environment. Ensure vault/env provides:
      {{ secondary_gcs_sa_json_env }}.
  no_log: true
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 'gcs'

- name: "Preflight: ensure secondary Azure storage account key is present in environment"
  ansible.builtin.assert:
    that:
      - (lookup('ansible.builtin.env', secondary_azure_account_key_env | string) | length) > 0
    fail_msg: >-
      Missing secondary Azure storage account key in environment. Ensure vault/env provides:
      {{ secondary_azure_account_key_env }}.
  no_log: true
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 'azure'

- name: Ensure postgres system user exists for pgBackRest credential staging
  become: true
  ansible.builtin.user:
    name: postgres
    system: true
    create_home: false
    shell: /sbin/nologin
    state: present
  when: _hyops_pgbackrest_backend == 'gcs' or (_hyops_pgbackrest_secondary_enabled and _hyops_pgbackrest_secondary_backend == 'gcs')

- name: Ensure parent directory exists for gcs_sa_dest
  become: true
  ansible.builtin.file:
    path: "{{ gcs_sa_dest | dirname }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  when: _hyops_pgbackrest_backend == 'gcs'

- name: Write GCS service account JSON to the DB nodes
  become: true
  ansible.builtin.copy:
    dest: "{{ gcs_sa_dest }}"
    content: "{{ lookup('ansible.builtin.env', gcs_sa_json_env | string) }}"
    owner: postgres
    group: postgres
    mode: "0600"
  no_log: true
  when: _hyops_pgbackrest_backend == 'gcs'

- name: Ensure parent directory exists for secondary_gcs_sa_dest
  become: true
  ansible.builtin.file:
    path: "{{ secondary_gcs_sa_dest | dirname }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 'gcs'

- name: Write secondary GCS service account JSON to the DB nodes
  become: true
  ansible.builtin.copy:
    dest: "{{ secondary_gcs_sa_dest }}"
    content: "{{ lookup('ansible.builtin.env', secondary_gcs_sa_json_env | string) }}"
    owner: postgres
    group: postgres
    mode: "0600"
  no_log: true
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 'gcs'

- name: Enable pgBackRest (pgbackrest_install)
  ansible.builtin.set_fact:
    pgbackrest_install: true
    pgbackrest_repo_type: "{{ _hyops_pgbackrest_backend }}"
    pgbackrest_stanza: "{{ patroni_cluster_name | default('postgres-ha') }}"
  changed_when: false

- name: Build pgBackRest config (S3 repo + retention)
  ansible.builtin.set_fact:
    pgbackrest_conf:
      global:
        - { option: "log-level-file", value: "detail" }
        - { option: "log-path", value: "/var/log/pgbackrest" }
        - { option: "repo1-type", value: "s3" }
        - { option: "repo1-path", value: "{{ repo_path }}" }
        - { option: "repo1-s3-key", value: "{{ lookup('ansible.builtin.env', s3_access_key_env | string) }}" }
        - { option: "repo1-s3-key-secret", value: "{{ lookup('ansible.builtin.env', s3_secret_key_env | string) }}" }
        - { option: "repo1-s3-bucket", value: "{{ s3_bucket }}" }
        - { option: "repo1-retention-full", value: "{{ retention_full | string }}" }
        - { option: "repo1-retention-full-type", value: "{{ retention_full_type | string }}" }
        - { option: "repo1-bundle", value: "y" }
        - { option: "repo1-block", value: "y" }
        - { option: "start-fast", value: "y" }
        - { option: "stop-auto", value: "y" }
        - { option: "link-all", value: "y" }
        - { option: "resume", value: "n" }
        - { option: "archive-async", value: "y" }
        - { option: "archive-get-queue-max", value: "1GiB" }
        - { option: "spool-path", value: "/var/spool/pgbackrest" }
      stanza:
        - { option: "process-max", value: "4" }
        - { option: "log-level-console", value: "info" }
        - { option: "recovery-option", value: "recovery_target_action=promote" }
  no_log: true
  when: _hyops_pgbackrest_backend == 's3'

- name: Build pgBackRest config (GCS repo + retention)
  ansible.builtin.set_fact:
    pgbackrest_conf:
      global:
        - { option: "log-level-file", value: "detail" }
        - { option: "log-path", value: "/var/log/pgbackrest" }
        - { option: "repo1-type", value: "gcs" }
        - { option: "repo1-path", value: "{{ repo_path }}" }
        - { option: "repo1-gcs-key", value: "{{ gcs_sa_dest }}" }
        - { option: "repo1-gcs-bucket", value: "{{ gcs_bucket }}" }
        - { option: "repo1-retention-full", value: "{{ retention_full | string }}" }
        - { option: "repo1-retention-full-type", value: "{{ retention_full_type | string }}" }
        - { option: "repo1-bundle", value: "y" }
        - { option: "repo1-block", value: "y" }
        - { option: "start-fast", value: "y" }
        - { option: "stop-auto", value: "y" }
        - { option: "link-all", value: "y" }
        - { option: "resume", value: "n" }
        - { option: "archive-async", value: "y" }
        - { option: "archive-get-queue-max", value: "1GiB" }
        - { option: "spool-path", value: "/var/spool/pgbackrest" }
      stanza:
        - { option: "process-max", value: "4" }
        - { option: "log-level-console", value: "info" }
        - { option: "recovery-option", value: "recovery_target_action=promote" }
  no_log: true
  when: _hyops_pgbackrest_backend == 'gcs'

- name: Build pgBackRest config (Azure Blob repo + retention)
  ansible.builtin.set_fact:
    pgbackrest_conf:
      global:
        - { option: "log-level-file", value: "detail" }
        - { option: "log-path", value: "/var/log/pgbackrest" }
        - { option: "repo1-type", value: "azure" }
        - { option: "repo1-path", value: "{{ repo_path }}" }
        - { option: "repo1-azure-account", value: "{{ azure_storage_account }}" }
        - { option: "repo1-azure-key", value: "{{ lookup('ansible.builtin.env', azure_account_key_env | string) }}" }
        - { option: "repo1-azure-container", value: "{{ azure_container }}" }
        - { option: "repo1-retention-full", value: "{{ retention_full | string }}" }
        - { option: "repo1-retention-full-type", value: "{{ retention_full_type | string }}" }
        - { option: "repo1-bundle", value: "y" }
        - { option: "repo1-block", value: "y" }
        - { option: "start-fast", value: "y" }
        - { option: "stop-auto", value: "y" }
        - { option: "link-all", value: "y" }
        - { option: "resume", value: "n" }
        - { option: "archive-async", value: "y" }
        - { option: "archive-get-queue-max", value: "1GiB" }
        - { option: "spool-path", value: "/var/spool/pgbackrest" }
      stanza:
        - { option: "process-max", value: "4" }
        - { option: "log-level-console", value: "info" }
        - { option: "recovery-option", value: "recovery_target_action=promote" }
  no_log: true
  when: _hyops_pgbackrest_backend == 'azure'

- name: Add optional S3 endpoint config
  ansible.builtin.set_fact:
    pgbackrest_conf: >-
      {{
        pgbackrest_conf | combine({
          'global': pgbackrest_conf.global + [
            { 'option': 'repo1-s3-endpoint', 'value': (s3_endpoint | string) }
          ]
        }, recursive=true)
      }}
  when: (s3_endpoint | string | length) > 0
    and _hyops_pgbackrest_backend == 's3'
  no_log: true

- name: Add optional S3 region config
  ansible.builtin.set_fact:
    pgbackrest_conf: >-
      {{
        pgbackrest_conf | combine({
          'global': pgbackrest_conf.global + [
            { 'option': 'repo1-s3-region', 'value': (s3_region | string) }
          ]
        }, recursive=true)
      }}
  when: (s3_region | string | length) > 0
    and _hyops_pgbackrest_backend == 's3'
  no_log: true

- name: Add optional S3 uri-style config
  ansible.builtin.set_fact:
    pgbackrest_conf: >-
      {{
        pgbackrest_conf | combine({
          'global': pgbackrest_conf.global + [
            { 'option': 'repo1-s3-uri-style', 'value': (s3_uri_style | string) }
          ]
        }, recursive=true)
      }}
  when: (s3_uri_style | string | length) > 0
    and _hyops_pgbackrest_backend == 's3'
  no_log: true

- name: Add secondary repo2 config (S3)
  ansible.builtin.set_fact:
    pgbackrest_conf: >-
      {{
        pgbackrest_conf | combine({
          'global': pgbackrest_conf.global + [
            { 'option': 'repo2-type', 'value': 's3' },
            { 'option': 'repo2-path', 'value': (_hyops_pgbackrest_secondary_repo_path | string) },
            { 'option': 'repo2-s3-key', 'value': (lookup('ansible.builtin.env', secondary_s3_access_key_env | string)) },
            { 'option': 'repo2-s3-key-secret', 'value': (lookup('ansible.builtin.env', secondary_s3_secret_key_env | string)) },
            { 'option': 'repo2-s3-bucket', 'value': (secondary_s3_bucket | string) },
            { 'option': 'repo2-retention-full', 'value': (retention_full | string) },
            { 'option': 'repo2-retention-full-type', 'value': (retention_full_type | string) },
            { 'option': 'repo2-bundle', 'value': 'y' },
            { 'option': 'repo2-block', 'value': 'y' }
          ]
        }, recursive=true)
      }}
  no_log: true
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 's3'

- name: Add optional secondary S3 endpoint config
  ansible.builtin.set_fact:
    pgbackrest_conf: >-
      {{
        pgbackrest_conf | combine({
          'global': pgbackrest_conf.global + [
            { 'option': 'repo2-s3-endpoint', 'value': (secondary_s3_endpoint | string) }
          ]
        }, recursive=true)
      }}
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 's3'
    - (secondary_s3_endpoint | string | length) > 0
  no_log: true

- name: Add optional secondary S3 region config
  ansible.builtin.set_fact:
    pgbackrest_conf: >-
      {{
        pgbackrest_conf | combine({
          'global': pgbackrest_conf.global + [
            { 'option': 'repo2-s3-region', 'value': (secondary_s3_region | string) }
          ]
        }, recursive=true)
      }}
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 's3'
    - (secondary_s3_region | string | length) > 0
  no_log: true

- name: Add optional secondary S3 uri-style config
  ansible.builtin.set_fact:
    pgbackrest_conf: >-
      {{
        pgbackrest_conf | combine({
          'global': pgbackrest_conf.global + [
            { 'option': 'repo2-s3-uri-style', 'value': (secondary_s3_uri_style | string) }
          ]
        }, recursive=true)
      }}
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 's3'
    - (secondary_s3_uri_style | string | length) > 0
  no_log: true

- name: Add secondary repo2 config (GCS)
  ansible.builtin.set_fact:
    pgbackrest_conf: >-
      {{
        pgbackrest_conf | combine({
          'global': pgbackrest_conf.global + [
            { 'option': 'repo2-type', 'value': 'gcs' },
            { 'option': 'repo2-path', 'value': (_hyops_pgbackrest_secondary_repo_path | string) },
            { 'option': 'repo2-gcs-key', 'value': (secondary_gcs_sa_dest | string) },
            { 'option': 'repo2-gcs-bucket', 'value': (secondary_gcs_bucket | string) },
            { 'option': 'repo2-retention-full', 'value': (retention_full | string) },
            { 'option': 'repo2-retention-full-type', 'value': (retention_full_type | string) },
            { 'option': 'repo2-bundle', 'value': 'y' },
            { 'option': 'repo2-block', 'value': 'y' }
          ]
        }, recursive=true)
      }}
  no_log: true
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 'gcs'

- name: Add secondary repo2 config (Azure Blob)
  ansible.builtin.set_fact:
    pgbackrest_conf: >-
      {{
        pgbackrest_conf | combine({
          'global': pgbackrest_conf.global + [
            { 'option': 'repo2-type', 'value': 'azure' },
            { 'option': 'repo2-path', 'value': (_hyops_pgbackrest_secondary_repo_path | string) },
            { 'option': 'repo2-azure-account', 'value': (secondary_azure_storage_account | string) },
            { 'option': 'repo2-azure-key', 'value': (lookup('ansible.builtin.env', secondary_azure_account_key_env | string)) },
            { 'option': 'repo2-azure-container', 'value': (secondary_azure_container | string) },
            { 'option': 'repo2-retention-full', 'value': (retention_full | string) },
            { 'option': 'repo2-retention-full-type', 'value': (retention_full_type | string) },
            { 'option': 'repo2-bundle', 'value': 'y' },
            { 'option': 'repo2-block', 'value': 'y' }
          ]
        }, recursive=true)
      }}
  no_log: true
  when:
    - _hyops_pgbackrest_secondary_enabled
    - _hyops_pgbackrest_secondary_backend == 'azure'
