hooks:
  export_infra:
    command:
      - python3
      - -m
      - hyops.drivers.inventory.netbox.tools.export_infra
      - --target
      - "{target}"
      - --terragrunt-root
      - "{hook_root}"
      - --only-module
      - .
      - --changed-only
    hook_root_env: HYOPS_EXPORT_HOOK_ROOT
    hook_root_default: "."
    strict: false
    redact: true
    timeout_s: 120
