# purpose: Prune rules to exclude non-shippable content from release bundles.
# adr: ADR-0622
# maintainer: HybridOps.Tech

exclude_globs:
  - "**/__pycache__"
  - "**/*.pyc"
  - "**/*.pyo"
  - "**/.DS_Store"
  - "**/.pytest_cache"
  - "**/.mypy_cache"
  - "**/*.egg-info"
  - "**/*.egg-info/**"
  - ".venv"
  - "build"
  - "**/build"
  - "**/build/**"
  - "dist"
  - "hybridops_core.egg-info"
  - "hyops/drivers/config/ansible/collections/ansible_collections/hybridops"
  - "hyops/drivers/config/ansible/collections/ansible_collections/hybridops/**"
  - "**/hyops/drivers/config/ansible/collections/ansible_collections/hybridops"
  - "**/hyops/drivers/config/ansible/collections/ansible_collections/hybridops/**"
  - "pkg/release-files.sha256"
  - "wheels/*.tmp"
